body:
  text: 湯子遺書附録行略子湯溥等述先考諱斌字孔伯號荆峴一號潛菴先世為滁州之來安人始祖諱寬從明太祖起兵積功至廣東神電衛世襲百户子諱銘調中都金川門百户再傳諱庠以功升睢陽衛前所世襲千户遂家焉三傳諱英襲衛職四傳諱卿以平巨寇王堂功升世襲本衛指揮僉事纍功至驃騎將軍中都正留守五傳諱易以功至明威將軍陜西岷州衛守偹是為府君之髙祖子三次諱希范以貢生任山西趙城縣縣丞是為府君之曽祖子諱敏為州庠生即府君祖也孝友寬仁於兄弟族人篤愛無間言與人終身無忤色又嘗以千金赴楚為趙城公購棺木比至嵗大饑遂傾囊賑之再往始獲木焉子四人我祖其季也祖諱契庠生慷慨明達凡大義所關介然不撓鄉黨間每有所疑或地方大事就正者輒片言立决府君既貴惟諄諄以忠孝相勉勵誥封中憲大夫陜西按察司副使凡三為鄉飲正賔崇祀鄉賢子二長即先府君府君自幼不好嬉戲八九嵗時耆儒王先生慕祥開孰講小學人皆憚其嚴正府君獨侍坐終日無倦容歸即見諸行事遇貴胄輿馬赫奕者泊然不以動念王先生嘗謂先大父曰令子真大器也為制舉義嘗不起草宿儒多遜不能及平日讀書外無他嗜家貧常借人書篝火讀達旦率以為常年十六就傅北郭外李自成寇睢城府君聞變奔還城已閉乃繞濠痛哭先大父及先大母趙恭人遣人從城上語使去府君不忍逺違伏近郭外斷蓬坑中時州守遁民開門納賊先大父負曽祖母而逃府君聞賊入城冒難奔赴至則先大母已罵賊膺刃歿矣府君號泣不欲生絶食者六日先大父强之乃食既殯隨大父避難河北舌耕以養既而伯祖賁皇公卒衢州有弱息留衢大父率府君往欲攜之歸而李自成破北京乃寓衢讀書山中每念先大母苦節恐不聞於世益自刻苦嘗中夜大哭哭已復讀夜深虎羣嘯林外與書聲相間久之山中民皆感動時時來餽燈油米食府君却不受日焚敗葉繼晷飲泉水咽糠粃而已尋至南京以流寓應試七試皆冠軍已而有令納軍需數兩方許入庠遂棄去乙酉王師定中原乃由江西泛鄱陽歸丙戌補弟子員戊子舉於鄉己丑㑹試中式壬辰成進士世祖章皇帝親試擬御製大清㑹典序及送敬謹親王南征詩改𢎞文院庶吉士邸舍不蔽風雨閉門讀書不妄交遊甲午授國史院檢討學士山隂胡公兆龍欲屈致一見終不肯往乙未詔選翰林科道出任監司府君名在選中有品行清端才猷贍裕之諭以應得職銜加一級用明年補潼關道副使潼關自明季亂後民多逃散城中不滿三百家是時天兵下黔者屯成都漢中而經略洪公屯湖南征調轉輸之衆必經其地官吏科斂以辦軍需驛遞重困府君戒屬吏曰毋科取民財毋妄用驛夫兵來吾自應之自是大兵將至府君使人迓之境外與申約束曰部文所需有不給者公請劾我若於額外動民間一草我亦當論公是後兵至肅然無敢犯者屬吏皆兢兢奉法撫勞僃至再閲嵗關城中流民歸者數千户府君見鄉大夫惟問民疾苦及興革事宜有某公比日三竭無所言府君甚異之後聞其甥與人爭産欲為私請既見終不敢出口也行保甲有盜即獲自是四境宴然又患民風强悍為設學講律有兄弟相訟者府君收其詞不問令於講鄉約時必至凡三至涕泣自陳悔過遂出詞還之卒相友愛府君去時猶追送數百里也順治十四年恭遇覃恩階中憲大夫封先大父如其官贈先大母恭人府君心稍慰戊戌撫軍陳公薦於朝時在任未三年民愛之如父母偶因勘荒行屬邑遇雨止大樹下既去民以朱欄護樹時人比之甘棠云已亥升嶺北道參政轄贑南二府為治一如潼關時甫三月清積案八百餘件贑據四省上游地大山深亘稱巖疆有李玉廷者為明舊將以本部萬人入山為盜府君過南昌巡撫張公屬之曰贑寇非君莫辦勦撫惟所為府君至以手書諭之遂許降約入山自招之未及期七日而海寇犯江寧報至府君夜見贑撫蘇公請檄將士嚴城守且曰玉廷許降非心服也今必變矣某敕文當駐南安南安無兵必先被寇請往夜馳至郡設守甫畢而寇果至見有僃驚走曰湯公預料如此何可當也遂散兵焚掠府君與撫軍密計擒玉廷其弟秀廷以衆降當玉廷之初叛也邸報斷者九日人情洶洶訛言江寧失守蘇公將調兵防灘府君策海寇陸戰必敗訛言必玉廷為之欲分我兵力耳蘇公遽起執府君手曰公言是也㑹捕得海寇諜者蘇公以屬府君一問即承撫軍曰此當繫獄候㫖府君曰今人心搖動請㫖往返萬里脫有變奈何遂即斬以聞數日報至海寇敗又平南王旗軍孫大市馬過南安殺二人其帥董遊擊誣被殺者以盜問官僅擬鬬殺律平南王怒曰所殺者盜也當勿論切責南安守及推官皆錯愕不敢問乃援赦例以請時府君初受事白撫按曰勢相敵者謂之鬬孫大持刃在營身無寸傷而民以兵死擬鬬不當乞自審一訊得實大止殺一人其一乃陳報國殺也遂坐大斬而申請平南索報國回稱報國攻文村死矣然大竟抵罪一時旗軍畏服無敢犯者先是府君由潼關移任便道省親值先大父病血痢欲留養例不可抵任時遂憂思致疾㑹軍興力疾視事賊平具呈乞歸督撫按皆難之駁再四府君狀報曰某母趙氏壬午殉難最慘已負終天之恨赴任時歸省某父抱病馬首南馳方寸已亂留之終無益於地方且老父聞某病病必劇是某貽誤巖疆不可為臣病貽親憂不可為子也巡按見之惻然乃代請豫告時年三十三矣是行也不孝溥方九嵗與母俱未從先府君攜二僕往返八千里平盜患有馬一匹歸時鬻之充資斧百姓扶持相送莫不歎息泣下甚有痛哭者歸侍先大父色養僃至繼大母軒愛府君如已出府君竭誠盡孝亦無異所生每日暮先大父遣就寢猶讀書至夜分不輟後課不孝溥等亦然曰吾非望汝蚤貴少年兒宜使苦苦則志定將來不至失足也授四書外授尚書已授昌黎文百篇漸及史漢先儒諸書最後課舉子業曰汝將來長成吾未必及教汝先略讀諸書知大義庶無廢業嗚呼府君之為不孝等逺慮如此今追憶之其何能不仰天長號耶居之西百步為先大母趙恭人祠每朔望謁家廟畢必至祠肅拜數十年如一日甲辰先大父卒府君哀毁骨立席藁柩㫄晨夕號慟既葬數日一省視墓樹數百株一枝損必欷歔不置每遇先大父大母忌辰輒素服終日色慘然不樂即至起官後亦題别主自隨雖事至叢劇不廢展謁為幼叔延師教誨冀其成立曰以竟吾父未竟之志也嘗受業孫鍾元先生之門先生亟稱之作詩以贈行居家閉門郡守罕識其面今浙江巡撫金公鋐與府君同年壬子任河南布政使相别二十年見郡守問府君對言睢州未聞有此人也金公以是益重之㑹上諭舉外官告病者州守程公以名聞金公力主之府君以母老懇辭者三事乃已乙邜上諭舉賢才赴軍前大學士熊公賜履詢之魏公象樞曰吾曩見某文久欲薦之然未謀面魏公曰此山中學道人也舉之誠當顧其家負甚不能治裝奈何遂止戊午詔舉博學鴻儒於是魏公金公交章共薦郡縣迫之行乃駕牛車入都止僧舍中日杜門危坐未嘗輕謁顯達既試上親第為甲等部議以原官修明史上命補翰林得侍講編纂日無暇晷為明太祖本紀四卷列傳十餘卷辛酉充日講起居注官尋轉侍讀典浙江試所得皆孤寒士雖下第者皆嘖嘖稱道事竣即行撫軍李公本晟留之終不可壬戌充明史總裁癸亥五月始日值講筵纂修兩朝聖訓五鼓入朝講畢侍起居歸則裁定明史成厯法天文志及英景憲孝四朝列傳考訂期於確核時方酷暑汗流浹背不懈也每日暮正襟端坐潜思經義以備詰朝進講不孝溥請稍息府君不聽曰此君命也是年厯左右庶子嘗侍立上顧問汝平日有詩文乎其繕寫以進歸寓朝服手書越日即呈御覽上召至乾清宫語良久始出嘗恩賜緞紗先捧至大父主前再拜仍寄大母以榮君賜甲子超擢內閣學士兼禮部侍郎在閣凡四月公事外未嘗與大學士接語㑹江寧巡撫缺廷推孫公在豐上特擢授陛辭上深加奬諭賜鞍馬一綵緞十白金五百兩比行又入見上撤御饌賜之復賜御書三軸曰今當逺離展此如對朕也時上將南巡乃星馳赴任受事後文案山積數日即迎駕北去乃就舟中批發晝夜不假寐者六日既見上於淮安城南上顧問慰藉僃至遂前驅至蘇蘇城道極狹制府將毁舍廣馳道府君曰如此則數萬人無所安息非聖天子問民疾苦意遽下令止其事上至府君扈蹕至江寧上再賜御書一軸蟒裘一襲羊酒珍羞回鑾日傳㫖令徑歸署時蘇松賦重積逋相仍官不滿三嵗輒罷以故皆不自愛而私規近利上官隂持其短索賂益急虧庫金繫獄者纍纍富商大賈聚處都市以侈靡相競男婦冶遊巫覡奉妖祠飾怪惑衆民日趨奸利訟師主誣詞興獄輕猾少年懷刃嘯呼主打降略識字則造淫詞邪說或結旗丁為主契券以奪平民或盤據各官署舞文法纍世相承以擅利淮揚十年昏墊民不聊生號稱難治府君至則進州縣吏謂若等以金事上官本為巧宦計今官斯土者既絶意升遷尚何復冀而以庫金媚人顧汝等或為所脅今與若更始苟稱職吾力或能拔汝即不能以考成罷歸猶得守墳墓樂餘年奈何日坐堂皇引前官妻子勘産顧反蹈所為皆頓首涕泣曰公活我又戒司道府官不得責屬吏餽皆指天自誓曰謹從公令於是除耗羡嚴私派清漕弊省獄訟汰蠧役杜請托行保甲革鹽商匣費一切皆以身先數月劾其不奉令者已又劾其陽奉而隂違者於是屬吏爭自濯磨制府以下相戒不受撫屬一錢奉使京朝官迅棹疾過地方官未嘗餽斗米吏治大清府君愛民出於誠為政以寬民力恤疾苦興教化培植根本為務嘗請改並徵積逋為分年帶徴免十八十九兩年災缺減賦額寬考成豁逃丁調驛困免蘆課買銅除邳州版荒捐明神宗朝所加九釐餉前後疏數十上部議或從或否而府君未嘗以數為嫌聞有災傷輒通夜不寐疏立拜發初至報睢寧沭陽邳州災蠲賦數千兩又報泰州災并蠲前二年賦且入永蠲案內次年淮揚徐大水奏報免賦十餘萬兩又盡免髙郵寶應等州縣賦復幾十餘萬發常平倉粟及丏將軍提鎮𣙜關輸粟往賑又檄布政司以庫銀五萬兩告糴江西湖廣先發後聞或以為不可府君曰候㫖然後告糴民皆溝中骨矣吾寧先發金脫格部議以所糴平糶足償庫何患乃遂遣兩府同知往誡曰若至極陳淮揚災狀言米斗一金購及半運還俟後令已而大賈爭集淮揚斗米百錢而已後鬻米償庫國帑無損而民賴以活者數十萬有司請報湖蕩蓮芡府君駁還曰朝廷任土作貢未聞問諸水濵老吏叩頭以例請府君曰例自人作寬一分則民受一分之賜且蓮芡嵗或不熟一報部即為永額後欲去之豈可得乎又禁冶遊崇儉約驅優伶懲豪猾淫詞邪說馬弔博具一切皆絶又禁有喪者不得火化及久不葬比一嵗報葬者三萬餘棺有五通神者江以南崇奉數百年禍福立應嵗娶民間子女為婦所娶婦皆立死逺近奔走如騖督撫初至謁畢然後受事府君取其像投太湖中民大駭已而妖遂絶廣立義倉社學聚生徒講孝經小學月吉講上諭律令民間凡所為稍不法者輒恐府君知風俗大變時民見吏胥皆奉法惟謹權貴絶口不敢請託而民用日省乃因府君姓為諧語曰黃連半夏人參湯也又以自奉儉約謂之豆腐湯云吳縣監生王某者文恪公裔也有奴竊資逃數年矣突引弓刀數十騎來自稱鬻身親王府詬罵索金錢官吏莫敢呵問以告府君立收送獄中論如法又常熟縣奴某持其主之父國初受隆武劄迫主逺出欲據有主婦府君廉知大怒曰國家屢更大赦此草昧時事何足問而豪奴以脅若主乎拘到追劄付火斃之杖下百姓莫不稱快時海禁初開浙江提督請遣將巡海中捕盜詔下四省議府君議曰盜聚然後加兵今兵加何所而輕遣將徒使寇掠海中為賈貿患久之必成畏途今當靜以待動無為事先督撫多如府君言議上遂止故事印官委署由布政使擬送頗有用賄得者府君謂未任而先有所費何以責亷今掣籖如選例或請府君講學府君曰盡吾職即學也今人以講學釣名隳本業而長奔競吾未見其可也或請為府君立書院府君曰吾不講學安有書院比者功令禁生祠所在稱搆書院籍斂父老財飾僞長奸吾甚不取乃下令嚴禁吳有隱士徐枋者居西山下四十年人罕得見府君重其品節欲因以勵頽俗嘗屏騶從造其門枋終不肯出久之府君乃去時人兩髙之夏月蚊盛從質庫贖敝苧帳以自覆錫山泉名天下府君竟任未嘗酌杯水朔望謁廟屬吏至不敢代市瓣香署中秉燭治事夜四鼓始假寐日中始食自此心血枯槁嘗顧謂溥曰古人云食少事多豈能久乎已而曰君命即天命也一嵗嘗四至淮上冬夜乘小漁舟渡江幾覆北風凛冽背痛者數日歸值嵗終封印猶晝夜拮据見屬吏必反覆丁寧告以君恩不可負民命不可殘諄諄如家人父子一時政績卓然而府君意猶未愜蓋經營厝設十未竟二三且曰吾自信者心耳安能保其必當乎時一切當奏聞者皆有期㑹過則奪俸江蘇所屬北至豐沛千二百里兼按察司在江寧相去復五百餘里殺人及盜質審動輒逾限故往日事非不得已不奏府君曰是欺也且奸盜復何畏乎乃悉具奏雖罹罰不恤然每奏罰輒荷恩破格寬免府君之初受事也值蠲漕四分之一既而請分年帶徵或以為柄臣功先後索金四十萬府君禁使勿與屬吏以民願輸告曰公不應仇公必甚府君曰民有錢寧不以輸國賦而入私門乎吾寧旦暮斥罷歸田畝誠不忍見若等剝民媚權貴也將按發窮其事屬吏叩頭謝罪良久乃已當是時天下爭輦金錢入都而府君屬無一人往者屢有求皆不行乙丑秋户部因奏銷劾府君吏部奏奪俸六月上復特免比大計藩臬空手入都都門索府君一刺不可得莫不竊恨然以上知府君深無如何也丙寅春皇太子將出閣上諭吏部自古帝王諭教太子必簡和平謹恪之臣統領官寮專資贊導江寧巡撫湯斌在講筵時素行勤慎朕所稔知及簡任巡撫以來潔已率屬實心任事允宜拔擢大用風示有位特授禮部尚書掌管詹事府事聞召即議行蘇城罷市十餘日外郡之民亦接踵至日聚轅門外號泣伺府君出羣擁馬首甚欲閉城填巷又設數匭斂錢為路費將叩閽一日匭遽滿府君曰詔㫖寧可違乎委曲宣諭乃得行及行送者十餘萬人自蘇至六合不絶於道府君念大母年老乃便歸省視㑹皇太子出閣届期兼程北來既見上上喜甚問路所由具對因奏鳳陽災狀且言徐州雖已荷恩蠲賦比入春尚苦饑上遽遣官往賑活者無算上問下河事下河者本減出河中水由髙堰漕隄諸壩入髙郵寶應興化泰州泰興山陽邳州沭陽等州縣田廬皆沒上諭開渠入海以居黃河下故謂之下河初安徽按察使于公成龍督理下河估金八十萬兩時于受總河節制以圖議上而總河靳公輔駮其議曰吾以勾股法測潮髙內水五尺河開必內灌法當築丈五尺隄起髙堰屬之海盡收各壩水入隄束髙丈餘則潮不入而隄外可盡為平田須運土三百里外築圍水中涸取圍中土築隄非三百萬兩不可隄成墾涸地為田鬻之民以償庫詔靳于廷議未決於是上遣工部尚書薩公穆哈侍郎穆公成格㑹漕運總督江蘇巡撫詢問民情民畏靳公多言願罷工者府君曰是不可罷也上水日增而下無所泄不十年無淮揚矣靳徒以海內灌故異議海可內灌寧俟今日且吳淞錢塘皆有潮何獨淮揚而慮內灌乎今兩府蠲災外賦不滿三十萬不若請盡乞民令有司督民自開河薩曰公言良是第奉詔問民疏中又可入公語耶某見上當面奏矣及見遂不奏至是府君具對如前語上詰問薩等辭服皆革職自是忌者衆矣是時于已擢直𨽻巡撫乃更用工部侍郎孫公在豐往督之孫至言開河三便旬日下河水驟長疏鑿難施上召靳公至面諭塞河南岸及髙堰壩靳堅不肻從曰壩塞隄必潰府君力爭殿上已又及九卿爭午門外凡兩日絀其議竟閉減水壩一年時上特命府君行坐講禮尋充經筵講官未幾復總裁明史已更兼詹事官與㑹議屢䝉垂問恩禮殊異人固忌府君且大用而府君所執又數與要人忤因共謀誣府君誹謗搆陷百端一時仰其權勢貪其賄遺者皆從而揚其波賴上聖明終不信也丁卯五月因旱上使內閣聚問九卿興革事宜府君請復夏秋兩稅及罷蘆課買銅曰春種未布而責民輸賦比穫盡一嵗之入以償債且不足以故凶嵗多逃亡逋賦豐嵗亦不能有所儲蓄曩者國用不足取濟一時今內帑充積如山何不復夏秋兩稅使勤農者有所積雖水旱不為災不國民兩利乎至若蘆課新例並令買銅銅非市所常有𣙜關終嵗專購猶患缺額奈何責職民事者辦此此不科取均貼必責成蘆户不若仍聽輸銀便時户部某公遽起曰公休矣即欲變此法俟某去户部乃可今不能也遂罷㑹㑹五官靈臺郎董漢臣言十事忤閣臣意御史劾漢臣越職言事希富貴內閣欲因下刑部究主使上問九卿獨府君白漢臣無罪已內閣復稱㫖傳問府君未對某公目府君曰幸勿違衆議府君厲聲曰上因旱求言漢臣應詔言事何罪大臣不能言反罪言者如此心何某大慚自是恨刺骨居一二日上幸海淀有輔導皇太子之命數日病具疏辭內閣欲因之加罪上不聽第責令回奏而彈者纍章迭上然亦不能有所指上輒報聞而已比府君回奏事輒已㑹詹事府復劾府君薦耿介老不稱職部議革職上薄其罰削五級留任而忌者愈益怒謀中傷益力日夜叢謀必欲擠之死地人或告府君當防患者或勸府君委曲使人請諸公為解者府君笑曰吾生平以義命自信且年逾六十復何求時抱病杜門伏枕讀朱子文集丹黃㸃注無異平時上終察知府君孤介不容於時特遣御醫診視尋命改工部尚書是日九卿㑹議府君入講不至科道即又劾府君部議降二級調用吏部尚書陳公廷敬爭曰比者某等失朝從嚴乃奪六月俸何至是然竟不能得上復命留任先是府君留溥等代飬是年七月不孝沆來都九月聞府君病不孝溥亦來府君見溥等心頗喜曰我昨病幾危上遣御醫診視今漸愈矣吾勢不能去倘不即填溝壑猶當勉報君恩顧汝祖母年迫桑榆心中若割奈何不孝溥恐府君心慟乃詭詞應曰祖母近稍健故某來耳府君大喜曰若此母子相見尚有日也居數日奉命詣潞河勘楠木越三日抵暮歸感風寒微嗽言笑如平時漏下二鼓猶戒不孝溥等曰孟子言乍見孺子入井皆有怵惕惻隱之心汝等養此真心令時時發見久之全體渾然便可上達天德若但依成規襲外貌終為鄉願無益也又粗問里中事歎曰吾年少交遊零落盡矣問夜何其乃就寢曰明朝尚㑹議也不孝溥等就枕展轉不能寐聞府君嗽聲轉急披衣起視則㗋中有痰疾呼尚能應頃之遂卒嗚呼哀哉天何不殞滅溥等而奪吾父之速耶家無新衣敝衣以斂束貼金銅帶加朝服其上朝服緞即上賜也嗚呼痛哉上聞遣學士多竒翁叔元以茶酒賜奠命馳驛回籍照尚書品級頒賜祭葬皆出自睿斷非閣臣擬㫖也在京師弔者莫不盡哀扶櫬出都道㫄騎者多下馬拱立歎息以為難得所過州縣莫不致祭入睢境紳士父老白衣冠涕泣郊迎者近萬人相與扁其柩前曰忠臣孝子雖兒童婦女莫不唏噓沾襟也府君剛毅介直忠孝原於天性篤志聖學潜修默證內體諸心外見諸事平易確實不慕髙逺克勤小物未嘗放逸於性命之淵微造化之精奧雖探討窮索而必以日用倫常為可據於古今之治亂事機之得失皆綜貫㑹通而必以誠意正心為有本生平無戲言戲動好學深思隨事體認天理久之愈益精明遇事坦然泰然有自得之樂明於審理而不惑利害循分自盡而不希名譽因事善處而不執成見見義勇為而不計後功處紛錯心常寧一遇患難神色閒定當幾立斷而未嘗後時窮達一致而廓然無纍自治甚嚴而待人甚寬宅心平恕而守法不阿遇卑賤而不侮對權貴而不懾溫然而不可犯侃然而未嘗激故其居官也未嘗有所與於人而人愛之未嘗有所威於人而人畏之僚友不言而咸服百姓聞風而革心雖頑梗黠悍之徒沉迷膠錮之俗莫不令之而即行教之而輒化間有貪墨之吏強暴之徒不得已見之彈章加之刑憲者亦未嘗不以府君為仁人也人皆知府君剛正亷介卓然有壁立千仞之操而其所以感之而立應既去而民不能忘至誠惻怛痌瘝一體之心有潜入人而人不覺者世或未之知也生平居無廣厦出無文軒家無侍姬食無珍羞吳署多隙地春月薺生日採食之不厭不孝等嘗從容陳說以為何太自苦府君色戚然不答不孝等數數言之泫然流涕曰吾非欲儉汝祖母未殉難時日食粗糲我未逮養故也生平無雜學因先大父病始學醫卜葬地學堪輿占易以彖象為主常曰易非教人趨吉避凶祗審理之當否其進退存亡介在幾微間非沉潜玩味不能得也人有一言中理者輒心推遜之且終身不忘聞某處有賢人及文學之士嘗以不見為恨見四方人必問其土俗民情遇節孝孜孜惟恐其沉沒所至興學育才成就為多至人有負已者過則輒忘不留於心在林下時或勸之著書曰學貴日新今之所是異日未必不以為非何敢妄為及再仕雖欲為之不暇也故著書最少所著有洛學編二卷補睢州志五卷詩文二百餘首公移條約約十餘卷未盡行世今江南常州府奉祀道南書院蘇人特建祠於學宮有司以時致祭惟謹而紳士復肖像於懷嵩堂中嵗時瞻拜數郡畢至里中從祀鄉賢建特祠奉蒸嘗焉府君生於天啓丁卯十月二十日已時卒於康熙丁卯十月十一日卯時享年六十有一配我母馬氏封恭人州庠員鄉飲正賔諱中駿公女子四長即不孝溥廩膳生員娶王氏壬辰進士江西提督學政僉事諱震生公女次濬廩膳生員娶袁氏國子監監生諱賦諶公女三沆廩膳生員娶宋氏巡撫江西都察院右副都御史諱犖公女四準娶侯氏辛丑進士中書科中書舍人諱元棐公女女三長適已丑進士廣東韶州府知府趙公諱霖吉子監生登先府君卒次適已亥進士湖廣當陽縣知縣李公諱遙子廩膳生員中三適廩膳生員張公諱銘鼎子生員淑文俱馬恭人出孫五扶光聘丁未進士山西懷仁縣知縣崔公諱九嶷孫女廩膳生員諱玳女光裕聘江西提學僉事王公諱震生孫女候選州同知諱組女傳臚聘當陽縣知縣李公諱遙孫女監生諱初女俱濬出進賢聘壬辰進士江南鎮江府海防同知吳公諱淇孫女監生諱學頤女長真幼未聘俱沆出孫女七長適當陽縣知縣李公諱遙孫監生初子栥次適戊戌進士户部右侍郎王公諱遵訓孫考城縣儒學教諭諱光臯子生員肇煒三許字庚戌進士原任內閣中書王公諱錞孫監生諱涵子采俱溥出四五六七幼未許字四五七濬出六沆出康熙二十八年十月四日奉窆於州城東南棘故城賜葬新阡不孝溥等苫由昏迷中和淚濡毫語無倫次惟冀大人君子哀而賜之銘感且不朽墓志銘長洲汪琬撰康熙二十六年冬十月十一日工部尚書睢州湯公斌薨於位年六十有一公之病也上遣御醫診視及薨又遣滿漢學士湩酪奠公柩命其孤馳驛護公喪歸詔豫祭葬如故事訃聞於吳先是公嘗駐節吳中去逾年而吳人追思不忘為公建生祠於學宮至是㑹哭祠下者數千百人悉號慟失聲有識謂數百年來自周文襄王端毅兩公而外巡撫未有如公者也而前公巡撫江南者方柄用勢焰張甚忌公聲望出已上又嘗以事徵賄巨萬於吳有司有司議率民財以應公禁不許遂銜公刺骨公既去吳還朝上眷注益厚忌者日夜用蜚語讒公於上前必欲擠諸死地賴上神聖稔知公無他公故得保功名以終殆公捐館舍未逾月而忌者事敗踉蹌出都門凡都人士訖吳中父老子弟咸指斥夫已氏姓名㦸手相詬詈以其媒蝎公故也由是朝野公論始大白而公之志不獲伸於地上庶幾其伸於地下矣越明年諸孤將卜葬州東南黃岡之阡先期遣使以書及行狀來請銘琬嘗與公同為史官又辱知交最深乃核其世次官閥事行之實序而銘之謹按公字孔伯别自號荆峴晚又號潜菴先世由滁州之來安以軍功為金川門世襲百户其後調睢陽衛遂家於睢後又以功世襲指揮僉事五傳至明威將軍岷州衛守僃諱易者公髙祖也曽祖趙城縣縣丞諱希范祖州學生諱敏考州學生諱祖契以公䝿封中憲大夫陜西按察使副使妣趙恭人李自成之亂恭人被執罵賊不屈死琬嘗文其祠堂之碑繼母軒太恭人公少不好弄稍長益以學自奮於書無所不讀而尤好習宋諸大儒書年甫踰冠舉順治戊子科鄉試明年㑹試中式越三年成進士改𢎞文院庶吉士授國史院檢討時方議修明史公疏言宋史修於元至正而不諱文天祥謝枋得之忠元史修於明洪武而亦並列丁好禮布延布哈之義陛下應天順人而元二年間前明諸臣猶有未達天心抗節以死者似不可槩以叛書乞頒寬宥之詔俾史官得免瞻顧則諸臣幸甚政府見公疏不悅世祖召至南苑慰勞再四於是聲譽大著居無何詔選翰林官任監司俾習知民事以需大用公與在選中出為潼關道副使於是中原初定王師方下滇蜀關中當用兵孔道征調往還者旁午頗驕橫不戢民間苦之加以差徭煩重相率竄走山谷公戒屬吏毋科取民財毋妄用驛夫兵來吾自應之已而駕馭有法來者悉奉約束惟謹不三年流民歸復業者踰數千户關中多盜公嚴行保甲法量地逺近俾民間各設鉦鼓炮石盜至即以次傳警頃刻數百里近者赴救逺者各扼要地盜故不敢發發亦輒得所屬遂大治升嶺北道參政公治所在贑贑四省上游地穹山深箐大盜窟穴其間時時出肆焚劫值海寇犯江寧贑人騷然各洶洶思亂公密陳方略於上官擒盜魁一人誅海上諜者一人及城中姦民與盜通謀者又一人而貰其餘黨贑人以靖上官方倚公如左右手而公念其父中憲公竟乞假歸矣自是里居將二十年性故亷介補衣素食怡然自適官吏不知公者或相凌侮亦置不校也中憲公服闋聞孫鍾元先生講學蘇門賃驢往受業門下每質所疑先生亟稱之歸而所得益邃所行亦益力屹然推中原巨儒舉朝賢士大夫交口稱說以薦舉復起御試甲等補翰林院侍講與琬輩同入史館充日講起居注官尋轉侍讀出典浙江鄉試還充明史總裁官既又直經筵纂修兩朝聖訓公在上前進退翔雅敷陳詳盡深契上意超擢內閣學士兼禮部侍郎遂以右副都御史巡撫江南陛辭之日賜鞍馬綵緞白金五百兩繼賜御書三軸諭曰展此如見朕也其眷注多類此江南故習豪侈而吳中尤甚服食玩好多不節乂喜蒱博諸戲嵗時婦女爭炫粧冶服嬉遊山水間以為常而市井無藉子率尚拳勇用鬬毆恐愒民財事急即恃勢豪為囊槖不可究詰其尤無良者則鬻身旗下借以修故釁公悉禁止不少貸素多淫祠事楞伽山五通神尤嚴甚寒劇暑載鼓吹牲帛往賽禱者駱驛相繼奸巫淫尼闌入人閨閣競相煽惑吳人以是益困公廉得其狀躬至五通祠取土偶投諸湖中衆始大駭久而又大恱服為政簡靜然下令期於必行賕吏蠧胥悉搖手屏足相戒不敢犯重修泰伯祠朔望必往躬謁乂謁范文正公及周忠介公祠以為衆勸數親詣學宮命諸生講孝經俾幼稚悉得列坐以聽拊循細民若惟恐傷之者吳俗自是大變雖窮村僻壤莫不感頌其政里巷因公之姓至以諺語呼公清湯云公屢上疏訴吳人疾苦請改竝徵積逋為分年帶徴請捐十八十九兩年災缺請除邳州版荒田賦又請捐明神宗朝所加九釐餉又請免淮揚徐水災諸州縣賦部議或從或否而公初未嘗憚煩也二十五年春有詔擢禮部尚書掌詹事府事吳人空一城痛哭叩轅門留公不得則塞城闉阻公行又不得則遮道焚香以送者亡慮億萬人踰千里不絶及公渡淮乃已忌者覘知之愈益憾公上遇公厚每㑹推㑹議必問湯某云何公亦感上殊遇凡是非可否必侃侃正言不婀不撓忌者方力謀中傷顧未有以發而㑹五官臺郎董漢臣上書言十事語侵內閣或言漢臣本不知書有代草者御史受風指深文劾漢臣內閣擬㫖下部究主使上乃命集九卿更議衆咸欲抵漢臣罪忌者逆沮公幸勿倡異議公曰彼應詔言事耳大臣不言將愧謝之不暇而忍周內耶因舉手自指心曰如此中何忌者大慚且憤所以誣衊公萬端且摘公去吳時教令中語指為市恩干譽於是公已患病竟為讒言所中有輔導皇太子之命公以病辭忌者欲藉是加罪上不聽僅令回奏遂嗾廷臣交章劾公又不聽後先報聞而已先是公病思歸自以新被讒不敢請告乃薦前道臣耿公介侍皇太子講冀以自代耿公老儒迂謹與舉朝不相得復嗾廷臣劾公所薦非是部議革職上特寬其罰鐫五級留任猶不愜忌者意羣謀中傷益急公適聞太恭人病乃上疏乞暫歸省上遣使齎手詔慰諭且欲賜第京師命公迎養公叩頭言老母萬不能來奏上有㫖不允公去當公之乞歸也忌者宣言上怒將𨽻公旗下得㫖猶祕之急召詣閣中公以病扶挾上輿道路譁傳湯尚書入旗矣皆泣下而蘇松諸郡客都下者數百人竝集鼓廰門將擊登聞鼓訟寃聞公還始散是時微上保全公禍幾不測矣已而皇太子見公羸瘠大驚曰公果病至此耶越數日命改工部尚書忌者勢不得騁更謀興大獄羅織公罪不數日而公病遂革方禍急時或勸公委曲請諸公居間俾稍解者公哂曰吾義命自安六十老翁尚何求哉或又勸公發忌者隂事以紓其禍公又曰吾有老母在未敢以此試也故士大夫咸以為難配馬恭人子男子四曰溥曰濬曰沆皆州學生曰準子女子三適國子監生趙登諸生李中張淑文孫男五孫女七公平居潜心聖賢之學其於性命之淵微造化之精奧無所不探而一以誠正為本於古今之治忽事㑹之得失無所不綜而一以忠孝為先所撰著洛學編一卷補睢州志五卷詩文若干卷琬前在史館出入必偕藉公淬礪講貫者甚至不知公於程朱何如以視真魏許姚諸儒則當出其上矣琬方請急亦嘗諷公以歸未幾而公欲薦琬為明史副總裁自江南被召又欲以宫寮薦琬固謝不可且曰願與公同其退不願與公同其進也琬長於公三嵗訖今猶靦顔人間而公不可作矣每一憶公輒淚涔涔被面何忍執筆銘諸然琬雅以直諒為公所許倘不能白公之志而暴其受讒始末以示天下後世不幾負我死友哉銘曰猗湯屢遷肇興睢陽逮公之身彌久益昌為國純臣為世儒碩道禰洛閩志宗稷益維我世祖拔公妙年起家內院付以大藩翩然引身潜蟄閭里世祖儲之遺我聖子入登侍從出拊江淮帝念疲氓往哉汝諧再期政成遽䝉前席遘彼含沙伏機以射何交之泰而命之邅屢習於坎出險斯艱風雨露雷罔非帝德帝心簡在寧虞叵測生榮歿哀公奚憾焉天可必乎人定勝天黃岡之丘不騫不圯瘞是銘詩以俟良史祭湯夫子祠文門人王廷燦粵維嵩嶽代生哲人周多吉士生甫及申耆英宿德宰相元臣汝南論道祕閣傳經淵源溯接惟公絶倫初遘竒剝寇羾廬焚貞母罹難誓捐厥身含悲厲志嚴命是遵流離東浙僃歷艱辛依棲山窟猛虎為鄰夜攻墳史彼嘯我呻採薇作飯掃葉為薪或憐餽食固却且嗔義不苟取自昔諄諄幸逢聖代得返里闉文明肇啓應運攀鱗南宮已奏不肯垂紳吾斯未信強學席珍多文為富志非飽溫學優則仕乃達紫宸校書虎觀藜火夜昕古今典故縷晰羣分旋膺旟旐籓守西秦供輸約法安集懷仁瘡痍頓起驕悍咸馴繼遷南贑撫叛綏循靜弭風鶴智掃烟塵江南半壁賴以寧氛劬勞報國輒念老親陳情屢表感動蒼旻去官就養菽水非貧五車博覽三徑叢堙匪耽巖壑實慕昏晨東山久卧屬望彌殷徴書驟下敦促繽紛重登天祿經筵僃陳學惟誠正治先耕耘帝念東南賦重民屯移風易俗非公莫掄澄清攬轡至便埋輪豺狼是問芻蕘是詢暑不張蓋寒不帷茵食惟荼薺飲則氷蓴正已率屬墨吏羣奔屏輿下士道義知尊吳民好訟劍口鋒脣公惟教化告語誾誾吳俗好巫載鬼號神公惟正直投諸水濱利興弊剔刑簡政均積澆仍陋一旦還淳時惟胄教急藉疑丞去我父母師保青振干戈羽籥輔導殷勤詩書禮樂恭敬溫文懋成睿德寵錫彌頻爰陟司空夙夜惟寅心勞力憊一旦忽淪吳民悲慟罷市停畇公之德業實比陽春敷天均被南國尤欣公之節操有似松筠窮且益堅顯則愈伸公之立行一本忠誠求志行義移孝事君公之學道逺紹關閩祗期身體不事謏聞廷燦不才荷公陶甄生我成我欲報靡因今來承乏實公棠隂勿剪勿伐謳誦猶新爼豆禋祀永矢不泯始知直道乃在斯民儀型匪逺愧疚彌㥯拜公祠下來格來歆祭座主湯潜菴夫子文仁和受業沈佳嗚呼道歷千載聖逺言湮不有哲人孰繼其傳繄惟夫子鍾嵩嶽之靈秀紹伊洛之微言力闡乎天人之祕識參乎造化之權以一心而為百代斯文之寄以一身而為斯民社稷之攸關方年少而登巍科躋膴仕不數載而遂髙蹈乎林泉及再出而應徵召也內侍講幄外撫吳㑹皆著其蹇蹇匪躬之節而為聖主咨訪之惓惓繼拜司空之命方簡畀以大任夫何竭忠盡瘁竟溘焉館舍之是捐嗚呼夫子之心昭揭若青天白日夫子之行和靄若霽月春溫夫子之望尊嚴若北斗泰山而其任道之勇也不以一已之進退為憂喜每以一夫不獲其所為恥不以一善成名自足常以望道而未見為慚其律身之嚴也凛兮若秋霜之烈毫無私欲之為纍湛然如長江之濯而人不得以私事相干其與人之和也儼然望而起肅即之如坐乎春風秩然言之有條使人皆足厭飫乎其間故其論學則大中至正絶無門戶之同異惟宗乎洙泗濓洛為正傳其述經則審端尋緒沉潜涵泳絶無意見之偏私惟闡乎六經四子為淵源其肆力乎文章也旁搜逺紹含英咀華彚萃百家之㫖足以回狂瀾而搘拄乎中天至於教人之方以躬行為要以涵養真心為宗因人而施務循聖人之成法而不徒襲乎簡編其用功之密暗修默識體認天理雖當事機之紛沓而此心寧一常覺其不愧不怍而恬然於易以象占為主於春秋以經文為正於詩書禮樂則有論述皆以經解經正大詳明日新之學發乎心得而不事穿鑿乎陳言洛學有編郡乘有志而國史之輯則期於確核至厯法象緯輿地下及醫卜之書靡不為之究晰而精専是以德業事功超軼乎百代而大節偉行彪炳乎人寰若夫孝友篤於家庭誠信孚於僚友仁慈洽乎民物自童稚以迄强壯自窮居以逮仕宦無一事不可告人而質諸天雖細微之事步履之間有見其暉吉之流露而好善之誠惟恐不及疾惡之剛若將凂焉又發乎至性之醇全擬其遇事明練有更生稚圭所未及而立心正大則與彥國君實相參其志操淡泊有類乎諸葛忠武而造詣純粹殆合乎明道伊川斯真聖朝之名世而得統於儒先者也佳荷蒙甄拔久侍經帷令季子準命從佳遊愧難報夫埃涓思立雪之有日未罄乎仰鑽步趨之力忽聞曳杖之訃有失聲於山頽木壞之奚瞻嗚呼易名之典崇祀之儀方有俟乎天恩之寵錫而仰止靡從依歸無所又不勝其寢門私慟之流連然而不忘者德不朽者功不可泯者史冊之垂逺克繼序者孝子之象賢夫子其亦可以浩然含笑於九原嗚呼尚饗湯子遺書附録
