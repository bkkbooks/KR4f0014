body:
  text: 湯子遺書巻十工部尚書湯斌撰詩詠史崑崙有瑤樹丹鳯翔其杪朝餐𤣥圃露暮宿星辰表皓月滿晴空羽翮何縹緲我愛徐孺子清脩自皎皎韜精在南郡髙卧白雲曉羣賢方碌碌誰能測渺杳郭泰奨人倫申屠躭林沼浩然凌雲姿豈復虞繒􅗤夏日詠懐初夏朝氣清緑隂映竹閣好鳥時来集微風散林薄養疴豐暇日坐臥對雲壑圗書紛几席茗椀常間錯偶爾屬篇章怡情志簡畧採藥支短笻尋泉踏芒屩豈曰謝浮榮明志貴澹泊世人逐妄跡真源誰啟鑰柱史崇虚無金仙戒執著大道本淵㣲㑹心在寂寞矜智適成愚要窅何由度鬱鬱南澗松百丈巖如削遙望浮雲中縹緲飛白鶴於斯悟至理俯仰増遼廓金陵别姜西􅈚憶昨桂發時遇子梁谿上攜手遊名園登髙共眺賞我行到白門夜月苦懐想落葉禪房寂忽聞扣門響相見各歡然秉燭對書幌髙樓恣嘯詠古道互推奬鍾阜鬱嵯峨秦淮平如掌信美非吾鄉兹晨理歸槳送我大江濱悲歌何慨慷世事本浮雲素心貴不爽願言各努力庶足慰吾黨題張鞠存見示鄉賢合祀傳昔明神廟時海内正清宴學術半瞿曇文章競藻絢淮上有張公峩峩邦之彦早年登朝著􅍭香侍紫殿典禮佐秩宗矯矯人争羨抗疏定皇儲慷慨淚如霰藩封宗派清文體為一變權貴咸側目拂袖歸鄉縣卧看東山雲丹鉛手不倦再世得農部家學源流衍經術接曲江五車皆貫穿姓字重賢書才華一時擅對䇿繼董賈當宁數稱善正值國歩艱中原日飛箭誰為籌軍需飽騰資酣戰辛苦期報國家憂謝弔唁墨縗更登陴江淮明組練至今鄉閭間童髦頌徳徧爼豆並黌宫春秋報祀延令子當朝傑偕余南宫薦聨轡趨金闕情懐自繾綣相對二十年尺素無由轉奉詔徴文學公名如雷電更有嗣君賢綵筆益葱蒨聨篇復累軸字字重黄絹父子登蒲輪史冊亦罕見余也樗散姿甘老農圃賤濫竽何慚惶待放歸耕便相見叙闊蹤示我鄉賢傳再邦仰遺徽偉績何能撰他年過淮上芳樽或可奠送黄俞邵聞訃南歸揮淚向河梁燕山暮凝雪握手送君歸欲語聲嗚咽定交十載餘千里音書闊今夏再相遇一見驚華髮君家書盈屋石倉未足埒縹緗充畫棟一一為我揭編目近七萬真贋俱能别太母年最髙賢明女中傑喜君有良朋美酒為我設時余憩僧廬徃来無間缺攜書上小舟髙吟青谿月樓頭相顧笑笙簫為暫歇是時有明詔徴聘到巗穴使者頻至門敦趨日彌切同人相勸駕君懐獨惙惙向余垂涕言老母年将耋捧檄雖有心中情難委決惟母察其情治装勿使輟讀書逢聖主致身貴蚤達何況旁求殷乃自甘汩没我力尚未衰猶可自存活君聞母訓言躊躇未忍發遲廻復浹旬母意終難越予乆卧烟蘿才力最薄劣盛朝廣摉羅亦預徵書末先後至京師相期砥素節君文髙揚馬聲名動朝列上卿求識面招邀多賢哲一日過余邸顔色暗如鐵云具陳情章未得達天闕出稿以相示一字一泣血三日不相見麻衣腰垂絰乃是凶問来長號肝腸裂唁賻自元宰走弔冠裳白余感賢母徳淚下不能竭憶昔十年時君表我母烈大筆真如椽幽𡨕亦感徹我抱終天恨較君更慘絶今日送君歸嚴飇正凜冽痩影何蕭條黯淡桑乾陌努力慎自愛宗祊一身孑母志終當酬毋使性空滅遙望石城雲愁闇為君結賦得黄花晚節香秋氣凜凜露為霜獨見孤英帶晩涼絳葉飄零依碧澗參差鴻雁滿寒塘碧澗寒塘憶昔日芳枝葳㽔金莖宻雲錦髙張霞霧舉遊絲摇曳花欲語過眼繁華曽幾時百卉具腓今何許寒圃蕭條秋風凄玉蘂繁香疎逕齊自有髙松同晩嵗還須竹影􅅖清畦獨立秋光甘自媚安能鬭彩桃李蹊況得長近幽人屋霜根冷枝結幽獨君不見梧桐百丈宿鸞鳯金井葉飄空碌碌送陳别駕自余結茆東澗側往来車盖不相識使君下馬入深林髙譚蘿薜為生色大幅長篇掛素壁鄰翁相見各自失平生性僻耽丘壑十年未履郡齋閾知君為政最風流雪苑桑麻清露濕忽傳使君聞雙訃逺近父老淚沾臆云昔板輿迎養時萊衣進酒樂何極髙堂忽動枌榆念萬里舟車隨不得馬嘶嶺上白雲曉帆落江邉村樹黑此時海内尚昇平逰子南望情嘿嘿一旦烽火照三山闗河咫尺分南北梁園閩海春復秋夢想何由生羽翼今年銀漢洗甲兵家書纔到顔如墨淚灑庭梧枝盡枯童叟赴唁路途塞更聞羣鳥百千翎繞署哀鳴聲不息古来至孝格天人冬笋江魚紀史筆眼見此事最分明一時賦詠傾鄉國我聞此言歎且泣送君南陌百端集吴江水碧越山青一路望君情惻惻長安春日行錦繡山河千里壯龍文氣結九重開流雲遲日春光暖御栁搖颺傍露臺京都自昔稱佳麗城中半是王侯第峻閣重樓夾道懸雲房霧宇相虧蔽上林更接西山色峰疊翠黛烟凝濕朝霞片片藹燕闗照耀金莖淑氣入九陌三條香雲起萬户千門春色裏雕楹銀牓暎花紅光射御溝爛若綺是時至尊坐玉清柏梁賦罷奏咸英爐煙縹緲鸞斾動晨旭黄扉瑞靄平詞臣侍從承清宴珥筆數上南薰殿下直從容歸鳯池傳呼應制文章善只今海内正消兵滇池劍閣掃欃槍壯士不賦從軍樂野老惟聞布穀聲聖人制作追謨誥一朝寮友似嚶鳴微臣竊幸逢景運願作衢謠隨玉笙送富雲麓請假歸閩我昔退耕在南畝先生聞望齊北斗千里贈言古道存朝夕奉持如璚玖重到承明又幾年追隨劍珮良非偶朝罷同看太液雲五更聴漏闕門久容臺政簡晝多閒一巻青編常在手探道欲過羲皇前論詩不作風雅後聖朝禮樂繼唐虞夙夜寅清功不朽月明紫帽動歸心忍上離亭為折栁閩海迢迢萬里餘勸君更進燕山酒至尊稽古資元臣􅈕使山中遺夀耉願公且莫戀雲松經綸黄閣誰當右倘過清溪遇李膺謂厚菴先生為問可御蒲輪否汪鈍翁六十初度先生家鄰具區澤萬頃琉璃界天白異書捫腹五千巻海内共推文章伯六經同異識指歸妙義微言恣探索往余卧病睢陽城南望茂苑風生腋同時應召到京華旅舍蕭條數晨夕史局編摩一載餘接膝談讌曽莫逆共抽金匱論興衰獨秉霜毫判心迹扶風筆削詎専長龍門述作無殊格先生體貌清且癯雙瞳剪水神奕奕閉户文成三百篇一朝紙貴長安陌塵埃難嬰曠士懐片帆歸向五湖宅㡬回延竚想瑶華路逺何由生羽翮昨年奉使過浙西廻艫蹔作姑蘇客先生髙臥聞我来披衣攜手話疇昔月出三更虎阜曉睥睨千秋興莫釋扁舟送我上河梁風苦霜清歎暌隔雲山有約計難成惆悵髙天空跼蹐頭白汗青杳無期浮生浪度竟何益聞君甲子正初周山中樂事良不易雨後寒烟拂釣竿花時芳草侵遊屐河豚欲上鮆魚肥子弟門生環講席我欲從之路阻修側身一望吴江碧順治九年七月二十日上駕親出郊外諭遣定逺大將軍敬謹親王及諸將南征應制壬辰七月御試聖主崇文徳宗臣事逺征偃戈誠廟算勤武豈皇情為廣薰風化仍期瀚海平曉雲隨鳯輦秋月近龍旌湛露分丹禁彤弓錫漢京投醪御酒徹緝衮軍容清湘野懐征斾滄波待洗兵應聞旄羽至率舞拜干城中秋蘿翁齋中讌集僻巷逢迎少惟君得數過爽秋今正半髙友意如何卜宅門相望論文興不磨開樽臨紫桂解帯掛青蘿洗硯索新賦分題和舊歌隔籬見怪石轉逕踏深莎樹杪􅀫鴉動燈前墜葉多舉頭看素魄回盼失銀河銅漏還傳箭金烏漸耀波百年日日醉莫自歎蹉跎省耕夏甸傳遊豫虞廷重省方恤農煩儆戒任土定輸將往牒休堪著興時道自長親推廻黛耜祈穀卜年芳鸞輅乗春𤼵鳯旂拂曙張屬車連迥陌羽葆度横塘郡吏迎僊仗遂師覲衮裳風吹桃葉嫩雲罩麥畦涼曲水瀠軒蓋晴林駐鷫鸘咨詢保介切申勸耔耘忙聖澤霑原隰龎眉樂帝鄉寳岐􅅤雨翠髙穗暎霞黄帳殿看馴雉平田認逺楊實函欣亞旅蔀屋富倉箱無逸成天徳思艱邁古皇寛徭恩屢紀賜復史難詳國步登淳古民風躋夀昌舜絃聞慍解堯酒醉衢康共識氤氳氣永覘嵗徳祥􅃎風今繼響奕葉頌無疆應詔御試恭紀四十韻虞帝闢門日鎬京訪洛年䕫龍賡喜起畢散接班聫號令多師古聲華重集賢縹緗充玉几冠珮秩經筵天錫圗書秘春呈雲漢鮮體仁功自懋建極道無前制作開三統清寧撫五絃詩歌諧雅頌翰藻麗山川游衍懐明旦絲綸動象躔鴻儒聚白虎侍史撤金蓮棫樸功施久鈞陶禮樂全旁招窮海澨籲俊及林泉薦引寧論地吹嘘不計員公孤方拜讓臺諫復駢肩岳牧搜揚切宰衡啟事連雲巖鶴詔促谷口蒲輪遄緯度占文耀風雷起蟄淵渥洼空駿馬湘沚絶蘅荃盛舉超曩代曠逢豈偶縁自當謹舞蹈何敢尚迍邅耆碩推轅固妙齡儷仲宣朔南咸至止仕隠各無偏争著京都賦競裁羽獵篇月分漕輓米日費水衡錢魚媿馮諼食金羞郭隗先霽陽當禁苑芳樹映華旃典禮臨軒重工寮將事䖍瓊階聞曉奏綵仗遶爐煙五字英才著一經舊學傳文成獻黼幄賦就立花磚東壁霞光燦少微淑氣纒龍顔常自喜鳯扇欲徐還不數瀛洲宴儼如紫素旋同聲稱飲瀣野老羨登仙才豈馬卿亞䖍承孝武憐兩朝感際遇一志矢貞堅謳咏休明瑞祈瞻厯數延得賢摛漢頌大寳續唐編遜志期宗傅健行望體乾昭回垂萬禩奕葉奉堯天院中􅀫直八韻清切推丹地瞻依近紫宸龍池鐘漏晩鳯沼月華新古水流霜影宫雲澹玉津聖皇開治象元化正􅅤淳幸備班行後叨承異數頻端貞期拜獻樗散愧冠紳年老才將盡憂多道轉親夜深星斗闊始悟與天隣送林玉巖奉使琉球十二韻水國藩封逺儒臣星使遥鸞章頒絳闕麟繡下青霄嶺路秋花麗閩山􅀫霧消前驅陳玉節負弩簇金鑣到海風常正開帆浪不驕扶桑看湧日蜃市障廻潮島嶼疑神岳京華認斗杓鮫人迎上客卉服護仙橈博望通殊域陸生重漢朝文章堪喻蜀干羽足征苗不數樓船績寧煩銅柱標歸来王㑹日拜手聴簫韶中秋陸處實同年留飲齋中和吴見末韻二首相對話平生開樽聴雨聲客中逢令節林下見交情白社風原古柴桑世不争從来樂志者非是愛逃名别墅仍留憩竹林笑語聲兒童知客意鷗鷺識秋情天肯容吾懶拙能免世争他年重過訪不必更通名寄示兒溥二首浪跡真無計門庭汝暫持雨多憐稼悮地下慮牆危官税完應早鄉租催漫遲近聞文體變前輩法須知汝祖墳前樹今年看㡬回叔賢書共讀弟幼酒同杯藥裹宜常曬柴扉莫亂開初冬當返棹候我竹林隈西湖聴荘蝶庵彈琴繋纜孤山下石床理素琴嵐光千嶂滿松影六橋深古調傳天籟清弦寄道心曲終人亦静明月照幽襟送陳别駕之南陽送客宛中去行吟驛路紆浮雲髙宻宅古木武侯廬險隘商顔近士風京洛如此鄉兵火後邑井半邱墟家居感懐四首濫綴先朝供奉班平明珥筆待龍顔辟雍進講華旃細籍畆親推黛耜旋南國逺通璚海貢西羌不閉玉門闗滄江白髮君門逺悵望髙天未可攀巖闗鎖鑰設咸東指顧河山百二雄華嶽崚嶒髙漢苑渭川波浪注秦宫旌旗閃日貔貅静冠盖連雲蜀道通自是太平多暇日書生何以答皇功蕭條僕馬南安署日倚江樓眺碧岑瘴嶺朝昏雲似墨蠻村草木桂成林歸鄉幸慰趨庭志臥病終違報主心一葉扁舟還載石片帆風正自長吟城隅小築避風塵三逕茅齋可寄身藥餌闗心朋舊少青編滿架校讎新傍松叠石平如案裛露看花折贈鄰崖岸年来消減盡荘生齊物不須陳立春冬晴正覺日霜静風轉俄驚節序新倚檻臘梅香欲盡隔溪官栁翠先勻時艱可信滄洲穏老去方知古道真擬待東林鶯語細莫辭華髮醉芳春春霽友人以詩相投書此謝之春霽園林暖尚遙石欄殘雪未全消同人詞賦相投贈把巻吟哦慰寂寥箕斗浮名終是幻巢由髙枕不須招眼看藥笋沿溪緑岸幘披襟酒一瓢春日即事次信菴韻杜門久矣謝繁華不道春光取次奢栁市煙籠􅅤宿雨桃村日照散明霞舊蔵禊帖時開玩新註茶經可共誇迸笋當階礙杖屨茅軒小逕不妨斜春日感懐兼呈仲方漫説登臨春事饒衡門兩版閉清宵頻聞白帝烽烟暗苦憶朱方鼔角遥憂世何妨同濁醉畏人真欲混漁樵袁安小閣知鄰近箬笠往還不待招崇禎壬午闖寇破寧陵文學翟先生仗節死之今督學使採輿論祀之鄉賢余感其事聊述短章紀之成仁本屬中庸事落落乾坤有㡬人天以三綱作砥柱士將一死答君親理無兩路須求是節到當頭要認真我至沙隨弔往烈泮宫俎豆肅冠紳新秋雨後抑荘西齋讌集雨歇林溪煙未收凭欄雲物見新秋葉心菓熟紅將綻階面苔深翠欲流碁局頻移竹映榻酒壺好待月登樓惟君最愛清狂客塵世何人識醉遊京口贈友人結宇三江紫岫間薜蘿遶蹬俯澄灣陸機文賦年方少陶亮閒情興未慳花滿芳樽留素月牕明綵筆照青山把君一巻吟蕭寺夜雨孤燈好閉闗錫山别賀天士浪跡湖山求友聲文章惟爾重西京一時贈縞多名士千里傳書動上卿對酒方驚秋葉晩登舟已掛片帆輕莫愁别後雲鴻闊梁苑吳江月共明東林寺二首疎雨松林白鶴棲逺公精舍一峯西青楓雲鎖談經洞碧水蓮開送客溪法相仍傳阿育記殘碑猶是晉人題石欄把酒懐元亮烟遶柴桑望欲迷參差石勢抱禪扉萬仞羣峯帯落暉碧磵渟泓數磬響白雲縹緲一僧歸閒從苔壁識殘籕静愛風泉坐釣磯五老青牛烟嶂外明年䇿杖莫相違戊午應召入都留别里中親友二首蕭然蘿薜絶雙魚雲外忽傳有鶴書學道原因息翮早出山翻悔避名疎幽花谷口遥相映野鷺溪邉迥自如龍尾班行真濟濟拙庸應許歸茅廬簇簇郊闗擁畫輪臨河握手話酸辛藝花選石多同調待漏鳴珂少故人倦鳥寧能歴逺岫歸雲何意覆通津入朝倘得辭簮紱春水還期理釣綸長垣北十里學堂岡有夫子廟相傳四賢言志處廟内有党懐英篆書杏壇二大字栁陌乍隨岡勢轉杏壇忽􅅖柏林開轍環魯衛行将老道繼唐虞志未灰蝌蚪文銷存屭贔犧尊嵗久剥雲雷階前風雨傳松籟疑是瑟聲入座來送李子徳奉㫖歸養二首薊門疎雨淡秋隂惟爾斯行重古今賦就上林纔賜第表陳東掖蚤抽簪闗河落照鄉山迥驛路鳴蟬野樹深到日髙堂應戲綵御香未散遶衣襟史才經術在闗中詔領羣儒集漢宫瞻望白雲子舍在拜違黄闕主恩隆比鄰載酒東臯子山史先生戴笠譚詩甪里翁亭林先生囘首應憐同調客編摩寂寞老揚雄辛酉二月初侍講筵紀事二首文華春殿旭光濃帝簡儒臣侍九重紫禁天章詞煥爛紅雲寳幄語從容細旃風定牙籖啟袞袖香飄玊珮從典學千秋際聖主微臣何以稱遭逢御氣氤氲繞玉皇西清霞彩映龍裳經陳謨典天心正學闡勲華帝道昌敢向盛朝稱管晏何須文藻繼班揚恩深覆載安能報誦讀衡茅志未忘擬上賜大臣遊温泉詩四首山陵叠翠倚層霄瑞靄晴臨碧澗遙石上泉聲隨玉漏巖邊樹色暎金鑣雲峯逺結盤龍氣瀑水近當踞虎橋一奉恩榮歌鎬燕長從仙蹕聴簫韶碧潭波遶翠微迴帳殿紅雲覆緑苔閬苑烟深朝絳節華清春曉對蓬萊山光獻夀天杯永寳翰騰輝御牓開萬國共瞻隆孝治漫言驪阜重仙臺傍巖依岫敞離宫詔賜恩波卿貳同閣道周廻香溜裏衣冠趨步彩雲中不須雕斲傷元化惟有真淳表聖功何事露臺誦漢主萬年儉徳仰皇風薊北烟巒俯大溪甘泉春色接丹梯曉来嵐氣當牕入雨過花光拂座低摇曳霓旌依磵轉參差豹尾與雲齊願將景物同民樂薄海烝生望紫泥人日椒花彩勝懶隨人閉户攤書笑此身白首校文嘗午夜寒天㸃易及霜晨節遲時未立春郊栁應含凍雪少村梅可放春稍待西山芳草緑招邀朋輩醉芳辰題畫秋林不厭静髙士自能閒鎮日茅亭下開忩對逺山西来庵題壁禪門深鎖萬松間江上白雲自往還雨過捲簾無餘事一編周易對焦山西来庵贈水齋上人上人舊為寜夏總兵白馬西来掃野雲居人誰識舊將軍楞嚴讀罷焚香坐一缽江泉到夜分戲贈飯辦松花芰辦衣同羣鷗鳥渾忘機駝岡不減柴桑社擬剪蓬茅待汝歸贈懐慶太守二首野王山路曉雲横一水瀠㢠繞郡清兩岸栁條凝露濕年年常見使君情西門古廟鄴城隂父老笙簫直到今見説行山青似黛濟源争比濁漳深詩餘賀新郎秋思雨脚纔收了竹簾開梧桐墜露淡烟如掃一派秋聲吹木末況漸蘋衰楓老問今嵗秋光多少貫酒東臯凝望眼看浮雲變幻入林緲思疇昔縈懐抱空江採得蓴絲好櫂輕舠遙峰隠約放歌霞表世事渾同蕉鹿夢擬向華胥醉倒更説甚桃花源杳白帢青鞵尋釣侶待月生一笛驚鷗鳥悲歡話付溪草滿江紅後池秋葉蓮盛開漫賦藕葉鋪池連隂雨溪流青漲東里叟扶笻還問後渠無恙隨地菰蒲雙鷺宿垂楊半掩波紋上碧烟開映曉弄新妆輕盈状廬山社幽情漾湓浦岸清風宕似層層紅艷美人堪餉月下時聞芳露滴呼兒學作漁郎唱夢醒来十里野塘中遥相望千秋嵗八月十六日夜玩月暮霞成綺又送氷輪起花影裊簾波細輕清河漢色珍重嫦娥意今嵗好今宵賖取明年醉玉笛情堪寄雲母屏還􅀝𤓰再削盃重洗紅牙翻舊譜妙舞風吹袂澄露滴盈階桂落天如水滿庭芳秋日閒居雲澹霜洲鴈飛葭浦兩行烟𣗳柴門紙􅆤茅屋秋氣映朝暾壮嵗歸田作賦十餘載髙臥邱園漁樵伴時来問訊紅葉認山村漫論古今事柴桑谷口往跡猶存但茶香竹裏酒沸松根午榻清眠夢覺看籬畔菊蘂堪飱凭欄坐南華一巻朗咏到黄昏湯子遺書巻十
