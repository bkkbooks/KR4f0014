body:
  text: 湯子遺書卷七工部尚書湯斌撰傳墓志行述狀明兩浙運使警轅張公傳張公諱正學字宗儒號警轅睢州人世居潮莊之南三里父諱權號樂菴纍贈中憲大夫廬州府知府母王氏纍贈恭人公丰儀秀偉孝友天成十嵗授尚書為文落落有大家風弱冠入府庠食餼名聲藉甚萬歷癸卯舉於鄉公車歸楗户著書泊如也癸丑成進士以素恬淡嗜讀書請改教職甲寅補順天府學教授董率維勤乙卯門下士獲雋者十餘人是年升國子監助教丁已升刑部主事歷員外郎中秉公執法多所平反時南臯鄒公為侍郎歎服之嘗云張君精神收斂退藏真是歸根之學由是名益著辛酉升廬州府知府下車即修學宫鋤衙蠧廬郡承平日久城池頽壞捐俸築濬尤杜絶餽遺有庫吏暮夜以金杯等物持獻欲有所關說面叱之加以重法於是羣吏人人股栗凡斷事平心細訊必得其情時巡按某受重囚賕欲盡釋之公持不可又票取無礙官銀千金亦不應巡按大怒思借事中傷摉索無隙乃止稍遷兩浙都轉運鹽使司運使慨然曰古人急流勇退吾可已矣遂致政歸里居竿牘不入公庭課子孫讀書教以孝弟謹厚每遇豪强不法事輒為之憤悶至終夜不寐嘗曰凡做事只要自已心上打得過便為之打得不過即毋為睢之婦人孺子無不稱之為善張云是時袁大司馬可立楊大參堯華余光祿化龍皆以耆碩里居相與聫席結社碁酒娛樂修耆英香山故事鄉里榮之至有傳為繪圖者年七十有七卒崇祀鄉賢配李氏纍贈恭人蚤卒繼配孟氏纍封恭人男一辰垣生員孫二銘鼎庠生銘旗庚戌進士杞縣劉文烈公志其墓論曰吾郡自萬歷以後士大夫習為驕奢凌虐鄉里至今道路以目而公獨以善張著今考其行事蓋真秉道絶欺確乎不可拔者矣其子孫皆恂恂善下人雖通顯猶杜門誦說詩書無挽近儇薄之習謂非公之流澤逺乎余故為紀之使後進有所觀法焉樊隱君傳樊隱君諱夢斗字北一號文成明崇禎壬午鄉貢廷試第二人嘗上書闕下請為國家效力封疆奉㫖報可稱隱君者從君晚志也其先世小興州人明成祖時奉詔遷文安遂為文安人髙祖諱瑀成化甲辰進士筮仕浙川令為刑部曹郎日逆瑾用事平反主事安奎獄面折瑾因忤㫖酷暑跪午門三日㑹瑾敗轉四川順慶府知府稱名臣瑀生繽繽生潤皆長厚有隱德潤生效才萬歷癸已恩貢入太學葉文忠公為大司成歎賞其文與閩漳蔡震湖大名成文穆公髙陽孫文正公名相埓除知文縣調靜海教諭改建文廟多士頌服升河南府學教授致仕隱君之父也君少穎敏年十二補博士弟子員於書無所不讀常苦漢賦用事多隱僻為之音釋句櫛字比展卷瞭如著中庸講義原性道究天人精義入微桐城左忠毅公見之曰此洙泗真傳也當君應廷試時國事孔棘自以纍世受君恩且才可濟時欲效尺寸力率同貢十餘人上書將受職矣無何以內艱歸君至性過人平日事親色養甚篤至是慟哭出都門跣行三百里襄大事誠信備至撫兄子愛而能勞舉人王膺其姪壻也殉寇難遺孤呱呱君收養之使與子翰同寢食學同師兩姊貧無所依生死周恤不遺餘力論者以為內行純篤倣佛陽亢宗云邑中築城濬河賦役鹽鐵諸大議人所畏葸不敢言者輒言之鑿鑿可見諸行事其屯海八議侍御吳公稱為經國碩畫將上之朝㑹亂不果值明末都城之變俯仰唏噓既力不能為遂絶意仕進攜家入桐柏山中偕二三老友攀枯藤捫蒼壁翠屏玉女龍潭石門號淮源勝地無不窮極幽絶詩成放歌浮白慨然有超世之槩病中遺命子翰曰死即葬我山中百嵗後樵採兹土者指某丘某水為隱君樊某遊釣賦詩處足矣所著有駐槎亭詩集若干卷子翰順治甲午拔貢康熙丙午京闈鄉薦今任睢州學正以文章行誼著湯斌曰余官京師與同門文安髙君遊詢其鄉里故實輒娓娓談樊氏世德不衰云後過蘇門孫徵君先生授以髙陽文正公藏稿復得讀其所為樊氏家傳蓋自順慶公以直道著於𢎞正之間二百年來家學不替三輔世族莫敢望焉隱君明經好古博極羣書孝友篤行內外無間言若夫磊落大節盱衡時事鬱鬱未能表見於世者時人未能盡識也後之君子好學深思讀其遺集亦可慨然太息想見其為人矣王氏五節烈傳山東新城王氏有烈婦三曰孫氏于氏張氏節婦二曰張氏髙氏孫氏者浙江布政使象晉之冢婦生員與齡之元配也崇禎壬午十二月朔賊兵破新城家人勸避匿孫氏曰婦人非傅姆不下堂我未亡人也有死而已遂投井死越三年甲申李自成陷京師則有于孺人隨侍御公與𦙍夫婦殉節之事時侍御方以建言左遷家居聞變以死自誓或言公無封疆社稷之任可無死于孺人獨不言既而曰妾從君稱命婦矣君為忠臣妾獨不能為烈婦耶遂登樓相對自經死子士和泣曰父死忠母死節兒何心獨生亦自經於其旁而士和妻張氏先於壬午城陷自經死壬午城陷時王氏父子兄弟殉難者曰貢生與朋與其子舉人士熊生員士雅士熊妻張氏年二十一士雅妻髙氏年十九兩人同矢志守貞事孀姑盡孝兩家皆名族髙氏尤貴盛布衣糲食有人所不堪者紡績自給姻黨罕見其面惟元旦一出拜家祠而已湯斌曰新城王氏簪笏盈庭以文章勳伐著聲當代者踵相接矣侍御公尤以忠烈著一門之內子孝臣忠可謂極盛而閫範尤焯焯如此豈正氣偉節有以相感耶抑家訓之浸漬有素也孫孺人為婦為妻為母皆有法則而侍御公歷官清白家無長物于孺人警戒之力居多世固未有平日不能盡道而能自靖於患難之際者也張孺人以少年慷慨殉難兩節婦貞操久而彌堅尤人所難者士君子立名砥節常壞於因循即或勉强於初年而不能不渝節於末路吾故合傳五節烈為世示法焉廣西參議戴公傳戴公諱璣字利衡號紫杓福建長泰人父封奉直大夫諱􅟼好義樂施雖家世通顯而布衣徒步淡如也公與弟璐孿生有異徵少力學厭時文熟爛之習為文原本要理涵演貫通赫然有聲諸生間弱冠領鄉薦順治己丑成進士授户部雲南司主事出納惟慎辛卯分較京闈所得多知名士𣙜關淮安持大體不尚苛細商旅便之調吏部驗封司主事廉靜自持人莫敢干以私權貴有忌之者例轉湖廣按察司僉事整飭上江防道時滇黔未入版圖軍書繹騷公按部遍履山川得其厄塞要害乃自嶽州至嘉魚立七汛蠲俸造哨船募兵巡邏雈苻無警洞庭湖盜賊出沒糧艘賈帆時多不虞公復設三汛申明法令湖湘宴然洪文襄公經略五省統兵𠞰西山羽檄旁午公咄嗟立應軍需無誤而民不知兵文襄公深器之曰此韓范儔也尋遷陜西布政司右參議分守西寧道楚民號泣攀轅至遮道不得行而封公訃音適至公徒跣奔喪哀毁盡禮服闋補廣西右江道駐栁州先是東䦨土酋韋兆熊土目龍苖黃周等搆亂日久公宣布德意不旋踵投戈請命嗣值大酋唐應元之亂斬渠魁梁邦傑以殉猺獞諸蠻畏懷德威頑梗盡化柳堡屯田寄佃於民既輸軍租復應民役編户苦之公為申請督撫具奏獲免復修葺文廟及羅池司户二賢祠栁人蒸蒸向學逺近德之公宦轍所至多值繕兵庀餉猺獞交雜之地而寬猛相濟先恩後威無赫赫之名而能使反側歸心蓋其本於學者深非權術以就功名者比也㑹有裁併監司之令因解任歸杜門却掃足跡罕至郡城課督諸子教以忠孝大義甲寅耿精忠反臺灣賊據海澄有言於公者曰盍一見乎可以免難公正色曰生平讀聖賢書所學何事叱去乙卯夏賊圍漳州時次子鏻為海澄公裨將守東門賊劫公至城下使招鏻降公厲聲大呼兒努力堅守勿以老人為念賊怒牽之而去城破鏻巷戰死闔門為俘公曰鏻兒死王事吾無憾矣丁已二月大兵復漳州賊遁去公與子鐦等乘間扶攜入山而元配黃恭人併諸幼子為賊執赴臺灣人以公且不能堪而公壯志不少挫也戊午六月海寇復犯澄邑及長泰公再被執渠帥曰崛强老猶在乎今日順則生不順則死公慷慨曰吾年七十餘死固其所也曰如諸兒何公曰兒曹死生有命吾頭可斷志不可奪目直上視氣勃勃不可禦賊本無意殺公幽之密室歷年餘終不屈朝夕誦文信公正氣歌以自壯一日顧謂子銑曰吾久辱不死何為遂不食數日後病甚肅衣冠命銑扶掖北向再拜曰臣死命也當為厲鬼以殺賊因慷慨悲歌大書惟忠惟孝可以服人數字嘔血數升而死時康熙十八年六月望日也年七十有四逾年耿逆伏誅臺灣相繼歸附子鏻以殉難贈都司僉書其孫法以别駕謁選至京叙公行事聞於朝而睢陽同年生湯斌為之傳贊曰公􅏡歷中外所至具有聲績年七十餘已去官而父子先後殉寇難可不謂賢歟公先世中丞公當明嘉靖時治河撫軍名業爛然司馬公於萬歷間平岑溪府江諸蠻功最著載在史冊班班可考他如太僕之剛直方伯之清介皆有足多者而公父子以死事著勳名節義豈獨甲於閩南哉處士孫君傳孫君諱博雅字君僑容城人徵君鍾元先生之第四子也幼端重不苟嬉笑同年生見之輒為斂容甲申年十五應童子試提學御史陳公純德賞其文將放榜值流寇陷京師陳公殉國難君遂屏舉子業絶意仕進從徵君避亂於雙峯一時同避亂者皆弄弓矢刀劍談兵事君獨日攜書卷坐古柏下與人語唯經史及古今忠孝節義事娓娓不倦曰他非吾所知也徵君將遷居蘇門道出祁州刁君䝉吉留講學於家者三月既去而君與母楊孺人獨留貧無以炊賖柿餅以供母徒步奉至蘇門徵君撫之喜作詩勞之母病君不解襟帶不交睫者三旬餘及卒為孺子泣三年不見齒徵君年漸髙偕兄弟朝夕上食祝哽祝噎夜則更卧牀前候其缺伸未嘗少離有所著作則侍筆劄時四方遊徵君之門者屨交於户有數百里或數千里至者君為之設榻供食各得其宜徵君晚年重聽諸弟子問難必藉君轉達雖反覆開示不厭更端間有未暢其㫖者君輒援據經傳發言外之意聞者往往灑然解悟故逺近來學之士與君日親君僑之名遂滿天下徵君著書不下數百卷編摩訂正君之力為多嘗數易稿皆手書字體古健無一筆苟簡蓋其孝謹好學類如此已酉詔舉山林隱逸郡守程公啓朱曰河北諸郡邑吾所知者惟孫子耳以其名上之方伯撫軍君自陳一介腐儒學不通時父年八十安能逺親就徵諸公深歎重之遂不相屈亡何徵君卒哀毁骨立喪葬以禮觀者莫不感動君至性過人漸濡家學德氣日益純粹與人交和易可親見人有善贊揚不置口人有過不顯言默然端坐間引一二古語相感發聽者為之聳然多見省改問以時事似不别黑白至談古今成敗得失瞭若指掌也丙辰弟韻雅坐事被逮繫司寇獄君具槖饘以從庚申夏將逺徙兼染時疫君往來省視僕僕於烈日黃埃中守衛悍卒咆哮怒罵君怡然受之宛轉為弟致藥餌飲食更周恤其同繫者幸朝夕相顧視君故貧又竭産供給弟者已四年故交欲有所贈遺逡巡不肯受旁觀者察其形容憔悴勸之自愛勿徒纍死君曰吾弟行免矣吾何病時方館於崔學士玉階家每獨宿假寐口中囁嚅細聽之皆其弟事也頃之竟病不起彌留猶張目曰吾弟免矣遂卒當其弟之被逮也君追送之奔馳炎暑策蹇驢隨一蒼頭遇暴風雨失道幾溺死後歸家聞有赦隆冬赴京徹夜行冰糊其口呼不成聲僵仆於路幾死又嘗讓蹇驢於同難之械繫者徒步以從解役疾驅百餘里兩足皆腫不得休幾困頓飢渴死當是時君惟痛念先人之積德不宜獲此報也先人之家聲不宜自此墮也弟之懵然驟遇此難冀徼幸獲為天所矜也而不知已之憂勞可以死也死後不數日而弟事漸寬竟免逺徙於是聞者無論識與不識皆泣下霑襟曰孫君之死也蓋死弟難也其友也本於孝也精誠足以感通神明也年五十有五所著詩文曰約齊集若干卷子漢有文名史氏湯斌曰昔孔氏褒融兄弟爭死載之史冊兩稱其義若君僑之於其弟也風雨慘淡肝腸寸折至於不自知有其身憂愁况瘁竟以客死嗚呼難矣其詩曰苦海無舟焉問岸福堂有弟遂成家讀之誰不酸鼻流涕者而况平生交遊如余也夫君僑德性學術天假之年必能昌大徵君之傳而竟以此終抑又悲夫封庶吉士李公傳李公諱兆慶字賴甫閩之安溪人初號漁叔追思父念次公之德也更自號惟念故世稱惟念先生云公兄弟四人並力學著聲而公尤魁梧多竒節為文不假繩尺奧淹閎博屢試輒髙等明季閩海弗靖甲族富室畏縮伏草間往往不能自保公獨聚宗黨擇山中髙阜鳩工築室百堵守禦具備巨寇突至連日夜攻之卒不得志而去公復設立教條鄉里兢兢奉約束逺近賴以保全者甚衆鄉人有淪於賊者傾資贖之初不問其識與不識也嵗乙未家陷於賊仲兄雅稱武健持矛薄賊壘門竟全其家屬而歸人服其才且勇謂亦公素德足以感之云亂定歸舊居楗户却掃藏書數簏幸無恙詮次㸃定課子弟誦讀聲琅然達丙夜今學士其長公也辛丑貢於鄉甲辰自京師還里修宗祠定春秋祭期逺祖墳墓久湮沒荆榛間殆不可考公按譜牒徵鄰翁摉而得之者凡四焉更修輯家乘訪求先世問答遺文凡所以為祖考計久逺者靡不殫力從事蓋其誠孝如此庚戌學士成進士讀中祕書遇覃恩封公如其官癸丑請假歸未幾滇黔告變八閩相繼逆命阻絶聲教者三年學士抗節不屈王師南下間關遣使具蠟丸密陳道里險易進取機宜狀卒成恢復之功者學士稟公之教多也上以學士忠貞懋著特晉秩命入都陛見公促使叱馭而學士念公年老遲回久之不得已後行至福州而公卒公生平厭絶紛華嚮慕往哲時有心得與理學語録默相契合故能踐履篤實大節不苟如此年六十有七子四人學士名光地次鼎徵光垤光坡贊曰余與學士同官京師以德業相砥礪其學浩博淵通而持守堅定一遵程朱不為世儒游移之說與余有乳水之合後乃得聞封公之懿行蓋家學淵源有自矣當學士之奉命赴都也宜星言夙駕而公察其意次且不果知其以已老病故外示矍鑠而私語其室曰度子行瀕至我乃可死耳蓋生平重大義家庭相朂一然諾不敢宿况君父之際乎使學士顧戀親恩愆期不進雖奉含殮非公意也公卒後又值海寇突犯依阻慿險盡有漳泉之地撤晉江橋梁自以為天塹不可飛度學士奮然墨縗誓旅鑿山開道仰請王師椎牛釃酒士馬飽騰造舟為梁一日夜搗其巢穴賊以為自天而降潰敗不可復支盡復兩郡還之朝廷以文學侍從之臣功在封疆人乃知儒者之功用果非虛談無實效也至尊嘉歎壯猷行將倣王文成故事河山帶礪以報殊庸此固所以成封公之志余亦拭目聿觀厥成焉故因傳封公而併及之陜西延安府靖邊同知陳公墓表保定陳公諱實字郁文少穎敏好學善屬文年十九補郡諸生纍試輒居甲等崇禎乙亥略倣鄉試例特行拔貢受知介休閻先生益好學不輟皇清定鼎選知睢州睢自流寇殘破繼以河患城郭丘墟田土蒿萊公至寄寓民舍布袍蔬食招流移勸墾荒詢問疾苦煦煦如家人狀延請文士立社課藝暇時輒與飲酒談詩娓娓忘倦嘗省耕匹馬行鄉一吏持印囊老卒前導而已撫按交章推薦奉㫖旌亷膺白鏹之錫升陜西延安府靖邊同知去之日睢民攀轅遮留至數日不能行為立碑父老見之至流涕延綏邊地民强悍難治公持已儉約如睢時而不畏彊禦署道篆省寃獄申邊禁兵民安堵丁母孫太宜人艱扶櫬歸里行李蕭然惟圖書一篋老僕二人跨驢隨行逆旅咸為嗟歎服闋慨然曰昔年捧檄而喜為親在也今胡為乎遂不起僻巷數椽以授徒為業薄田僅足饘粥戴笠坐栁隂與村叟談說桑麻不知其為官人也二三知友至與論經義酒後賦詩天真爛漫旁及小詞落落有宋人風致不自收拾門人手録得數百篇配某氏子三人繩武繼武紹武能世其學以康熙十七年九月二十三日卒年七十有三當公之治睢也余應童子試公奬拔冠多士語人曰此生當聨第然疏直非善宦者既而曰急流勇退人也余别公後二年捷南宫授館職年三十以病請休林居二十載與公言若相符今起自田間濫充明史之役然近年懶漫益甚行將乞身不知能終不負公之言否一日文字之知公何以相識之深耶公既葬其子繩武衰絰至京請表公墓余既感公之知又繫官於朝不及拊棺一慟為恨乃不敢辭敘次公之行事不敢用浮詞以負公蓋公治行無愧朱仲卿而睢其桐鄉也家居倣佛柴桑徵君焉後之人過公之墓當慿弔髙風低徊不能去也文學幼兆吳君暨魏孺人合葬墓志銘余初就外傅則聞郡中有了疑吳先生者中州名儒也即欲負笈往從而先生棄世稍長與先生冢君冉渠同研席壬辰同舉南宫賦詩論道相得甚歡平居道其家世數數稱大父幼兆公之賢與大母魏孺人之節輒嗚咽霑襟不能自已幼兆公篤學好古僅以博士弟子終年止二十有六葬大麓岡祖塋之次魏孺人守節三十六年壽六十歲卒㑹遭變亂權厝故宅不克合祔至康熙七年戊申春冉渠自京口走使持狀請曰先大父去世巳七十載大母去世亦三十四載矣中間滄桑變故誠不自意有今日今卜三月乙丑奉大母柩合竁於大父之阡淇又羈靮王事不敢以私情請使子弟代襄大事惟是壙中之石不可以無銘銘之莫如子宜余生也晚未及親炙公之懿行然讀冉渠所自為狀與平日所稱述者甚悉又孺人節行考之令甲當膺旌閭之典適際鼎革未有以姓氏聞之於上者則紀述以詔來世固余之任也其何敢辭公諱與㸃幼兆其字先世籍晉之洪洞明永樂間始祖諱誠徙睢陽遂家焉五傳至諱孜是為公之髙祖曾祖諱􅡠祖諱將仕考諱待價娶袁孺人是生公公生而穎異七歲讀尚書及長善屬文不假繩尺而汪洋演迤有大家之氣督學使者按開封拔置祥符縣庠祥符為中州首邑試者常千人公屢試輒居髙等一時名聲籍甚矣公宅在濯錦池上而文昌閣前有别墅東望駝峯南眺襄臺地頗幽勝公鍵户其中圖書充几危坐靜對時時至丙夜猶燈火熒熒弗息也經書之外左傳國語老莊太史之書皆手録評次探究源委採擷菁華論者以為與鹿門月峯相上下云又精書法鍾王虞褚歐顔蘇米諸家墨蹟無逺近必購求臨摩毫髮畢肖乃巳是時公方弱冠蓋將進於古人之域而未巳也不幸而病病數年而讀書益自刻苦人皆畏其志而憂其力之不繼而病竟以是不起魏孺人雍丘名族十五歸於公公之殁也孺人年方二十四贈公方五歲耳公祖父母皆在孺人上奉尊嫜下撫弱子蠶筐紡車以供晨夕舅姑相繼即世經營喪葬戚不廢易伏臘祠蒸手撫贈公泫然淚下贈公入庠文聲日著人且以公之鬱而未施者當發於其子即孺人之志亦庶幾可以少慰矣無何贈公又奄然長逝嗚呼可悲也巳弱孫㷀㷀無依家業漸落又值寇氛倉皇避難憂悸感疾而卒嗟夫世之學者剽竊補綴浮華無根六經諸史茫然不知其原委而身都通顯富貴赫奕者何可勝數也如公篤志古業使學成獲用於世必有大異於今人者而鬱鬱不得志年未壯而身歿孺人苦節終身死喪患難無不備嘗而哲嗣不得奉杯棬以老有歐陽太夫人之節不饗文忠之報所謂天道不可問矣乃今冉渠登科甲佐名郡文章清節為海內推重四方人士言學者必曰中州吳氏諸孫森森玉立譽問霞起然後知蓄之厚者發必達造物固有深意也嗚呼仁者必有後於今益信哉公生萬歷三年某月日卒萬歷二十八年某月日孺人生萬歷五年某月日卒崇禎八年某月日男即了疑先生諱斯信庠生贈推官娶泰初許公女封孺人孫男四淇進士鎮江府同知際隆增廣生代訓庠生曽孫七銘曰積之豐用之嗇德厚流光孫謀燕翼英英象賢丕著鴻業虎變龍騰顯榮奕葉峩峩大麓永奠冥宅松楸蒼然山青雲白其馴者兔其翔者鶴美哉佳城蜿蜒磅礴綿綿千秋哲彥繼作我今銘之神其永托拔貢彥公趙君墓志銘趙君諱震元字伯彥一字彥公睢州人嘉靖癸卯舉人東阿縣知縣諱誥之曽孫隆慶辛未進士大理寺左寺副諱舉亷之孫贈中憲大夫廣東韶州府知府諱夢日之子母湯孺人生彥公甫七歲而孺人卒彥公少具才藻踔厲風發伯叔兄弟負文名者甚衆而彥公尤表表云為諸生不能俯首帖括就舉子尺幅好讀左國考工楚騷史漢之書陳明卿四部奇賞出獨深嗜之伏卷誦讀不輟為文初學孫樵劉蛻改而為燕許後稍稍規摹韓栁得其大意不求畢肖晚年間倣元結頗峭拔有奇致歐曾文雅非所好余每稱歐陽文忠公文彥公因取閲之嘗不盡卷而罷同時獨心師石齊黃先生無論制義䇿論碑銘記述多方購求繕寫丹鉛未嘗有遺為詩自出杼軸不拘一格近代所謂北地濟南公安竟陵皆所不問也寇變後遊棗强歸其詩悲壯蕭涼晚年朴老疏宕近陸務觀明崇禎乙亥間拔貢依鄉試例而減其一場彥公文為成實慈公所賞廷試入都與金忠潔公共研席最為相知兩公後皆以建言為海內所重每亟稱彥公故彥公聲譽滿藝林矣壬午棘闈移蘇門彥公偕其姪陛對往各為百泉賦辭采雄麗登孫登臺醉桃竹園歌罷長嘯聲振林木時人莫測也後屢試輒報罷每遇秋闈策蹇赴汴貰酒艮嶽繁臺慿弔信陵君侯嬴澆酒杜甫髙適廢祠而還不作遇合想庭中怪石數片老樹桃花參差映帶茗碗藥臼意况蕭瑟所謂松青堂也更䦨燈灺伸紙滌硯作蠅頭細楷臨文浮一大白落筆若風雨腕不暇停頃刻數千言拍案髙叫曰擲地可作金石聲但恐腕折何雜及易卜多奇中時時寄興六博以抒牢騷非真好也見人無少長煦煦親愛不為崖岸遇親識尊行恭敬盡禮其弟一為江寧别駕一為農部郎出守韶州雖情懷繾綣終不一過其署髙風雅度殆古隱君子之流歟余自移病歸里同人零落惟彥公往來過從談詩論文相得甚歡今出門漠然無所向此余於彥公之歿不禁流涕霑襟也君生於萬歷二十六年十一月初一日卒於康熙九年八月三十日得年七十有三配李氏繼徐氏先卒於康熙壬子十一月二十六日卜葬於睢城北澗岡之新阡子爾轍爾軾俱先卒孫居易居廣曽孫大升二升銘曰譬如木焉或為匠石所睨而為棟梁或輪囷離奇而老泉石之㫄不可謂棟梁之巍如而歎泉石蕭涼也嗚呼如君之才而止於斯睢水之原松檜蒼蒼後有好古者過之當駐馬而倣徨江南鎮江府海防同知冉渠吳公墓志銘公姓吳氏諱淇字伯其别號冉渠先世山西洪洞人明初遷睢州居大麓岡髙祖將仕曽祖待價祖與㸃以文學名余嘗志其墓所謂幼兆先生者也父斯信博學工詞賦以公仕贈文林郎廣西潯州府推官母許氏封太孺人公賦資穎異好為深湛雄偉之思十五習詩賦清辭麗句往往驚其長老為制舉義不拘尺幅落落有奇氣贈公卒家業中落事太孺人備盡色養撫三弱弟讀書有成孝友為人所難補寧陵庠諸生屢試髙等嗜讀書日記萬言喜怒窘窮患難流離未嘗釋卷至盜賊縱橫匿荒蓬斷垣中生死倐忽猶暗誦不休秦漢金石遺編海外重譯之書讀之欣然自得若平常淺易之辭不屑意也亂後家鮮藏書聞㫄郡舊家有異書數百里徒步往求之纍日夜抄寫盡誦乃巳持論俱有根據未嘗特創一說讀書既多時出其新奇者資談柄時人見其空曠奇肆詫為語怪或操論闢之公不與較也順治乙酉登鄉薦壬辰中㑹試不就廷對里居六載益肆力於學天文歷法律呂音韻易占勾股算術及西洋奇器之學無不精詣戊戌入都問歷法於欽天監考樂器於太常寺窮思幾廢寢食一切應酬俱廢成進士甲次例得京職㑹改新制授推官得廣西潯州時粵地初定多封疆大案公聽之為求生路不得則坐卧不安嘗舉歐陽崇公求其生而不得則死者與我俱無憾之言自警一日斷事畢一囚出而泣曰公仁人也而不能活我誰復活我者巡撫行部務嚴刻博風力公力爭之曰宦粵者皆中土人攜妻子蹈萬里煙瘴地謀升斗祿一掛吏議遂終流落竊願明公愛惜士人若有大奸惡某亦安敢隱哉巡撫感公真誠歎為長者察潯屬果無可糾者以此益信公民朴事簡無學士大夫遊處惟讀書以自適往來省㑹山行水宿蠻煙瘴雨誦讀之聲達丙夜家園萬里宦况冷絶幽憤無聊一寓之於詩自粵西升同知鎮江軍府初立事務殷繁公職海防應一切為之綜理時方視為利藪公悉推讓同官故廳事寂然雅重學校賔禮寒素市書萬卷與文士校讐討論夜則挑燈對讀遇得意髙叫長歌胥吏皆驚起至於簿書寓目而巳署丹陽衝邑驛費浩繁歲額不敷公不欲纍民然亦坐是供應多疏鐫二級歸公念太孺人春秋髙諸子姪皆善屬文構書屋數楹寢處其中口講手批至夜分以為常與二三舊友結社賦詩出則乘柴車或徒步仕進之念泊如也工填詞晚年聲律益細伶工奏伎㸃拍失度即笑語喧闐中輒指其誤更深於道家言自謂龍虎經參同契諸書塵埋千年無人識其要領一旦為之洗滌筋髓丹學祕訣悉傳人間海內好道之士當有知其所以然者古詩以昭明文選為宗近體初專師少陵後遍究四唐含咀茹華歸詣自然論詩上下今古升降正變可出鍾嶸上其辨議精詳筆鋒清雄識者以為倣佛鄭夾漈云偶爾撰述信筆抒寫連篇纍幅至其精神凝注稿必數易常有一字未妥一韻未安收視反聽審諦推敲必得當而後止人知公之博綜而不知其謹慎如是獨不喜為酬應之文如序記碑銘之類為人所强偶一為之非其好也一日過余深談余謂以君異敏若專功學易必能發前聖之藴公遂盡發所藏諸家易說約與余定期㑹講無何而公逝矣嗚呼惜哉公生平篤於友誼急人之難初登第時有友被誣幾罹重典公為之遍謁當事傾身營救事卒得白近世杯酒談笑不啻骨月一旦失路反眼若不相識更為之下石者比比也若公者真古人哉余求友於天下往往號宿學負盛名者叩其所得輒不及公萬一而公官不過郡佐未嘗一登著作之庭雖其言可以藏名山信後世矣而其志尚若有進而未巳者此余之所以咨嗟悼惜長慟而不能自止也今其子請志壙石不一語粉飾亦所以報吾友而存其篤信之志云所著雨蕉齊詩集選詩定論唐詩定論律呂正論參同契正論隂符經正論龍虎上經指月入藥鏡圖說睢乘資睢陽人物志雨蕉齊雜録道言雜録共若干卷公生於明萬歷四十三年五月三十日卒於康熙十四年二月二十五日得年六十一配沈氏封孺人子二學皓廩生宗頤國子監監生沈宜人出孫元復宗頤出以康熙十四年月日葬大麓岡先塋之次銘曰羽陵宛委摉祕笈續遺補亡人莫識結繩掌故羲皇畫地負海涵驚奇特鏗鍧震曜貫冥賾揚風扢雅追三百胡不賡揚丹陛側百年禮樂㑹生色功名遺愛在南極灕江之水何湜湜北固山頭一片石至今父老淚霑臆鄴架縹緗存手澤有子文章壓元白奕葉繩繩傳休德舊史銘辭在幽宅徵君孫鍾元先生墓志銘康熙十有四年乙卯四月二十一日前萬歷庚子舉人徵君孫先生卒於輝縣夏峯之居第一時監司郡縣之大夫與方數百里鄉大夫士哭弔屬路不絶城內外市者罷業耕者廢耒里老嗟歎子弟輟誦絃聲督學使檄郡邑列祀百泉書院其冬十月十六日葬夏峯之東原距生萬歷甲申十二月十二日享年九十有二矣道學之傳自濓洛關閩諸大儒後莫盛於明之河東姚江先生幼當梁溪吉水講學都門之日與鹿忠節公一室默對以聖賢相期許忠節既沒獨肩斯道者四十載年愈髙德愈卲真積力久篤實光輝四方學者不謀而合曰夏峯今之河東姚江也兩朝徵聘十一次纁帛賁於巖谷守令敦趨就道者數矣先生髙卧不起故天下稱為徵君云先生諱奇逢字啓泰號鍾元保定之容城人髙祖端曽祖廷寶皆有隱德祖臣嘉靖辛酉鄉薦任河東鹽運司運判以清慎稱父丕振庠員授儒官孝友著聞母陳孺人兄弟四人兩兄奇儒奇遇俱庠員弟奇彥以貢士任武城知縣先生少時慷慨有大志十四歲謁楊尚寶補庭補庭問設在圍城中內無糧芻外無救援當如之何先生應聲對曰效死勿去補庭曰此足卜子生平矣補庭者忠愍公子也十七舉於鄉私居不蓄一錢兩居父母憂治喪一凖古禮偕兄弟結廬墓側飲食必祭風雨霜雪哀音動人嘗語人曰少年妄意功名自雙親見背哀慟窮苦中證取本來面目覺向來氣質之偏蓋學問實得力於此云居京師見曹貞豫公舉仁體以告恍然此心與天地萬物相通時桐城左忠毅嘉善魏忠節長洲周忠介以氣節相高見先生皆傾蓋定交髙陽孫文正公督師關門鹿忠節為監軍約先生同遊塞上遍覽山海形勝指畫如掌孫公留共襄軍事急辭歸語茅元儀曰將相不合未有能立功於外者公信不愧吉甫如時不可何天啓末年逆閹竊柄左魏周三君子相繼逮繫過白溝緹騎森布先生與門人張果中拮据調護供其槖饘且告之曰雷霆雨露總是君恩諸公主張宜蚤定其子弟僕從厰衛嚴緝莫敢舍者先生與鹿太公為之寄頓左嘗督學三輔又屯田有惠政時誣坐熊經略贓拷掠備至先生與鹿太公謀設匭建表於門曰願輸金救左督學者聽於是鄉人投匭者雲集左既拷死則又按籍俵散去京師不二百里舉幡擊鼓不畏閹知閹亦竟不知也當事急時遣弟奇彥同鹿公子馳關門上書高陽公求援公即上疏以邊事請陛見面奏機宜都門喧傳公興晉陽之甲閹夜繞御牀而泣公抵通州亟降㫖勒令公回而諸君子不可救矣蓋正人為國家元氣非但急友難也事之不成則天也而世徒以節俠視之過矣客氏弟光先以時焰牢籠士大夫介所知送名馬以家貧不能具摧秣辭致摧秣之需以病軀不能乘辭待小人不惡而嚴類如此崇禎戊辰督學御史李公蕃舉孝行奉㫖建坊旌表給二丁侍養丙子容城被圍土垣將圯窮七晝夜為攻具先生指示方略士民協力捍禦城賴以全事定巡撫都御史恤刑部郎交章聞於朝特詔褒嘉兵部尚書范公景文聘贊畫軍務固辭不就時寇氛漸逼都城移家入五峯山結茅山中親識從者數百家修武備嚴教條所以整齊約束之法甚具更日與其徒講學習禮賦詩倡和絃歌之聲相聞當兵戈搶攘時雍容禮樂盜賊睥睨不敢犯嗚呼先生之不用於時豈先生無意於世蓋亦知天意之不可回也國朝順治初祭酒特舉長成均以許文正相擬中外大臣推轂日至先生絶意仕進移家共城闢兼山堂讀易其中率子孫耕稼自給簞瓢屢空怡然自適逺邇負笈求學者甚衆有大僚歸老於家北面稱弟子者有千里遣其子從遊者公卿持使節過衛源不入公署屏騶從以一見先生為快先生涵養益邃自强不息每晨起謁先祠畢退居一室澄心端坐即疾病未嘗有惰容接人無貴賤少長各得其道與後學答問隨人淺深亹亹窮晝夜不倦子孫甥姪數十人揖讓進退皆有成法閨門內外肅肅穆穆寂若無聲而諸事具有條理姻族故舊恩意篤厚為之經理婚嫁喪葬惟力是視聞節孝事必為之表揚先賢祠祀廢墜者必倡衆為之修理見人家庭乖違與父言慈與子言孝緩譬曲喻必歸於道而後已故賢者悅其誠不賢者服其化即兒童牧豎亦知歡喜尊敬至於事變之來衆人震撼不知所底者處之裕如未嘗幾微動於中也其學以慎獨為宗以體認天理為要以日用倫常為實際嘗言七十歲工夫較六十而密八十歲工夫較七十而密九十歲工夫較八十而密此念無時敢懈此心庶幾少明又曰生平所見有時而遷而獨知之地不敢自欺識得天理二字是千聖真脈非言語文字可以承當故言心即在事上見言巳即在人上見言髙逺在卑邇上見言上達在下學上見戰兢惕勵不敢將就冒認惟是慎獨而巳所著有理學宗傳四書近指讀易大㫖書經近指聖學録兩大案録甲申大難録歲寒居文集答問日譜畿輔人物考中州人物考孝友堂家乘四禮酌乙丙紀事孫文正公年譜共若干卷嘗歎世之學者不務心得株守籓籬物我未化先生真見道之大原無建安無青田惟以庸德庸言直證天命原初之體可謂千聖同堂造化與遊者矣程子曰世無真儒天下貿貿焉莫知所之人欲肆而天理滅自先生講道山中公卿大臣四方學士聞風而起皆知聖賢之可為異端邪說不足以亂孔聖之真其有功於斯世斯人大矣若其自得之深精微之蘊非學問有得於心者烏能測其所以然乎斌何敢謂知足以知之然奉教有年竊觀其語默動靜元氣渾淪全體大用光明洞徹其斯為凝道之君子何疑歟哲人云萎斯世何宗故不禁涕泗無從也元配槐孺人繼配楊孺人皆有閫德丙辰先生下第槐孺人慰之曰下第何妨即終身不第我未見布衣可輕富貴可喜此豈婦人女子所及當先生醵金救左魏時楊孺人出嫁時衣奩佐之撫前子同巳出事槐孺人母如巳母奉養終身皆人所難者子六立雅恩貢奏雅生員望雅增廣生槐孺人出博雅韻雅尚雅增廣生楊孺人出女二孫十二瀾增廣生潛生員溥生員溶生員泉舉人淳生員漢浩沐浴湛源孫女八曽孫十三用柔用霖用梓用柟用桓用模用楷用棐用楨用幹用樟用柱用棟曽孫女五四世孫一熠娶聘皆名族槐孺人原葬容城先塋今以衣冠祔楊孺人原葬夏峯東阡今移祔銘曰至道浩浩待人而行貞元㑹合大儒挺生定交江村志紹濓洛奧㫖微言開關啓鑰窮理盡性本於孝弟表裏洞然天空月霽雲卧蘇門韜光斂耀安樂窩叟千載同調峩峩夏峯萬仞其高攀援莫逮仰止為勞松楸鬱鬱幽宫在兹我銘不磨永式來思前兵部尚書湛虛張公墓志銘皇清順治十有三年四月初三日前明兵部尚書磁州張公卒於家是年八月葬於槐樹村之阡少保劉公志其墓矣至康熙十八年其子貢士沖等改葬於南城村先塋之次遵治命也公之孫翰林編修榕端持其父故庶常君溍所作狀及沖敘改葬事始末來請銘余與庶常君同舉進士嘗以年家子謁公里第接其狀貌偉然巨公長者也庶常君刻公遺集四十卷成遣使渡河授余校正且屬為序余末學弇陋逡巡不敢操筆者十年矣反復熟讀自謂知公生平大略乃不敢辭公諱鏡心字孝仲號湛虛晚號晦臣先世襄垣人後遷磁考諱仁聲封通議大夫兵部右侍郎妣許氏封淑人公天啓二年進士知蕭縣調定逺再調泰興以治行高等擢禮科給事中掌大計進太常寺少卿遷大理調南光祿寺卿擢兵部右侍郎兼都察院右副都御史總督兩廣軍務召入為兵部左侍郎以薊遼總督張福臻未至命公代之加兵部尚書俄福臻至公議别用旋丁母憂𢎞光立詹事漳浦黃公薦公老臣宜大用時馬士英阮大鋮用事黃公不能安其位公因避去國朝定鼎大臣推薦章數上以丁父憂固謝守制遂終不起公負經世大略其令泰興也嵗饑代民完漕糧四千石全活數千家為給事當莊烈愍皇帝時內外交訌軍國積弊臣下錮習不可究詰而天子求治過急政尚操切僉人窺伺意㫖附㑹以作威福而正人旅進旅退不能盡其謀國之忠公首陳七要繼陳十二事大約請上靜正自治推誠馭下尤當愛惜人才勿以一眚輒棄更欲臣下破除偏黨公忠亷直佐成蕩平之治慎刑罰抑躁競嚴保舉以課成效行蠲恤以收人心練兵核餉委任樞輔侃侃萬言皆切中時宜當國者撫卷歎息至擬之魏徵十漸也畿甸失事上震怒不測公語政府曰主上嚴則宜佐之以寬臣下玩則宜防之以禮邊境不戒過在將領文法交詆大獄繁興至使八座一空衣冠囚首猶得謂國有人乎政府雖不能用時論韙之㑹大風雨雹上書言春秋僖公二十九年雨雹傳言為公子遂昭公四年雨雹傳言為季氏今日必有大臣擅權以干天怒者嚴㫖詰責而公遂劾總制劉䇿巡撫王從義大帥侯世祿逗遛縱兵狀更論吏部尚書王永光推薦高捷史􅒇為背公夤緣指斥尤切未嘗以利害禍福自絀也掌大計時閣臣溫體仁有所屬意公陽為不喻曰我不能為執政報私怨以此忤閣臣意賴公素持正為上所信不能間也禮部議舉諡典訪冊至七百人公上言諡法寧嚴勿濫因列陶安方孝孺鐵鉉李已等數人上嘉納又請出御史吳阿衡於獄舉范景文知兵未幾范公以閣臣殉國而吳公亦以薊遼死事世益稱公為知人其總督兩廣也濵海數郡為島裔窺伺蛋户豪姓與之交通公既嚴奸宄之禁設柘林黑石虎門之防發材官受賕之罪誅連州妖賊及思明部民之戕土官者規畫略定無何楚寇圍韶兩粵騷然公遣將却之寇據郴桂之間高獠紫獠二源其窟穴也自嘉靖以來梗化且百年公以為非大創不可奏請合沅贑兩撫㑹𠞰上以賊實在楚客兵功當倍論公聞命誓師購猺獞逺偵探嚴壁壘搜討軍實久之沅贑兵始集公命粵兵披堅深入斬馘千計下令乘勝直搗二源諸將難之公曰諸君不見漁獵者乎池魚穽獸一舉可盡也楚寇即粵寇何疆域之足云分兵一自連州入一自藍山入扼其咽喉主簿洞最稱險峻叱令捲甲疾趨一戰而得之慿髙俯擊高獠遂破復依山縱火分翼夾攻紫源亦定是役也破峒源三十有六俘斬三千釋其脅從流亡來歸雖號為三省掎角而先登奪隘粵功實最時武陵管樞曲庇楚撫公僅賜級賚金幣而巳科道交章言功髙賞薄使客兵倍論之㫖不信公曰我知平賊耳他何敢問安南黎莫搆兵公上言帝王詳內略外當慎守關隘兩存而弱之廣西巡撫林贄請存莫圖黎巳有㫖報可公謂制外之道宜彰大信黎入貢而絶之非所以懷逺人也因輯馭交紀二十二卷以進天子以為然敕公便宜從事卒如公言而定至於平盤古十八峒之寇與崖州英乳建署設防立學置師使黎人子弟皆通孝經從來所未有也公為政博大而精詳在粵五年恩威並用智勇兼施凡所以為地方經久計者無不盡其力後之人守其成畫不敢變也而張弛緩急之宜卒莫及焉公平生篤於友誼漳浦黃公建言豫杖下詔獄知交不敢通問公獨以三百金遺其子供獄中晨夕黃公寄詩謝有云患難勞相恤妻孥感至誠誰期今世界更作古人情甲申以後殉國諸臣多生平故交感舊懷忠作前後九哀詩弔之辭㫖激烈論者謂與謝翺楚歌相上下也晚年閉户注易究極性命之㫖與孫鍾元先生往復商確逍遙泉石自稱雲隱居士元老名臣遭遇鼎革完節令終皭然不滓可謂難也己公生萬歷十八年正月十九日距卒享年六十有七元配秦氏纍贈淑人機杼佐讀恭儉有禮公未第時卒年三十有一繼配李氏纍封淑人隨任兩廣不市一珠公之清德相成為多先公一年卒年五十有五子六沅官生淜歲貢生秦淑人出溍壬辰進士內翰林𢎞文院庶吉士贈文林郎翰林院編修衍廩生沖副㮄貢生李淑人出瀞貢監生側室汪氏出女一適貢監生李䡡李淑人出孫男十三槐韓廩生沅子楓益榆漢淜子榕端丙辰進士翰林院編修椰璟橋恆俱庠生溍子楠蘧衍子槫崑樾康沖子柚雲瀞子餘尚幼曽孫丙謙庠生四世孫一賜講銘曰行山鬱峙漳水回瀾篤生偉人國之屏翰侃侃遺直梧掖垂紳風標嶽立威鳯祥麟臨軒授鉞百粵蠻方甲兵胸貯嶺霧開張薄伐楚寇鉦鼓􅣨􅣨緩帶輕裘克奏膚功日南波靜蛋户春耕何不中原滅彼欃槍蹇蹇勞臣鬢髮如雪入佐中樞朱弓玉節晚年高卧夢寐羲皇象賢接武奎壁烺烺巋哉高原松楸蒼蒼銘石不泐奕葉其昌砥園施先生墓志銘余同年㕛施君閏章字尚白文章行誼高天下然少孤叔父砥園先生養且教之尚白歷官中外所至著聲績嘗語人曰此叔父之訓也以此海內士大夫無不知砥園先生之賢余昔家居時尚白自京師南歸枉道視余余欲少留為一日歡不可得曰夜夢叔父為之心動歸家十年不復出戊午應召入都與余數相過從語次輒忽忽不樂曰余叔父年七十餘矣疾病侵尋常慮一旦不得奉終事也輒泫然淚下無何訃至尚白方奉修史之命不得歸號泣不能自止既乃略次行事隨書隨泣以至於病扶掖至余寓再拜請余銘其幽宫之石尚白交遊中操文章之柄者指不勝屈而獨以見屬余何敢辭乃為序而銘之按狀公諱譽字次仲砥園其號也世籍宣城曽祖諱志和祖諱尹政並有隱德考諱𢎞猷以理學著世所稱中明先生者也中明先生二子長贈朝議大夫諱某次即先生贈公學行純備兄弟友愛最篤贈公殁先生喪祭盡禮事母吳太孺人以孝聞性亢爽多智略為文敏贍下筆滔滔數千言用七藝受知督學御史補郡諸生每試輒甲等而數困於秋闈崇禎庚午巳中彀矣坐一語見擯時論惜之好為詩不尚雕飾而􅋂崎歷落風格在孟東野張文昌之間都御史念臺劉公為序之且曰次仲言有本而行有式非以詩炫者也而詩固巳不朽矣其見稱於先達如此中明先生當明神宗時與焦文端鄒忠介諸公講學東南其時龍溪盱江之學方盛學者率以超悟為宗乃獨憂其流弊立說主躬行不為過高虛無之論至其真誠惻怛視萬物為一體則與盱江有相默契者郡有同仁館雲山書院皆其講學處也先生於兵亂後修復舊規偕諸生習禮其中時時稱引先訓曰先君子以躬為教吾不能及萬一然願與同人勉之與人交洞見底裏聞人一善喜若巳出至其所不可正色譙讓雖豪右貴人無所鯁避歲饑節粟以贍族人率舉家噉粥十旬無倦色助㛰喪置槥瘞殣葬亡友之無後者與人通有無不責償固其天性近厚或亦本中明先生之教而力行之者與尚白初登第時有於祖墳後開穴欲壞其龍脈者鄉黨皆為不平先生曰渠自喪心耳吾家世有隂德寧盡賴風水耶竟置不問海寇陷京口入寧國鄉里亡藉子欲因以為利聲言施提學叔厚積可令出餉禍幾不測蓋是時尚白督山東學政云㑹賊敗去其人惴惴懼報復先生曰此輩足相校耶終無一言此二事宣城人人能道之以為尤人所難也尚白幼羸疾先生嘗手抱之驢背以就醫行十餘里涕淚霑衣在官時慮其善病好苦吟嘗望其來歸為構待歸之閣作倚門之詩尚白每言及此淚涔涔不能止也所著詩二卷尚白刻之京師公生明萬歷壬寅五月二十六日卒於皇清康熙己未正月四日享年七十有八配馮氏子三閏嚴郡庠生馮氏出閏阮邑庠生側室陳氏出閏育側室韓氏出以某年月日葬於雙溪之阡銘曰宛水如虹山如帶風土清淳濬發大世有哲人德未艾紹先起後惟君在惠及閭黨存遺愛講堂復起儒行賴猶子文章擅昭代白虎談經家學邁有崇者丘雙流㑹松柏丸丸過者拜越惟奕葉長無害翰林院侍讀愚山施公墓志銘康熙二十二年閏六月十三日翰林院侍讀施公卒於京師之寓舍公知名海內者垂四十年天下之士或推其文章或髙其行誼或稱其治術而余少同舉進士晚年同事史館相知尤深公病余往視之握手熟視曰平生知我之深無如子立言能信於世亦無如子因欷歔不能語既卒葬且有日其子彥恪遵遺命來請銘其墓宫之石余何敢辭乃垂涕序而銘之公諱閏章字尚白號愚山江南宣城人大父𢎞猷眀萬歷間遊鄒忠介焦石城兩先生之門為東南人士所宗父察以公貴贈奉政大夫山東按察司僉事叔父譽余嘗志其墓所謂砥園先生者也兄弟孝友內外雍穆江南言家法者推施氏公少賦異資習聞家學從沈徵君壽民遊弱冠工制舉業兼治詩賦古文辭先達多稱之順治丙戌舉於鄉己丑登進士第授刑部主事天子大婚禮成詔赦天下公奉使廣西因得遍遊粵西諸山水著粵江賦以見志既歸丁祖母艱服除補員外郎引經斷獄期於明允有疑獄反覆推求常至夜分曰如是則生者死者可兩無憾也諸卿大夫素以公嫻文辭或不習吏事至是籍籍言公可大用矣當是時世祖方興起文學選尚書郎資望深者御試髙等乃得補授提學使者公名居第一擢提調山東學政按察司僉事公既負文名久士子爭自磨礪冀得一當公意而公教士以通經學古為先論文崇雅黜浮風氣為之一變其應御試也大學士安丘劉公實薦之後屬其同年孤子竟以文不入格被黜落劉公語山東巡撫曰學臣不受請託獨施君耳公之能舉其職與劉公之能相與有成也時人以為兩難秩滿遷江西布政司參議分守湖西道時軍餉嚴迫屬邑多逋賦追呼急輒相聚為盜公作勸民急公歌召父老垂涕而諭之父老見公長者相率輸租恐後吉水有巨室依險自保邑令乘間執之以叛聞公察其僞諭令輸租以遣之因遍歷崇山廣谷間作彈子嶺大坑歎竹源坑諸篇以告諸長吏讀者為流涕曰施使君今之元道州也暇日修景賢白鷺洲兩書院集多士講學其中或屏車騎往來金牛石蓮諸洞宴遊賦詩耆舊逸民亦樂就之昔羅盱江嘗為寧國守以和易得民公大父嘗服膺其教公之為政亦略相倣佛而時事之難易有大不同者無何以裁併監司歸里而叔父砥園先生年七十老矣公依依左右有終焉之志又十年詔舉博學鴻詞之士三相國薦其才召試授翰林院侍講纂修明史公素以文學飭吏治至是始得當著作之任益足發舒考核同異辨析疑訛是非可否無所回互而朝士大夫習其姓名求碑版詩歌者趾錯於户四方名士負笈問業無虛日公一一應之不少倦平日口期期若不能言及談忠孝竒節輒抵掌奮發慷慨流涕不能自已遇羇人才士失志無聊多方為之延譽死喪困厄賑恤不遺餘力天下士以是益歸其門入則盡力編摩出則應酬賔客又砥園先生已卒格於例不能請假居恆忽忽不樂而精力亦稍憊矣天子知其學行將用為日講官司記注矣惜其老也而止辛酉典試中州稱得人又二年進侍讀充太宗聖訓纂修官益恪恭不敢懈吾見其貌加衰不自休息私憂之無何病遂卒嗟乎以公之才使專精史事久於其職一代君臣事迹庶有倫叙乃事未竣而遽殁不但平生交遊之情為可慟而國家失此良史才為可惜也悲夫公所著書學餘集八十卷年譜四卷詩話雜著二卷歿後友人檢討髙君詠為編輯藏於家公生明萬歷四十六年十二月二十一日距卒得年六十有六於某年月日葬於宣城某地之原配梅氏繼李氏贈封並宜人副室蔣氏徐氏子二彥淳恩貢生彥恪郡庠生孫男女俱三婚娶皆名族銘曰儉以處身惠以行仁志希先民敻乎絶倫養其和平發為菁英金石喤喤大放厥聲敬亭如蓋宛溪如帶丸丸松檜勿翦勿拜維兹幽堂哲人之藏青烏告祥奕葉其昌翰林院提督四譯館太常寺少卿王公墓志銘太常王君子厚以省覲南歸道病卒於臨清之舟次訃至京師士大夫咸歎息泣下子厚在詞館後余者十五年余再起入都相與為忘年友嘗觀其氣槩嶽嶽不茍隨時趨心竊儀之官諫垣十四載前後章數十上皆關國家大計使一旦秉鈞軸盡攄其生平所藴必大有建豎而今竟已矣雖其所表見已自章章於世而不能盡其才使朝廷收得人之效是可歎也冢嗣延禧卜葬且有日乃奉其王父封公書來京師以隧石志銘為請余不敢辭据狀子厚諱曰溫一字緑野其先山西洪洞人也明初遷尉氏之古三亭岡遂占籍尉氏傳十餘世皆有隱德至芝童公萬歷庚子魁於鄉漢中推官遷同知青州府生子二長鳴玉次鳴球即封公也封公中順治庚子鄉試第一甲辰中㑹試有子六人子厚其長也子厚少負軼才年十一補博士弟子有神童之目癸卯舉於鄉丁未㑹試中式時年甫二十三初封公甲辰未與殿試至是父子同對策大廷人以為榮封公考授中書需次里居而子厚選𢎞文院庶吉士慨然有志於經世之學己酉授兵科給事中遇事侃侃無所阿附時有㫖甄别督撫而不及提鎮疏言提鎮為封疆大帥權無異於督撫今有歷任七八年或十餘年者果人人稱職乎請一體甄别以肅軍紀是時拜官甫數日時論韙之詔赦軍犯而地方官往往淹滯不遽釋上言朝廷布宥罪之恩而奉行者率至五六年之久脫其中有客死異鄉者如曠典何又言詔欵內逃人窩主干連人犯俱准赦免而直省地方距京師逺者數千里近者數百里有赦前起解而赦後猶械繫道路者天時酷暑鋃鐺烈日之下保無暍死道上者乎臣以為與其豁之於解到之後曷若宥之於未解之前請敕部飛檄各督撫立釋歸農使䝉赦者蚤慶更生幸甚皆奉俞㫖自是或密奏或公陳多見採納蓋其意感朝廷知遇思奮發以圖報稱孜孜以清吏治重人才分别激勸綜核名實雅不欲以悻直僨事而忠愛惓惓尤有人所難者間嘗有所搏擊不避大僚側目者衆而卒安然無幾微震撼之虞者仰賴皇上至聖大仁優容諫官故讀其奏疏不獨可以見其志亦足彰主聖臣直之治象也一日上召集臺垣策問進𠞰機宜轉輸方略子厚敷對稱㫖奉有條奏詳明克稱言職之諭蓋見知於上者深矣數年之間經筵侍班掌印戶垣管登聞鼓者再晉鴻臚光祿寺少卿轉通政右參議尋轉左以至提督四譯館太常寺少卿駸駸大用矣壬戌五月上念河工關運道民生簡公亷大臣往勘㑹大司寇魏公以年老辭則命偕少司寇宋公往瀕行陛見者三單騎馳往西至蕭碭北至唐宗山東至海口南至淮揚周回長隄三千餘里尺計寸較繪圖入告蓋其勤慎如此甲子冬遇覃恩誥封父如其官母某氏為恭人上將東巡遣大臣祭告嶽瀆而子厚分詣東鎮東海將事惟䖍事竣念封公家居日久便道歸省子厚性純孝晨昏定省無間封公促之入都居常忽忽不樂丙寅復請假歸初陸行至松林店而病乃買舟張家灣走天津轉劇至臨清遂不起矣生平友愛最篤遇親戚故舊咸有恩禮課子諄諄誡以守清白勿驕溢以墮家聲其他懿行類如此甚衆不暇著著其大者生於順治二年乙酉閏六月十七日卒於康熙二十五年丙寅閏四月十七日享年四十有二配蘇氏封恭人邑庠生光訓女子五延禧拔貢生延祐候選州同延祉延祺廩膳生員延祚附學生員女一康熙二十六年某月日葬於某原銘曰嗚呼王君邦之傑榰柱言路羞䠥􅍷位躋奉常神人悅藏骨於斯山嶻嵲後億千年視斯碣封文林郎翰林院庶吉士余君墓志銘浙有隱君子余君爾章以仲子翰林院庶吉士泰來遇覃恩得封如其官今仲子拜監察御史而君以老疾卒於家訃至御史劈踊長號勺水不入口者三日京師士大夫聞之走相弔越七日御史徒跣至豫邸舍長跪號曰不孝泰來孤矣方不孝需次里門依依膝下更寒暑先君子趣裝就道誡以服官圖報稱不孝奉命行先君子方健飯亡恙也抵京除目且下聞先君子病則擬請急歸省無何而凶問奄至矣痛哉今不孝奔喪將卜葬惟是幽宫之石敢徼惠於大君子而賜之銘不孝死且不朽豫愴然欷歔久之蓋人子之善譬諸醴泉芝草其來有自觀御史平日行已與今居喪盡禮如此即君之生平可知矣故不敢以不文辭據狀余氏為宋丞相忠肅公端禮之後其居東浦村自提舉良齊公始良齊生某某生某某生立政代有隱德立政字華南君之父也君諱維字爾章事父以孝聞少時讀書有大志治毛詩有聲里中所著詩古文暨注解毛詩里人傳誦之然數竒㑹厥考下世遂絶意仕進而喪葬祭祀悉稟朱文公家禮盡誠備物皆可為鄉里法事母趙孺人先意承志得其歡更置産以贍舅氏念祖若考單傳再世遇再從兄弟殊厚也東浦余故著姓而産業薄厚嘗不齊其貧而租賦殿者櫬久淹者婚嫁具乏者咸仰給君所往往霑足焉而自處常節縮甘菲薄飯糲茹蔬布衣芒屩有委巷中人所難者㑹嵗荒則傾囷粟設糜粥於路以哺飢人又嘗憐窶人子久負不能償輒為焚其券諸凡橋道修築率捐資為里人倡里人以是稱余君長者即暴客凶人過門搖手戒勿入而豪少年忿爭詬誶望見閭閈輒愧悔去當是時論者比之陳太丘王彥方焉君蚤嵗舉子泰徵督課良苦曰服田力穡乃亦有秋家世咿唔鉛槧兒其為菑畬乎泰徵貢入成均久未第而晚年見仲子鵲起弱冠舉於鄉以禮闈第三人成進士讀書中祕當是時北望京華意陶陶自適也然慮仲子年方少數遺書訓誡維謹聞仲子欲省覲輒舉栁宗元思報國恩惟有文章語馳止之比仲子聽除臺諫里居也不以晨昏色養為喜而時時稱漢汲黯唐陸贄立朝大節以勉其樹立於當世噫績學砥行厚積而薄發要以忠孝仁讓之澤保艾爾後其亦可謂賢也已東浦余氏既單傳兩世至君乃有賢子二人孫曾男女蟄蟄繩繩且數十人未有艾易曰積善餘慶有以也夫君生於明萬歷己酉十二月十四日卒於皇清康熙二十五年丙寅九月初六日享年七十有八配丁氏封孺人子男某以某年月日葬於山隂縣麥塢山之原銘曰山蒼蒼兮厚以矗也水泱泱兮清以曲也沒藏於斯兮生所卜也宜爾子孫兮荷天祿也億萬斯年視厥辭兮尚知生平之行篤也封中憲大夫陜西按察司副使先考府君行實先府君諱祖契字孝先號命式先世為滁州來安縣人明初祖諱寬從高皇帝起兵授總旗升昭信校尉廣東神電衛百户子諱銘調中都留守司金川門百户再傳至諱庠正統九年以北征功升睢陽衛前所千户遂家焉庠生諱英署衛事才略甚著英生諱卿平巨寇王堂築黃河隄百里備禦宣府定亂汝南所至輒建奇功升指揮僉事世襲驃騎將軍中都正留守於先君為高祖是生岷州守備公諱易居官焯有聲烈岷州公二子長諱希韓肅州參將仲諱希范以選貢任山西趙城縣丞趙城公生我先大父諱敏為庠員性寬厚口不言人過嘗之荆椘適其地大祲捐資施粥全活數千人而內外親黨賴以舉火者固甚衆也初娶徐孺人繼談孺人兩劉孺人最後繼許孺人生府君兄弟四人府君其三也府君自幼穎異習毛詩精通大義傳注之外時時有所論說咸出人意表先大父撫之喜曰大吾宗者此子也弱冠為文峭健有奇氣應試為督學昭度潘公鑒拔補開封學諸生時先大父年七十餘嘗卧病府君不脫衣冠侍湯藥傾資延醫籲天請代不交睫者四十餘日及先大父捐館舍哀毁骨立附身附棺靡不誠信鄉黨翕然稱之窀穸甫竟內難外侮一時並至有豪紳挾勢橫噬州中城居之第宅負郭之田園一旦盡為奪去府君曰此先人之業不可不直其寃走訴上臺侃侃不屈興化吳相國巡按河南與渠同年友也意不能無偏重府君平立睨之曰明公奉天子命代狩中原寧為同年來耶吳公奇其言降階謝之司李萬公元吉聞之亟稱曰國士國士勸府君曰彼勢方張當潛身避害勿蹈危機彼勢可立待也自是厚自韜藏凡出必卜而後行然家業蕭條內外拮据遂不得專事舉子業矣念家世為閥閲舊族恐貽弓冶羞為不孝斌延師督課手抄左國公穀史漢八家文數百篇及易通正䝉諸書分其句讀正其韻解授不孝斌午夜燈火熒熒不熟不休㑹憶雨中一日寫漢文二十篇腕為之痛時不孝斌方十一歲此二十篇者每讀之未嘗不流涕也同郡有獲嘉王先生者學行為士林宗府君延之家孰大集里中子弟講孝經小學府君執禮甚謹不孝斌亦循循不敢自外法度王先生曰湯氏世有令德今命式好賢重禮其終必顯時府君即貧困而濟施未嘗少倦冬月雪甚有楊生者過門衣冠腐敝府君解衣裘贈之楊生故鄴下人也負傲骨不輕受人贈遺獨數數受府君餽語人曰湯公君子也故受之先大母年高重聽府君日供甘㫖㑹寇氛洊熾饑饉頻仍蚤夜經營備盡色養事兄賁皇公甚恭謹賁皇公工文詞治生雅非所長府君日為具饌使得專志下帷不為室家纍心姊遘危病迎於家親製藥餌調理之復故始歸內行之謹蓋人無間言云至壬午寇陷睢城家園遂為戰場府君冒險躬輿大母過河朔往來曹衛大名之間顛沛流離所以怡顔順志者仍左右無方也當是時先母趙恭人已殉寇難先伯父遊學於浙先叔父卒於歸德遺孤呱呱撫恤備至大母棄世號泣劈踊勉襄含殮搶攘之際奉柩與先大父合祔繼有先伯母喪竭力殯葬亂離中真嘔盡心血矣先伯父在浙依衢州司訓孔公病故遺女十歲無所歸府君備歷險阻攜回擇壻資奩如禮時值鼎革往返六千餘里波濤之洶湧盜賊之出沒身幾危者數矣不孝斌實從行至今憶嚴陵灘彭蠡湖猶心悸也先叔子流落曺南府君百方贖回為之延師娶婦後又授以田二百畝嘗語不孝斌曰同胞兄弟所存骨血惟此府君每一言蓋未嘗不淚涔涔下也丙戌以後河南兵戈甫定田廬荒蕪已久府君手闢蒿萊定此室宇猶篝燈市書以課不孝斌誦讀為事曰吾備嘗艱辛不以為恨振先人之緒惟汝是望耳不孝斌夙夜識之不敢忘戊子幸叨鄉薦己丑捷南宫壬辰廷對讀書中祕府君手書諭曰館職清暇正當肆力古學為經世大業勿得優游曠廢有負遴選至意翰苑天下名賢所聚學問必有什倍汝者虛心領略庶有進益仕路嶮巇從來可畏惟敬以修身儉以養德名位素定不必預計古來賢豪只因腳根不定隨風逐波失其生平甚可惜也其他貽書訓誡之辭皆類此甲午不孝斌授國史院檢討乙未遵諭陳言狂直幾得罪府君毫無慍色後召見南苑天語溫然且問曰汝父年幾何今在京否斌據實以對知聖度如天遣使馳報府君北向叩首仍寄書勉斌恪供職業語最切至丙申䝉世祖親簡加一級備兵潼關迎府君至署府君曰我來非就養也觀汝之為政耳今地方凋敝極矣寬一分則民受一分之賜况君恩深重綸音優渥若不夙夜砥礪使吏畏民懷非但有玷官方抑且抱愧清夜楊伯起為此地先哲汝當敬體四知之訓我不能久居此不孝斌謹受命府君至潼逾月即歸不孝斌送至境上俯伏道左府君反覆叮寧至今歷歷如昨日事真令人一追憶一嘔血也丁酉恭遇覃恩封府君為中憲大夫陜西按察司副使府君雖被恩榮而自奉儉約數椽僅蔽風雨出入常徒步地方有大役輒身任之睢城自闖寇拆毁繼遭河陷時州衛分壤郡守屢議修築而衛中有欲簽報大户借名科斂者府君建議按畝出夫為力役之征衆擎易舉衛帥忿然見於詞色後衆論僉同卒如府君之議城甫畢而鄰封盜起逺近洶洶官府下令督民防守府君曰市民日營升合賊未至而先使之困非計之得也偕紳士晝夜宿城頭居民賴以安堵吾州額協宜溝驛站銀而錢塘則協吾州錢塘以隔省歷年不應而宜溝驛奉上臺嚴檄提催驛寖不支府君言於憲使楊公免協濟驛困以蘇他如減栁梢之數清里甲之纍皆不避勞怨一力擔承蓋府君盡心桑梓周且悉如此又嘗修文廟刋郡乘請釋滯獄禦水賑荒諸善事尤為彰彰髙祖塋墓年久不無荆榛樵牧之感府君與族人約嵗時伏臘拜掃必親品物豐潔祭畢為宴仍奬其孝弟勤儉者而責其不奉家訓者必垂涕謝過乃已時族中惟叔祖勉齊公最長府君拜跪侍立禮節惟謹家有㫖蓄必先進叔祖叔祖亦怡怡然至府君第或竟月忘歸也平居嘗語諸子弟曰吾家無甚疏族自曽祖以上則一父之子也髙祖以上則一人之身也一人之身而至若塗人此蘇明允之所歎息也賙給困乏或粟米或布帛嵗以為常蓋府君敦本重族原於至性故也平生英偉俶儻洞悉世務遇大事衆人錯愕不敢發一語者府君片言立決即之溫溫然初不見有峻厲之色與鄉中父老時相過從飲酒談說稼穡較嵗豐儉間命巾車遊東郊之園圃蒔花種竹怡然自樂人以為有香山洛社之風焉郡守戴公行鄉飲酒禮採輿論聘府君為大賔府君固辭不獲凡三與賔席圜橋觀者如堵咸嘖嘖贊歎以為府君克光大典云己亥不孝斌量移嶺北便道歸省府君時患便血之症神氣減於往時不孝斌奉侍數日慿限迫切府君勉令就道銜淚拜别自此府君雖勉為笑語念斌逺宦實多憂慮又值仲子之變哀痛過節其病日深斌在䖍聞之亦感危症堅志請告幸䝉題允府君聞斌歸喜見顔色病漸愈曰我不幸蚤經家難繼遭寇變盛衰感懷骨月傷心五十年中言之令人欷歔今幸叨恩盛時汝以壯年勇退我體氣稍健父子聚首閲耕東臯課讀南軒亦老年佳事也嘗録馬援栁玭教子書揭之庭壁斑甫七嵗學庸論孟皆口授病中猶手抄古文數十篇教之不孝斌請代曰我固樂此不為勞也不孝輩日侍膝下以為可以承歡百年孰意昊天不弔至癸卯七月痰病陡作延醫百方調理痰嗽稍定不孝輩私心禱籲以為庶幾痊可而氣息漸弱卒至見背嗚呼痛哉彌留之際猶以斌硜執不能合時斑年幼未能成立為慮我父眷念不孝身有盡而心無窮言念及此能不令人心肝屠割哉嗚呼痛哉天乎何不殞滅斌等而奪我父之速耶嗚呼痛哉府君生於萬歷三十二年甲辰十月初七日卯時卒於康熙三年甲辰四月初五日辰時享年六十有一配我前母劉氏廩員公諱升女德性溫淑生於萬歷三十三年乙巳五月初三日卒於天啓二年壬戌六月初四日享年一十有八繼配我先母趙氏誥贈恭人廩員公諱尚敬女孝慈勤儉明於大義寇變殉節巡按御史李公粹然題請奉㫖旌表建坊立祠春秋祭祀事具祭酒吳公偉業修撰鄒公忠倚傳中生於萬歷三十四年丙午十一月二十六日殉節於崇禎十五年壬午三月二十二日享年三十有七再繼我今母軒氏儒士公諱里女子二長即斌江西分守嶺北道布政使司右參政娶馬氏封恭人庠員公中駿女趙恭人出斑聘廩員袁公鴻烈女軒孺人出女三長趙恭人出次三軒孺人出孫男三溥濬沆孫女二俱斌出今擇康熙四年乙巳十一月初二日申時奉葬於城北十五里澗岡東南之新阡苫凷餘息語無倫叙惟大君子哀而賜之琬琰先府君殁且不朽即不孝兄弟藉以少解終天之恨亦且不朽贈恭人先妣節烈事狀先妣姓趙氏外祖廩員公諱尚敬外祖母褚氏世為睢陽名族以萬歷三十四年十一月二十六日生先妣孝慈勤儉明於大義幼讀書通孝經及列女傳年十三外祖母棄世哀毁備至十七歸於先君四年生女又二年生斌是時先大父母春秋髙大父常病先君晝夜侍側不交睫者四十餘日先妣治羮粥奉湯藥凡大父所嗜物皆先意以待隨呼即應大父善病少間乳者抱斌立於㫄大父泫然流涕謂先君曰汝與汝婦孝謹我先人世有令德至汝身將顯否則亦在汝子踰年又病且篤衣巾衾帽皆手自縫紉自含殮以至窀穸經畫周密必誠必信親黨謂先妣嫺於禮自先大父捐館後家益貧先妣事大母益謹鬻簪珥市甘脆以為饋養烹飪浣濯雖盛暑隆冬未嘗假人㑹嵗祲率女紡績易粟以奉大母私則咽藜藿雜糠籺斌見輒為嗚咽而先妣戒勿令大母聞又素多病默坐室中厨竈蕭然見者為淚下而先妣怡如也斌初就外傅歸必問所讀書背誦不錯一字乃喜或不能誦則垂涕刻責夜則紡績而命斌讀書於㫄燈火熒熒常至夜分或不能得燭則月下為斌講孝經為女講列女故事一日斌偕同學生出城外抵暮而歸先妣端坐不食切責之曰汝年少志趨未定而樂遊嬉吾將安望斌長跽因姊謝過良久乃免崇禎庚辰河南大亂李自成擁衆數十萬縱橫開歸間且連年旱蝗常對先君歎曰我為婦人天下事固不敢知今四方重困盜賊蜂起而天又旱且蝗如此脫有不幸吾姑吾子以纍君請以一身謝夫子矣明年為女治嫁斌年未可娶亦令娶曰我素病令代我事吾姑既而曰子女婚娶已完志願畢矣明年壬午三月賊潰西華數日陳州太康皆陷睢距太康僅九十里城旦暮且破人心洶洶而先妣閒定如平時戒家人勿驚吾姑也先是命斌從伯父賁皇公讀書城北莊上倉猝聞亂則城門閉不得入伯父率斌徘徊郭外先妣聞之告先君曰來則俱死無益於是先君登城而望相對痛哭謂伯父曰城中有老母在我不可離也母在與在母亡與亡夫復何言我兄弟獨此一子耳且賊志在城野外或可以免兄其率此子北奔先人有靈無絶我嗣亂定徐求我音耗也言畢復大哭城外避難來者數百人聞之亦皆大哭伯父遂率斌北奔龍塘時三月二十日也又二日早城陷大母病甚且重聽家君倉皇負之逃於蘆葦中先妣乃謂家人曰嗟乎吾家纍世名門事至今日義無茍全獨念姑年老不得終事為恨若為我謝夫子善自保重吾兒遙遙懸隔汝曹當有脫者見吾兒為語善自立身勿忘母平日言也遂整襟經於梁家人為解之復入井井水淺家人又出之先妣怒曰若教我偷生乎賊至而不死非節也死不以時非義也於時賊已環至露刃相向先妣乃厲聲曰若等皆朝廷赤子食德三百年何負於若而作賊今大兵將集當寸斬若即奈何以刀鋸嚇人為遂大罵嬰刃嗚呼痛哉三日顔色不變賊中有羅拜者有歎息去者實惟崇禎十五年三月二十二日享年三十有七越三日賊徙寧陵大母先君僅免於難不孝斌乃得歸殮而殯於故居之寢九月黃河南決城郭廬舍盡為洪流殯堂竟殁於水嗚呼痛哉自壬午至今每嵗忌辰必隂雲四合風雨悲鳴波濤有聲震驚永夜居人聞之無不墮淚共傳其期至比寒食云湯子遺書卷七
