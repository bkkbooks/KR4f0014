body:
  text: 湯子遺書巻六工部尚書湯斌撰賦頌論辨璿璣玉衡賦有序臣聞蓂莢初生古帝識明時之義澤火成象大易垂治厯之文朝廷之政令未施奉若之儀規先備蓋敬天即勤民之本而法天實凝命之原自容成定握算六術已昭黄帝聽合宫五行較著南正司天北正司地重黎釐職於隂陽𤾉谷候春昧谷候秋羲和致嚴於分至莫不仰觀俯察上律旁羅然存其理而缺其儀未盡觀占之哲有其數而無其器難成稽察之功尚考虞書聿垂偉製躔度窺於寸管星文運於圜機聚山澤之精華極人工之賁飾誠授時之要術步厯之宏規也然而至德難聞成模漸斁精思罕遇不無章㑹之訛參騐或淆遂有統元之誤以建申為建亥魯人之月令無慿以食卯併食辰齊廷之度數何舛太初厯稱邃密壽王猶議其非乾象術號精深韓翊尚指其短固由天行之難定實亦制度之未精觀㑹通於古今應彰明於昭代恭惟皇上履端建極麗正凝神日就月將光華協於天地朝乾夕惕奮迅象乎風雷道在欽崇凜曰明而曰旦功深宥密謹亦保而亦臨時憲之歴久頒永年之法新勒合元㑹運世之終始辨五十二家之殘叢將見合璧聨珠歲書太史大章含譽日紀靈臺乃復上稽典謨究明遺憲旁招庶士敷奏宏詞將假翰藻而明三才藉筆泉而協五紀臣㒺窺理數素昧天人幸際昌辰敢辭蕪陋謹獻賦曰緬鴻濛之初闢邈莫知其紀極仰遼廓而無垠識蒼蒼之正色渺終古而左旋疇轉輪而不息羅萬象於周迴建極紐於南北三垣表内外之宫庭列宿畫中原之邦域圜九重兮誰營里九萬兮孰測維邃古之神靈肇觀天而作則揆茫茫之元化總睿聖之範圍粤重華之膺籙紹放勲之巍巍初受終於文祖乃躬攬夫萬幾方類禋之未舉首申命於衡璣蓋執中以體㑹於淵穆自觀察而效法其精㣲亦猶七十載之光被四表其功用惟本天治人而不違若夫魁衡招摇之密運隂陽寒暑之濳移非參稽之不爽何庶績之咸熈矧乃天雞曉唱曦馭晝踆朝浴滄海夕耀崑崙景近極而炎暑景逺極而易昬居牽牛而一陽來復舍降婁而春風易温龍山未足誇其燭光夸父無由效其駿奔至夫繼離宵曜夜光融融朒朓警闕朏魄示沖應潮汐之消長從箕畢而澤風日退度於十三遂置閏而成功再如木德行仁太白秉義熒惑主禮辰緯藏智惟填司信位王四季或期歲而周天或累年而遷次或方進而復留或既分而忽㑹信薄食之有常乃伏見之難泥初偶乖於累黍久漸易其機樞何以測算不失於晦朔氣數㒺愆於盈虛惟至人德合蒼昊制凖乾圖璣運外而規圜衡當軸而虛中兩極相望於直距九行環繞夫紫宫大梁實沈之周列鶉首鶉尾之麗空四遊兩環定經緯表裏之準三辰六合挈卯酉子午之鍼運躔離於晷刻轉造化於尺尋東作南訛畢協於節序攝提孟陬宛肖夫天心隨波降升似昭囘之銀漢與日環遶象靈烏之迅飛晝晦重隂而儀度不愆烈風雷雨而僭忒不譏飾以𢎞瑶綴以美璣璚璧精瑩雲霞之色可挹夜光璀璨星宿之芒依稀雖曰以管窺天何能持小而測大要之因衡察象實可殊途而同歸後若萇𢎞子韋之探賾索隱梓慎禆竈之極渺窮工殷周之巫咸史佚魏齊之石氏甘公王朔唐昧之觀星候氣尹臯吳範之視日覘風漢唐則壽昌一行之術密宋元則沈括守敬之業崇其用器也踵事而増華敷衍而不窮或造輪扇而刻木或倚渾儀而鑄銅或削蓮花以傳箭或斲觚稜以盤龍誰能不祖奥㫖而述成規遂可察氣數而合蒼穹豈若倚蓋彈丸蟻旋磨轉術家之㣲渺無聞法象之探索猶淺彼張衡之藻翰稱工洛下之經畫推善靈憲之圖書猶存歲差之考稽難舛損益適宜縮贏合撰足以騐同氣於天人通至誠於幽顯是以帝王俯察人事仰觀天則時幾必勅視聽毋惑常扶陽而抑隂更緩刑而尚德雨暘寒燠若其序歲月日星順其職皇猷玉潤而東壁聨輝帝典金清而左角不忒煌煌乎執大象而撫地中面稽天若卜年萬億敬抽毫而作賦若身隨臯夔之班而遊唐虞之世金臺懷古賦館課冀野漫漫燕雲莽莽樓煩之碧岫崚嶒易水之洪濤沆漭北走紫塞鴈門南通恒霍上黨柂以漕渠軸以太行誠帝王之都㑹豈霸主之封疆乃若朝陽門外桑乾河邊如雪白沙如山碧岸崗陂陁而半留路逶迤而中斷向秋埜之蒼茫對寒流之漫漫尋昭王之遺跡懷昌國而浩歎不辨黄金之臺焉知碣石之館當其戰國紛紜燕趙雄武西盪秦雲東平海霧戈鋋如鱗旌旄如雨固已俯崤函而淺衡湘誚稷下而陋䝉羽且其百里求賢千金市駿郭隗綰緺樂生珮印鳯不及棲麟不暇伏谷無幽蘭嶺無秀菊於是謝禮義之干櫓閲武騎之輣衝軾錦車而前騖驅魚軒而繼蹤乃飛閣宏敞髙榭崢嶸萬乗顧兮駐綵騎旌斾翔兮進瑶瓊故能設寳器於寜臺陳大呂於元英返故鼎於磨室植汶篁於薊城至於臨淄有如霆之卒邯鄲有執箒之賔既刓有功之印遂疑竒計之臣實為謀而不終應感慨於斯晨若乃秋風暫起百卉凄蒼霜封野樹鴻鴈南翔則有壯士於邑俠客魁壘珮長劍之陸離冠切雲之崔嵬慿玉砌而唏噓臨青松而浩慨長嘯兮撫碧空短歌兮凌滄海亦有簪纓公子殿省名流荒郊樽酒南陌輕艛看渾河而似帶望山雲而如樓撫石嶙而惆悵悲望諸之不留豈若凌霄飛雨銅雀鳯皇玉階金闥雕柱錦牆煇煌乎嶽瀆照曜乎清漳不過歌舞之美麗非有賢俊之遺光祗響平陵之夜漏空留荒苑之宿霜過之者不思居之者已忘嗚呼鐃鼔齊鳴簫韶零落騏驥奔馳駑駘纓絡庭有烏鳶山有白鶴曲士升喬髙賢負郭曽霸圖之不如况敢望乎鄗洛若夫伊傅為楫周召為鐸吟白駒之雅詩奏雲門之翟籥蘭臺石渠之髙楹白虎天禄之廣幕聖澤雲飛皇恩露灝英華肆浮麟鳯當道不藏無用之器不愛非常之寳則亦有抵玉驚禽揮金薙草况乎鄰斗極之光輝邇天漢之波濤又何必徘徊幽咽向兹臺而游敖哉懋勤殿賦擬館課黄扉日麗寳笈雲開帝座之光華正燦東壁之淑氣迎来道衍圖書法象觀乎天地學深墳典奮迅擬乎風雷我皇上岐嶷敏睿麗正凝神本精一以立皇極建中和而定羣倫納諫不遺葑菲招賢㫄及隠淪武庫森嚴撻伐悉遵廟算九功歌敘民隠日達楓宸固已樹儀型於百辟貞仁壽於千春若夫煥太乙之矞皇曜勾陳之暉麗黄雲紫葢輪囷鬱其上浮蘭戺金莖灝渺翔於天際珠宫貝闕複道斜通銀牓璇題交衢迢逓飛重簷以切霞炯丹壁而流霼龍舸泛萬頃澄瀾長楊帶千章蓊翳斯又足奠六鰲而鞏四極應三垣而馭五緯爾乃廣闢别殿宏貯縹緗鴻濛矗而竦峙觚稜啟而景彰結組幔於棼楣重綺錦於虹梁甲帳之月光如雪秘幄之芸火生香瑤函左列竹素盈牀五庫標目於西清四類充帙於東廂犀籖重積玉軸焜煌未足矜宛委之寳册何須論天禄之藴藏當夫金門朝罷宣政宴餘鸞佩聲逺鳯扇影徐名儒招從白虎大雅延自石渠究道系於洙泗證心法於唐虞無黨無偏闡維皇之敷錫天秩天敘繹臯陶之訏謨既朝乾而夕惕復無倦而有恒顧民碞之可畏識當位之利貞尊所聞而行所知髙眀光大有治人斯有治法深切著眀斯乃懋勤之實政匪僅肇錫以嘉名矧夫歌叶雅頌文儷誥盤懸鍼倒薤戲鴻騰鸞雲氣芝英之簡淵渟岳峙之觀漢武望而廢牘章帝顧而輟翰以此乗泰運而御六龍映晨光而翔五鳯采太史之陳詩第羣臣之嘉頌而時幾勅命祁暑思艱心遊農野道契先天夜如何其夜未䦨瑤編萬巻寳炬殘流月曈曈兮素華滿北斗低昂兮殿閣寒豈比夫甘泉暉章長樂未央凌霄飛雨茝若披香九華仁壽百福靈光列棼橑以布翼荷棟桴而高驤雕玉瑱以居楹裁金璧以飾璫祗矜制度之煒煜何敢希道德之輝光况乎文教敷宣天威遐被都䕶方開劍閣雲將軍已定三湘地碧雞金馬之修祀無勞蒟醬橦華之輸將遂易百禮具興萬舞咸備皇情悦愉羣臣既醉降絪緼調元氣阜財解愠薄賦寛徭踰於穆之緝熙耳擊壤之歌謠天下棄偽而返本敦朴而去澆追太始之元化偕華胥而逍遙謹摛辭而頌聖主㣲敢自託於王褒長白山賦維輿圖之廣大山川鬱紆而蜿蜒實融結於太始乃通氣乎坤乾環九州而緜絡類枝柯之敷宣仰北條之岪嵂望滄海而蟺延根彌固於華岱直嶢嶢而造天雲中玉液分派飛泉鴨綠南迴而浩蕩混同北遶而澶湲若夫石壁崟崎嵳峩萬丈槩太清觸緯象摘列宿於楹楣邇天漢之灝曠逺視則百嶺俱青近循則一巖千狀決飛瀑於層厓泞盤渦於疊嶂映朝夕而如金隔青杉而若幛既半散而照爛輝天閫之閌閬背藏太古之冰雪面對神山之宕漾乃其素烟晩施白霧晨縈或下横而疑帶或上罥而似纓日月隱蔽以成隂虹梁倒掛而崢嶸二韭四明五奥三菁峨嵋太白廣霞赤城曽未足方其崇萃並其䆳清也千里之内萬山駢擁劍㦸排連勢若相拱凝五瑞之偕來望紫宸而遙竦錫碧金銀衆色炫動逺近輕濃窈蔚森聳一旦觸膚寸而滃然也飛流崩壑噴雪迅霆蹴崖轉石澎湃鏗鍧不崇朝而雨天下也豈比於峛崺之青青其上則有猿􅏈狸獾犴獌猰猩紫貂白狼狡兔飛鼪貔豹熊羆羱麏麕􅀢擲飛捷於窮巘踔空絶於深硎蹲谷底而長嘯攀木杪而悲鳴其下則有丹石白拊琳瑉碔砆縹青結綠瑊玏昆吾磊砢磷爛㠎嶫相扶間以華芝靈藥采色叢敷醴泉涌出於其側經崎嶇傾注而㫄趨至於鴻鴈雕鵠鷹隼鷫鷞交精旋目繁鶩競翔更有珍異之鳥彩翰朱裳禽經不載漢賦未詳巨樹林隂樛枝叢倚合抱連巻形質㟪􅕲垂條扶疎落英幡纚霜霰之所沍凝風雨之所交砥連醫閭之暮光接扶桑之晨菲良真宰之所寳䕶故鴻龎於兹而初啟遂誕毓乎神聖同貞符於丹水東爥員嶠西耀崑崙北熿幽崖南震朱垠陸讋水慄無不奔走而來賔皇帝儲精垂思耀德布恩翺翔乎書圃逍遙乎禮園歌清廟之雝雝載洪頥之翻翻望豐鎬而顧念升肹蠁於帝閽坐法宫遴近臣歴吉日協良辰乗星犯露尋崕剪榛靡薜荔以為席噏流霞於通津紛長松之謖謖見僊鹿之甡甡藹繽紛兮獻玉斚闢天闗兮開地垠光絢爛兮錫純嘏秩俎豆兮千萬春藉田頌有序順治甲午館課維皇帝御極之十年海㝢底定九州内外畢獻方物大功既成禮文肇舉郊壇辟雍典章稽古大小臣工黽勉率職皇帝覽圖數貢慨然念曰予一人受天明命撫臨億兆惟小民稼穯艱難朕何敢晏然其上以忝宗廟聞古天子自耕千畆以供粢盛有司其具典制以聞明年春朕將親舉之越明年二月宗伯陳期司空除壇皇帝齋祓三日五更既興斗牛當中雲旗凝藹黛耜載輅公卿庶官翼翼恪恪奔走厥職庶民慶覩天顔載欣載喜既祭先農牲肥醴潔尊罍明備解靷秉耒具如儀式竊惟自古神聖之君有盛徳大業必有竒文博能之士珥筆執簡以昭鴻烈故嘉禾獻瑞載於周書十千維耦周頌歌之煌煌煇煇照耀竹冊千百年來如耳聞目見稱為絶盛今皇帝仁恩惠澤翺翔海表先是十日親祭朝日壇又遣官祭孔子廟又親祭社稷壇旬日之内四舉典禮而耕藉尤為數十年未行之曠典使撰次不得其人是使聖德不彰於後世而大化湮如也臣滋懼焉然臣聞圖治以誠不以文故耕藉之禮代有舉行而惟周之成王漢之文帝為昭者葢二主有仁心為質故天必應之臣見皇上軫念民依知非徒脩太平之儀者自兹以後五穗兩岐之瑞將繼周漢而興歌也已臣謹拜手稽首而獻頌曰於爍皇運萬邦攸承海波晏然典禮肇興克敬昊天嶽瀆式靈辟雍廟社鐘鼔維清乃眷下土小民之依載笠載襫載耦載耭露之方瀼日也未晞暑雨澐澐冬雪溰溰爰命宗伯考禮以進朕將躬耕以倡田畯羣臣稽首恭承明問敢不敬應以襄解愠日底天廟順時瓜見土瞽告協風工奏靈雨司空埽壇金吾陳輅載耒車右載履南畆霓旌縹緲旗旐紛糾雲日開朗清霞出阜帝乃三推下則五九各備其儀逮於農叟穜稑既播貽我来牟乃獻先農蒸蒸浮浮神農饗醴后稷承羞百神醉飽庶姓歌謳執爵太寢勞酒是酬帝乃眷命母螟母螽母雹母雺以報皇功豐年瀼瀼頌聲洋洋繼周越漢奕世無疆十三經注疏論自伏羲畫八卦而象數著唐虞垂典謨而道統開姬公作禮樂而制度備孔子贊易刪詩書作春秋而天人性命之理脩身齊家治國平天下之道昭於萬世矣秦火之後六籍殘缺漢儒收拾補綴參互考訂歴晉唐而十三經之注疏始定及宋元學道者益衆經㫖益明其間得失詳畧可得而論焉言易始於田何傳於梁丘賀又有京房費直之學陳元鄭衆傳之凡以彖象文言雜入卦中者自費氏始費氏興而田何遂息梁陳以來鄭康成王弼二註並列學宫鄭則多參天象王乃全釋人事天象難尋人事易習故鄭學浸㣲而王註獨盛其析義精深漢魏而降罕出其右而㣲雜老莊為兩晉虛無之祖後儒譏焉然欲一槩廢置則過也韓康伯邢璹之徒因而疏之唐孔穎達與顔師古撰正義亦以弼為本程子曰有理而後有象有象而後有數至㣲者理也至著者象也體用一源顯㣲無間觀㑹通以行其典禮則辭無所不備善學者求言必自近易於近者非知言者也朱子曰秦漢以來考象辭者泥於術數而不得其𢎞通簡易之法談義理者淪於空寂而不適於仁義中正之歸求其因時立教以承三聖不同於法而同於道者惟伊川氏之書而已然伊川專於言理而本義則又兼言象占易有聖人之道四焉合程朱之書庶乎備矣其他若李鼎祚之纂集訓解熊禾來知德之殫力象數其亦輔程朱之不及者乎尚書則伏生口傳二十八篇作傳授同郡張生其後分為歐陽大小夏侯三家而歐陽最盛是為今文魯恭王得壁中藏書孔安國校之得二十五篇是為古文自漢迄西晉言書者惟祖歐陽氏安國訓解晩出皇甫謐家雖當時大儒揚雄杜預之徒皆未及見故左傳所引者預輒注為逸書獨其訓解頗多疎淺往往與經㫖不合朱子疑是晉宋間人偽撰有以也孔穎達正義㫖趣多乖惟宋儒蔡沈集註頗得其要金履祥表註王栢書疑魏了翁要義亦多可採焉詩三百五篇遭秦獨全者以其諷誦不獨在竹帛故也漢初魯有申公齊有轅固燕有韓嬰又趙人毛萇自云子夏所傳作訓詁是為毛詩鄭康成為之作箋齊魯詩亡韓詩雖存無傳之者惟毛詩鄭箋至今獨立其宣釐正風不可貶也疏之者惟劉焯兄弟為善朱子博考諸家斷以已見取裁廣而立義卓信超出百家矣獨詆斥大小序最嚴門人多有疑者竊以為書序可廢而詩序不可廢即詩而論之雅頌之序猶可廢而十五國風之序必不可廢何也書直陳其事而已藉令深得經意序不作可也雅頌之文辭易知而意易明也獨風之為體比興之辭多於敘述諷諭之意浮於指斥蓋有反覆詠歎聨章累句而無一言敘作之之意者而序乃一言以蔽之曰為某事也且其説往往與左傳合子夏左氏皆親見聖人而聞其筆削之意豈盡無據乎朱子以二南雅頌祭祀朝聘之所用也鄭衞桑濮里巷狹邪之所作也夫子於鄭衞深絶其聲於樂以為法而嚴立其詞於詩以為戒其説誠正矣然左傳記季札來聘請觀古樂而邶鄘鄭衞皆在所歌使其為里巷狹邪之作則魯之樂工安能歌異國淫泆之辭而季子又從而聽之乎故大小序毛注鄭箋與朱子集註並行可也夫子春秋本文世所不見所編古經則皆自三傳中擇出耳然三傳所載經文多有異同如公及邾儀父盟於蔑也左氏以為蔑而公穀則以為昧如築郿也左氏以為郿而公穀則以為㣲㑹於厥憗也左氏以為厥憗而公穀則以為屈銀至於君氏尹氏一以為男子一以為婦人將以何為是乎此三傳經文之不能盡同也漢初胡母子都傳公羊春秋董仲舒以公羊顯於朝至何休作解説覃思十七年可謂專矣而多引䜟緯何可訓也穀梁自孫卿申公五傳至宣帝特好之范甯父子世守其業創名例百餘條以規諸儒同異之説可謂善矣而論者猶以其學不經師毋乃刻與况乎徐彥楊士勛之疏為邢昺所是正者又何足道也永平中能為左氏者擢高第為講郎賈逵服䖍並為訓解而杜預註盛行於時預之言曰左氏受經於仲尼故傳或先經以始事或後經以終義或依經以辨理或錯經以合異將令學者原始要終久乃得之其論至精且星歴地理必考其詳方言謠辭皆窮其義後人不能易其説焉間有棄經信傳者凡於傳例不合不曰傳之謬而曰經文闕漏則其蔽也其後沈文阿蘇寛劉炫皆據杜説孔穎達正義則又依劉學而損益之此三傳註疏之大畧也至胡安國始以其意探聖人之心於千載之上其書固所以明綱常正人心定國是垂法戒非經生之作也若其書字書名稱人削爵之例多有自相牴牾者謂盡得聖人筆削之㫖不敢信也古今治天下之理盡於尚書古今御天下之變備於左傳今取士專主胡傳士子傭耳剽目刺取左氏之字句以充帖括蓋有傳業為大師射策為大官而目不覩三傳之全文者矣其陋不已甚乎六經之道同歸而禮樂之用為急漢高堂生傳士禮十七篇又有古經出魯淹中然皆止於士大夫禮其朝覲㑹同郊祀大享逸而莫考河間獻王奏之朝合五十六篇宣帝時后蒼深明其業為曲臺記以授戴德戴聖慶普三家並立學宫鄭康成宗小戴作儀禮註而慶氏之學至曹褒失傳夫克已復禮之功不出視聽言動之間而動容周旋之際即性命精㣲所遇則儀禮一書豈非學者最宜盡心者乎獨其文辭質奥韓愈猶病難讀况下此者乎周禮之得入秘府也亦自河間獻王始獨闕冬官取考工記補之夫司空掌邦事居四民時地利考工何足盡之其得立學宫也自劉歆始杜子春因以授鄭衆賈逵厥後馬融作傳授康成其有注也自康成始而其有釋有疏也又自陸德明賈公彥始聖人致太平之迹獨賴此編之存漢武以為黷亂不經何休以為六國隂謀既不足知之而劉歆用之以輔莽王安石用之以變法後人遂以為周禮不足致治亦已過矣河間又得仲尼弟子及後學所記一百三十篇上於朝劉向檢所得合為二百四十篇戴德刪其繁重為八十五篇謂之大戴記戴聖又刪為四十六篇謂之小戴記馬融増月令明堂位樂記合四十九篇康成又為之注康成於三禮功最深考究名物象數曲盡其詳朱子深許之晉宋以來皇侃熊安生禮業最著孔穎達據以作正義宋儒篤信遺經淳熙有俞廷椿復古之編嘉熙有王次㸃補遺之錄陳澔採衆家以為集説吳澂合三禮以為考註其羽翼之功固皆有可言者朱子欲考定三禮請於朝不果行止脩復王朝等禮喪祭二禮付門人黄幹紹成其書曰通解汪克寛又因其成法為補遺今之學者倘以朱子之意折衷全禮彚為一經俾海内獲誦習古禮之全則諸儒衛翼之功得收實用矣論語則何晏集孔安國七家注成之皇侃本衞瓘十三家説疏之孟子則趙岐註之張鎰丁公著釋之孫奭據以作正義當時並稱精確由今觀之於孔孟一貫忠恕性善盡心之㫖視程朱猶霄壤也孝經為河間顔芝所藏獻王得而上諸朝凡十八章所謂今文也與尚書同出孔壁者凡二十二章所謂古文也孔安國劉炫宗之劉向典校經籍以十八章為定鄭衆馬融鄭康成皆為之註唐明皇取王肅六家之説參倣孔鄭舊義為註邢昺作正義疏之司馬温公范蜀公皆尊信古文指解朱子為刋誤亦復多從古文明呂維祺作大全本義集諸家之大成夫子曰吾志在春秋行在孝經當立之學宫與論孟並爾雅始於周公而成於子夏誠九流之奥㫖也自終軍豹䑕之辨其書始行郭璞究心十八載草木魚蟲名物訓詁昭然備晰蓋古人之言所以難明者非但古人之義理難明也實古今之事物不同名號各異為難明也明爾雅則可以識箋注之㫖歸也可以尋古人之精義也外此論體製則有説文諸書辨音韻則有四聲譜諸書皆所以輔爾雅而備同文之治者也可以其為小學而忽之哉總而論之漢儒去古未逺師友轉相傳授淵源有自後人多因之若文質三統馬融之説也九六老變孔穎達之説也河洛表裏之符宗廟昭穆之數劉歆之説也五音六律十二管還相為宫鄭康成之説也是知漢儒之學長於數得聖人之博宋自周程張邵逮於朱蔡天地隂陽之奥道德性命之㣲深究其妙不泥前人之説其學也得聖人之約合二者而一之然後得聖人之全經若偏主一家是漢儒宋儒之經而非聖人之經也豈深於經者哉悉本先儒成説不敢妄出意見自記二十一史論蘇洵曰經以道法勝史以事辭勝經非一代之實錄史非萬世之常法是不明尚書之義春秋之㫖也夫經史之法同條共貫尚書備帝王之業經也而通史春秋定萬世之憲史也而為經脩史者蓋未有不祖此者也故道法明而事辭備此史之上也事辭章而道義猶不悖焉次也二者皆失斯為下矣司馬遷史記創為義例上下三千餘年為五十餘萬言辨而不華質而不俚其意深逺則其言愈緩其事繁碎則其文愈簡隱而彰直而寛非豪傑特起之士其孰能為之班固西漢書自武帝以前守其説而不敢變其所自為贍而不穢詳而有體經緯錯綜瞭如指掌亦古今之良史司馬之流亞也然自謂漢運紹堯以古今人物强立差等居攝不附於漢平孺子下列於新莽安能逭劉知幾之所短哉王通曰遷固而下帝王之道其暗而不明乎天人之意其否而不交乎制理者參而不一乎陳事者亂而無緒乎嗚呼難言之矣范蔚宗東漢書成自謂體大而思精由今觀之論竇武誅中官為違天理論班勇使西域為遺佛書抑節義之董宣於酷吏升忍恥之蔡琰於列女志王喬之鳬履記左慈之羊鳴詭譎不經文辭繁縟春秋之義於斯盡矣然論序詳明不可誣也陳壽述事簡嚴張華尤善之乃以父髠之故謂武侯不逮管蕭以索米之故而丁儀遂不得立傳且帝曹魏而宼劉漢所謂正大義以黜僭竊之義謂何使非習彥威辨之綱目正之大統不幾終紊乎貞觀時以何法盛等晉書未善乃據臧榮緒書増損之至宣武本紀陸王二傳煌煌御撰何其盛也然而史官之事至以天子臨之且志傳分手叢冗駢麗語林世説盡入青編幽明摉神咸被採錄何可不辨也宋書本承天之舊事雜晉魏失於限斷沈約創志符瑞不經甚矣子顯齊書實因江淹天文但紀災祥州郡不著户口思亷梁陳二書實卒父志祖父揚名言多不典然而倉皇變亂之際鑒戒頗多不可得而泯滅也收之後魏借公報私毁譽失實百藥北齊避諱畧號遷就弗端後周牛𢎞惟務清言德棻繼之率多牴牾後之君子何以覽觀焉李延壽南北二史刪畧繁蕪編摩簡徑比之正史實為過之魏徵隋書本末備舉倫貫有敘陳壽以來罕有其儔劉昫舊唐書府兵無志藩鎮無表是昧制度之原忘喪亂之本長孫與敬宗並書昌黎與禹錫同傳則賢否無别功罪等觀目劉蕡以文苑而直節泯然例吳淑以外戚而卓行蔑著則大節掩於細謹髙德蔽於閥閲此曽公亮之所以致譏而歐宗之所以釐正也新唐書雖事増於前文省於後而削去詔令王言無徵多用奇字讀者易厭姓氏多訛年月屢異君子歎之矣蓋歐宋平分學術稍殊固不若五代史之獨出一人也其文簡逺澹宕當雲擾瓜分之日而君臣上下之交治亂興亡之故一唱三歎迴環不已蓋與司馬相表裏矣史之有本紀史之綱維也古之史本紀立而全史具宋史舉駁雜細碎志傳不勝書之事羅而入之本紀發凡起例舉無要領載事立傳不辨主客互紀則複累而無章迭舉則錯迕而寡要且巻帙最繁而缺畧不少如韓琦傳不載儀鸞司撤簾之事狄青傳不記與曽公亮論方畧之詳又如史彌逺傳但序官閥兼載奏章褒刺失據衮鉞無慿何其疎也金史簡潔逺勝宋遼蓋元好問之原本佳耳元史雖才集衆長而削藁迫促夫龍門扶風父子相繼梁書陳書十載告成而今限以條例要以時日欲成一代良史胡可得也史才實難自古歎之掲傒斯曰有學問文章而不知史事者不可與有學問文章知史事而心術不正者不可與然則必才備三長而克已無我幽明不愧後能誅姦諛而發潛德安得司馬君實朱元晦其人而與之議史事哉春王正月辨聖人之書明白簡易而後儒推求過甚遂成不決之疑者如春王正月之類是也註春秋者不下數十家置春王正月四字不論者固有之其以周改月兼改時者則漢孔安國鄭康成至明趙子常王陽明賀景瞻也以周改月不改時者則宋程伊川胡康侯至明劉文成也以周不改時兼不改月者則宋仲黙魏華父至明章本清也諸家引經據傳自以為確不可易而余則直以春秋本文斷之而已矣春秋桓公八年冬十月雨雪十月者以周正為建酉月故雨雪為非時若夏之十月建亥雨雪亦常耳何足書成公元年二月無冰此建丑月也若建卯月無冰又何異焉莊公七年秋大水無麥苗如周不改月不改時麥苗何得至秋定公元年冬十月隕霜殺菽若夏之十月菽已穫矣隕霜亦非失時如此之類甚衆更有可證者僖公五年左氏傳曰春王正月辛亥朔日南至日南至者子月也此又改月改時之的據也夫子特書曰王正月而左傳亦釋曰王周正月者蓋明其為周天子之正月非夏之正月殷之正月也而又於二月三月亦繋之王見丑月為周之二月寅月為周之三月非同於殷正同於夏正也過此前代無以為之正者則亦不必書王以别之矣或曰四時之序夏正為善周公大聖人也以冬為春可乎曰陽明言之矣陽生於子而極於已午隂生於午而極於亥子陽生而春始隂生而秋始自一陽之復以極於六陽之乾而為春夏自一隂之姤以極於六隂之坤而為秋冬此文王之所演而周公之所繋何不可之有胡氏泥於冬之不可為春也故有夏時冠周月之説以為孔子告顔淵以行夏之時此為見於行事之騐則又謬甚如胡氏之説周改月不改時是雖以子月為歲首而四時之序猶夫夏也以冬為春乃自孔子始以夏時冠周月非所以尊周以仲冬為孟春豈可謂行夏之時乎不夏不周之間孔子何以自處焉夫行夏時者師友平日論道之言所謂損益百王垂訓萬世者也春秋者聖人尊周室明王制之書也王制固未有大於正朔者孔子為當時諸侯强横大夫陪臣僭亂而作春秋乃首改周天子之正朔也恐聖人亦有所不敢矣或曰孟子不云乎春秋天子之事也庸何傷曰所謂天子之事者謂賞功討罪以明天子之法使諸侯不敢悖天子大夫不敢悖諸矦耳非必變易四時之序改本朝正朔而後為天子之事也胡氏以此為垂法後世吾恐法未可垂而先犯為下不倍之戒矣且此亦空言耳烏在其為見諸行事之騐乎故周不改月則孔子必不敢以十一月為正月以十一月為正月則周之必改月可知也周不改時則孔子必不敢以周正月為春以周正月為春則周之必改時可知也曰豳風亦周詩也何以用夏正曰周之先世以農事開國后稷公劉以來固虞夏商之諸侯也為虞夏商之諸矦必用虞夏商之正朔且豳風述民事夏正為切而春秋明一王之大法尊周為重未可以為例也曰諸家引商書元祀十有二月以為商不改月之證何歟曰書缺有間矣商之時制固無從得而考要之不可以例周與其雜引他書以釋春秋固不若即春秋以釋春秋也左氏公羊穀梁皆周人也於此獨不加論焉亦以為不必論也使當時以正月為冬而孔子獨書曰春三子能已於言哉湯子遺書巻六
