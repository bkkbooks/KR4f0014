body:
  text: 湯子遺書卷九工部尚書湯斌撰告諭嚴禁徴收錢糧勒索火耗私派之弊以恤民艱以清賦稅告諭江南財賦甲於天下小民輸將正供拮据維艱兼以遞年水旱頻仍困苦尤甚皇上軫念㷀黎宵旰不遑額徴正賦之外不得橫徴私派多科勒索定有處分嚴例州縣有司務宜潔已奉法杜絶私派痛除耗羡俾民間省一分浮費即可完一分正供司道府為屬員表率尤宜端本澄清剗剔蠧弊禁止苞苴則州縣免分外之需小民即可受寬大之惠額賦易于完辦各官亦免考成之纍庶不負公廷簡任牧民之意乃有等不肖官吏惟圗營私飽槖罔顧功令民瘼或於派徴之時浮額多科或於收納之際加勒火耗如地畝錢糧江南各屬額賦已重每徴正銀一兩部法之外多勒耗羡八九分至一錢不等而江北州縣竟有加至一錢五六以至一錢七八分者至於雜辦錢糧如行夫牙户匠班漁課碾餉等項竟不開明每丁應徴數目止開某户應徴幾丁字樣通同奸胥蠧役恣意橫徴每丁止應徴正銀一兩四五錢者竟徴二三兩仍復加四五勒耗再如酒稅一項原因用兵需餉暫行徴收為民牧者自應體恤民隱照額收解乃視同几肉亦復加四徴收更有並非額編橫行派纍如田房稅額既經按照業户賣契計數徴收稅銀復於田畝上按圖按甲加數派徴及借稱某項公費并捐助名色輒加派里遞指一徴十官蠧分肥此皆州縣刻削下民脂膏之弊也司道衙門凡遇州縣交錢糧則有坐平耗羡名色彈兌陋規庫官胥吏堂役以及把門轎傘之夫俱有收銀使費種種錮習難以悉數此則司道府婪索州縣之弊也此等弊竇在從前督撫厯經嚴禁稍為斂戢者固有而陽奉隂違者實多本院未出都門久已稔悉及入境以來見聞更有真切嗟小民有限脂膏上下官蠧如此層層剝削無怪乎民生日蹙朝廷正賦嵗嵗逋懸動盈千萬若不嚴行懲創何以救民水火無虧國儲除現在密訪參拿外合行出示禁飭嗣後各宜洗滌肺腸改絃易轍凡州縣徴收正雜錢糧務按由單科則應徴確數如法驗派明白開寫單票令民通曉毋容額外私加毫忽仍聽納户照依部頒法馬按數稱兊自封投匱匱役止許登填流水截給串票不許執戥稱收司道衙門如遇州縣解交錢糧一依部法平準兊收明白即便印掣批文送院銷算永杜積弊如有不肖官蠧怙惡不悛仍踵前項諸弊許諸色人等不時赴縣具稟一經察確官則飛疏參拿役則立刻杖斃倘有奸頑里甲劣襟衙蠧輸納糧銀故為短少亦必查驗真實申報究懲不得窺視殷實之家借名納銀輕少籖提捉拿飽其溪壑如有此等定行飛提重治本院執法如山言出必行斷不寬假各宜猛省無貽噬臍慎之慎之嚴行設法催提永禁濫差滋擾以杜侵那告諭江南各屬為財賦重區欵目滋繁有一項之徴解即有一項之考成州縣印官固宜竭力徴輸以副功令毋容墮誤而在上諸司各有督催之責貴乎嚴立期限以程完缺不在濫差滋擾乃向來司道府衙門立法不善惟以差提為能事不論刑名錢穀不計輕重緩急動輒差催州縣甫及開徴而司道府之差役接踵而至更有一項錢糧而有守催之名不一而足此輩一下州縣惟知恣肆勒索講說差規需索酒食溪壑既盈即置公事于不問稍不遂欲非聳稟鎖拿即私行毆辱而州縣經承率皆窮役既無身家以應若輩無厭之求欲冀一時稍寬不得不多方承順因而那撮錢糧侵蝕國帑勢所必至本院深悉此弊屢經通行飭禁近聞州縣仍有守催坐催等差紛紛盤踞在諸司之敢於玩違者或以州縣徴解愆期呼應不靈謂差提可以速結獨不思司道府官為屬員表率若能設法催提嚴立程限示以必信别有勸懲下屬縱使冥頑亦必感而知奮可以不煩差擾何竟漫無區畫惟以濫差為事且差往往不係公事甚至有不行牌票令書吏下縣口催多係私意科斂不肖蠧役增飾恐嚇有司心知其僞不敢聲言常至那借庫項以應其求錢糧虧空都由於此尤為不法合再示禁凡督催錢糧及一切欽部刑名事案務須設法勉勵分别勸懲示以必信必從不得輕差一役州縣各官亦宜仰體急公上緊完結勿以不差催而忽玩如敢仍前濫差下縣致滋索擾侵那情弊本院見聞所及立即密拿差役并經承重處外定將違禁差擾緣由特疏指參嚴禁婦女入寺燃身以正風化告諭婦職但司中饋閨幼専習女紅皆宜靜處閨幃别嫌明微即異姓親戚不得相見乃聞開元等寺何物妖僧創為報母之說煽惑民間婦女百十成羣裸體燃燭肩臂謂之㸃肉身燈夜以繼日男女混雜傷風敗俗聞者掩耳而乃習久不察視為故常良可哀憫即曰親恩當報生養死葬自有定禮違禮辱身是謂不孝何名報恩合行出示為此示仰該管官吏及軍民住持人等知悉嗣後婦女各宜靜處閨幃不得仍蹈從前惡習入寺裸體㸃肉身燈如有犯者許地方附近居民稟官嚴拿究處女坐其父婦坐其夫僧道容隱不行舉發者解院重責三十板枷示寺門三個月不貸嚴禁請託以肅官針告諭江蘇地號繁盛遊客所聚風俗刁詐人心險惡官斯土者往往以情面請託敗其官聲得罪公論禍不旋踵本院草載林泉六年史局茹蘗飲冰甘之若性奉命撫吳誓之關帝神前斷絶交遊不畏强禦受賄狥情神明殛之將及一載地方官民頗能相信惟是積習日久不肖小吏猶多藐玩不知本院執法到底輒欲自行嘗試有一缺出爭謀署篆皆素行貪惡敗檢無恥之徒不知世有天理王法雖本院大聲疾呼猶然瞶瞶者此等奸徒可以百里相寄乎夫百里之地錢糧刑名皆國計民生所關即部選非人本院尚當白簡嚴糾稍有狥縱便屬溺職若委署非人罪何可逭然委署重任矣而署官不能盡職是署官負本院也若先狥情濫授是本院以朝廷百里民命賣與匪人也即其人不至大敗而本院之心尚可對上天告皇上乎除凡不自安分妄行營謀者另行糾處外合行曉諭為此示仰大小屬吏知悉各宜體諒本院誓神之意恪守官針無懷徼幸如本院不能慎終如始一有狥假不妨公揭通衢以彰本院負國之罪如本院清苦勞瘁自甘毫無私弊亦求相諒以全晚節幸甚幸甚亢旱不雨急圗修省以祈有年告諭民間插蒔方畢惟賴雨暘時若可期豐稔不意仲夏至今雨澤愆期近日亢旱彌甚田禾將槁本院念切民瘼中心如灼切思天道人事感應不爽自非官墨兵驕即係政苛刑濫除本院率屬痛自修省外仍建壇祈禱禁止屠沽清理刑獄惕天之變分民之憂庶幾甘霖早沛不致薦於饑荒各宜䖍誠無飾具文嚴禁兵丁擾民以安蔀屋告諭江南財賦重地民間一草一木俱關國課至於各營兵馬自有額設糧餉料乾按月支給豈容橫取況駐防兵丁違禁擾民屢奉嚴綸申飭犯者即行參處乃聞各屬有等不法營兵每借砍馬草為名將民間田蕩所産蘆葦恣行樵採稍或勸阻即逞凶暴鄉僻小民孰敢抗敵惟有飲痛吞聲而已甚至縱放馬匹踐踏禾苗糾合營使砍伐墳樹種種肆惡俱干軍紀該管營辨漫無約束亦屬不職除現在密訪拿究外合行嚴禁為此示仰各營辨兵丁知悉嗣後務須嚴明紀律均束隊伍毋得縱容兵厮在外生事砍斫民間一草一木如有不遵即便據實通報革治倘該管將辨知情故縱或經本院察出或被告發定以縱兵虐民㑹疏指參并拿悍兵以軍法重處決不姑貸嚴禁濫委家丁以肅吏治告諭地方公務該管官員各宜加意澄清剔除積弊使上不誤公下不擾民庶免咎戾胥役不過供奔走傳號令而已至於家丁乃本官私人尤不得干預地方之事本院下車之始已經嚴禁近聞各地方官抗玩不遵以衙蠧為腹心視關防若具文無論修造監工開倉監兌造船辦料等一概倚任家丁胥役互相結擾狐假虎威恣睢肆橫層層剝削刁難需索窘辱備至賣富差貧弊竇百出一切公事經此輩之手盡為吞噬之具此等情狀本官豈真聾瞶不聞乎或以此輩為誠信足仗乎抑假手攫金以自肥乎溺職若此深可痛恨合行出示嚴禁為此示仰撫屬官吏軍民人等知悉嗣後一切公務如有仍前擅委家丁出外招搖刁難良懦需索私費者許被害人等不時赴轅控告官即參拿役立杖斃各宜凜遵勿貽噬臍嚴行飭禁告諭各項當官久經禁革白票取物有干功令不意蘇城尚有冰窨承值官府相沿莫能革除查設厰藏冰蓋因春夏江海魚鮮逺來非冰即腐窨户在於臘月鑿窖收貯待時發賣以覓微利而蘇州大小衙門輒以冰為驅暑納涼之具每遇夏月差票絡繹恣意白取供應上司飽送知交視為應得致窨户雇夫雇船挑運裝送所費不資甚且各衙門搭蓋馬厰與夫包束家伙需用草索亦著窨户出夫打造即或稍給工價悉被胥差兵役中飽究竟不沾實惠種種弊害殊堪矜憫合亟飭禁為此示仰蘇郡官役軍民人等知悉嗣後炎天用冰務要給價平買償其工費至於搭厰夫役草索不得仍著窨户備辦如有奸役朦官白取及混派夫役致滋民困或經本院訪聞或被受害告發定行官參役拿不貸嚴禁諱盜以靖地方告諭吳下盜風日熾由於地方官慮處分嚴切遇有被盜便與失主為仇逼令隱匿不報其盜情重大勢不可掩者逼令改强為竊甚至昧却良心輒拿家屬婦女審詢坐以是姦非盜敲拶竝行以故失主畏其苦纍不得不隱忍緘默即申報矣奉文勒緝往來解比差役盤費悉出失主盜之所餘不盡不止其意總要失主有不敢不諱之勢而後官長得安然遂其諱盜之心既助盜以虐民實驅民而為盜是官長實盜魁也如此作官惟知有自己功名不知有良民身家性命不但上負朝廷抑且絶滅天理每日坐堂開衙乘輿張蓋何面目與斯民相對乎合行嚴禁以後當嚴禁保甲以清盜源如有失盜不論是强是竊俱限三日內拿獲真盜追出真贓申報分别照例定罪如不即行緝拿數日之後賊已逺遁贓已花分即獲盜亦難定招若以後仍前逼􅀈失主隱匿不報及借端誣衊酷刑􅀈闕員役索取失主盤費及妄拿平人私下拷嚇株連無辜者或經本院訪聞或被失主告發官員立刻題參拿役杖斃舉行鄉約以善風俗告諭古昔盛時士有庠序學校以樂其羣民有比閭族黨以萃其渙禮讓興行風俗朴茂邇來教化不明人心陷溺父兄之訓戒不先里黨之薰陶無素因之一善未聞多以惡敗至於犯法有司輒執三尺以繩之輕則杖笞重則斬絞每嵗讞獄之章常至千餘本院昔承乏綸閣閲諸曹奏牘每至大獄輒反覆不置竊嘆孰無父母孰無妻子一旦身罹刑辟莫能救助為之泣下夫先王以刑弼教非以刑為教也一言不教而惟刑是加豈父母斯民之意乎今奉命撫吳見俗尚浮華人情嚻詐訐訟見於宗族仇殺起於比閭泰伯季子之風微而専諸要離之習勝欲挽回未俗馴至淳良條約頻頒未見省改中夜思維人心本善豈盡下愚不移從容漸摩自當感動鄉約之法最為近古恭讀上諭十六條聖人之言廣大精微修身齊家之道遷善逺罪之方總不外此撫屬府州縣衛所官吏定期每月朔望㑹集士民於公所其鄉鎮等處各擇一空濶祠宇選年髙有德為鄉人所重者敬謹講說務要明白痛切使人感動平居無事則互相叮嚀一有過惡則彼此訐責共存天理共守王法孝親敬長講信修睦敦尚朴實解息忿爭無負聖天子尚德緩刑化民成俗至意無徒視為具文禁止船户涉險夜行以弭盜賊以安行旅告諭蘇郡為南北通衢商賈往來如織又素稱澤國河港繁多經商貿易之人皆賴舟楫以利攸行應由官塘大河而走曉行夜泊以保無虞且沿塘各處巡船汛兵聫絡防守稍有警息亦可呼應追捕乃有無知船户或貪捷徑或圗趕路每每竟由荒僻冒險夜行以致盜賊乘機竊發莫能救援至於客商雇船俱由牙埠此輩熟知船户來厯客商逺來投牙雇載自無疏虞常有貪鄙之夫吝惜小費不由船牙寫載私自雇覓遂致奸惡水手瞰有重資故意行走僻路勾盜劫掠甚有亡命之徒以舟為餌減價攬載誘令入彀行至中途肆行謀害不特資財一空且有性命之憂禍端莫測深可痛恨合行嚴飭示禁自後凡客商雇船裝貨務須著落埠頭雇覓熟識船户寫立票約仍由官塘大河行走遇晚停泊民居稠密有兵所處以便巡邏不得貪走捷徑越站夜行致有失事之虞如有牙埠不察船户來厯混將奸船雇裝客貨以及船户違禁行走僻徑者一經事發提牙埠船户一體嚴究治罪斷不姑狥爾等商民各宜猛省保全資本性命慎毋行險徼幸自遺伊戚也嚴禁阻葬惡習以𢎞孝治告諭民間買地安葬原屬各從其便乃吳下惡俗每有棍徒搆同勢豪凡遇民間造墳輒借稱妨礙風水煽惑阻撓肆行嚇詐稍不遂欲糾集打降拳勇百十成羣或毁撇磚石灰料或夤夜掘壞地脈甚至掀翻棺木打傷人命肆橫無忌遂至訐訟紛爭拖纍破家安葬無期終成暴露言之真堪髮指本院深悉此等惡習已經嚴禁不謂蘇松屬縣其風猶熾此皆地方有司奉行不力故耳合亟嚴行示禁為此示仰撫屬官吏軍民人等知悉嗣後民間造墳安葬聽從其便如有不法棍徒怙惡不悛仍敢糾衆阻葬許受害之人指名具告地方官嚴拿解院以慿盡法重處如有司奉行不力或經本院别有訪聞定以溺職指參決不姑寬嚴禁營債盤剝重利以除民害告諭放債每兩三分起息載在律令近聞各處營兵不遵定例當放債之時先扣加一利息加一折色搭配低潮短少分數帶領保人又扣尅使用茶酒花費名為一兩其實不過數錢及至還債則利上起利輾轉盤剝動至數十倍少或拖缺輒行吊打凌辱每致赴水懸梁或逼獻産屋妻孥又有印子錢名色通計本利逐日抽取二分公然開店鋪勾引鄉愚小民一時費用無出圖濟目前後即竭力經營每日所得些微何能償還重利一入陷阱無計自脫有限之脂膏盡為此輩吮噬聞蘇城內外開張此店者不下數十百家民生安得不蹙更有營旗兵丁等肆行撞掠與大盜等尤為暴橫合行嚴禁嗣後百姓各安本業不得輕揭債銀各營兵丁亦各恪遵功令不得身為中保及租房與人開張債店射利無厭地方嚴加譏察如有違犯兵則拿解該管衙門究治中保人等立行枷責仍將利銀責令賠償追券焚燬如有折算子女財産逼人赴水投繯情罪重大立即具文申報本院飛章請㫖從重處分嚴禁營兵放馬斫青以安民生以裕國課告諭江南為財賦奧區寸土皆有課稅民間藝植輸糧非荒蕪廢地可比凡營伍馬匹自有額設草豆喂養如有放牧不許作踐禾稼久奉嚴綸孰敢違背乃聞有不法營辨縱兵結黨成羣放馬出城或囓食禾麥或侵伐墓木所遇無敢攖觸如馬在田偶或驅趕即以傷馬為題無端扎詐至於水鄉茭蘆草蕩皆有賦之區兵丁借名斫青縱令小厮擅捉農船聫舲逐隊夥結到鄉將有課蘆葦肆行砍斫公然裝載貨賣致民賠糧飲泣又草船所過之處遇民船則故意衝擊毆奪篙櫓傍村居則遍掠雞豚橫取柴草更有地方棍徒假作營裝勾引暴戾種種擾害均干軍紀向來提督總鎮熟知其弊嚴加禁飭不啻三令五申乃兵厮逺離部曲罔知遵守將令約束端在平時方今東作將興菜麥滿畦茅簷蔀屋力穡多艱尤宜斂戢安農除一面嚴飭各營辨兵并密訪拿究外合行出示嗣後如有不法兵丁小厮借名放馬斫青傷殘禾麥强斫蕩柴擅捉民船擾害鄉村及地方棍徒勾引生事者諸色人等協力擒拿解官申究以憑軍法嚴治曉諭告報版荒長洲縣版荒田地本院因念里民包賠苦纍是以示令自行開報定奪然功令森嚴事干地畝錢糧題報請豁談何容易必實係不毛絶地方可據實報明候委官察勘若一毫虛假萬一奉㫖差官察勘罪將誰歸無奈里民良頑不等竟將原有種植可以供賦之田一槩混呈妄希蠲減以致荒數纍萬真僞難分矣目今東作方殷若委官履畝踏勘必致妨誤農業相應停止為此示仰長洲縣里民知悉國課嚴急無草草具題之理俟秋穫之後遴選清廉才能官員確訪真實不毛之地另行分晰緩其徴比量充雜辦差徭不許指名造冊等費科派分文以致重纍窮民如有故違本院一有訪聞定行從重究處嚴禁賭博以絶盜源告諭士農工商各有本業賭博為非律有明條吳下有等無賴棍徒開賭場引誘良家子弟羣集賭博徹夜呼盧良賤不分兵民混雜一入彀中莫能悔悟腰纒罄盡流入匪類穿窬掏摸無所不為開賭棍徒但知拈頭取利孰論奸良以致賭博之場竟成盜藪貽禍地方深可痛恨至於紳襟讀書明理尤當砥礪亷隅戒絶怠荒名教自有樂地何乃亦以鬬馬吊為事總緣習俗已成莫能自振甚至與士卒細民為伍禮讓全無惟慿機械惡習久經嚴禁印造馬吊紙牌令其改業孰意愍不畏法之徒仍不悔悟除現在查訪拿究外合行嚴禁為此示仰諸色人等知悉士農工商各務本業不得相聚賭博陷入不義甘蹈法網如有不法棍徒開場糾賭以及私造紙牌暗行發賣許地鄰保甲人等協力擒拿赴禀本縣印官轉解本院究詢明白按律從重治罪如地鄰保甲狗情容隱事發一體究處各宜猛省毋自執迷禁略販子女以全人倫挽頽俗告諭略販之罪新例甚嚴乃吳下惡俗有等奸媒牙保覘知貧人子女稍有姿色輒巧言哄動或稱官宦討取媵妾或稱富豪收為兒女始以重價立成文券及至攫金到手半入奸囊而為父母者止圗目前之資財不顧骨月之分散或父母稍有良心不受哄騙若輩即糾合黨類俟候子女偶然出門竟行誘擡入窟展轉逺賣得價瓜分逮其父母告官追緝其去已逺杳然莫可根踪不獨骨月分離反多公庭拖纍言念及此殊堪髮指又有一等無賴之徒嫖賭放蕩衣食不給被奸媒設騙或將本身妻子自賣逺方永離鄉井甚至鬻為水販墮落娼家更有為富不仁之輩收買人家子女教習吹彈技藝通同媒媪誘紈袴子弟婪取重價賣為姬妾此種澆風惟蘇郡維揚江寧為甚愚民誤墮其術生離逺别而若輩坐享其利天理王法皆所難容該管有司身在地方視為細事漠不相關全無禁戢溺職殊甚本院念切維風合行嚴禁為此示仰撫屬官吏軍民人等知悉凡有前項奸媒販棍以及收養瘦馬之徒嚴行驅逐出境如愍不畏死潜頓境內仍前拐販子女許鄰里保甲赴該管官據實舉報解本院審明題請正法鄰甲容隱不報一體治罪至若窮民不惜兒女逺賣他鄉有司官務須多方勸諭令其悔悟如𡨕頑無知甘心拋棄一并照例懲處決不姑貸各宜猛省毋蹈法網嚴禁刁風以安良善告諭聖賢語治不過教以田里樹畜申以孝弟禮讓遂至比屋可封刑罰可措者今日教化凌夷奸僞滋起稂莠不剪而欲休息蓋亦難矣吳中刁惡遊民最為百姓患約舉數端嚴加懲創自示之後凡以前違犯者當思渙然省改如長惡不悛三尺具在斷不寬假毋謂本院不教而殺也一奸暴遊民結黨歃血或假稱缺債或揑騙賭博持棍操刀行凶打降一人有讐則聚衆同報一人告狀則彼此扛幫甚至窺寡婦孤兒家道殷實而柔懦愚䝉便指姦盜誘賭誘嫖或强使揭銀或唆調爭訟又勾引旗營機匠結交衙門皂快挾同詐財互相容隱更有欺隱田糧抗逋國課窩盜窩訪保官保吏壞法亂紀真堪痛恨自示後五日內不即解散本院訪出盡法究處各重性命其毋後悔一民間或因小小口角邂逅身死並無致死情由尸親指死者為竒貨或擡尸上門或搶家財或鎚棒劄打或傷器物勢同盜賊不厭不休以後如有此等盡法重懲枷示三月決不輕恕一刁民心懷奸僞志在得財家中但無營生就要摉尋告狀更有一種訟師専一起滅詞訟教唆愚民或揑寫無影虛詞或隱匿年月姓名或以活人作死或盜人墓檢尸或造混告二三十人或牽連無干婦女或假冒籍貫或擅用粘單或一狀未問一狀又投或上司衙門連遞數紙以致批問紛紛提人擾亂有分毫小事而經年不結者有東審西詳往返千餘里者飢寒疾病老弱之人連纍常死莊農傭工之家盡誤生活及至事完之日不過笞杖罪名多半全無指實如此奸詐之徒擾亂生民死有餘辜往往反坐通不知懲以後州縣置無恥刁民簿除原因辨寃訴屈所告得實者不分曽否告幾次免其登記外其餘但係半虛者即登此簿簿登三次者將本犯扭解本院以慿盡法重治所告多人除緊關重犯外其無干牽告之人所費盤纒即於本犯名下計日追銀給牽告之人收領鄉黨良民休與為禮一造言之人無端揑事見影生風或平起滿街議論或寫帖揑名文書擅編歌謠劇戲或談說閨門是非除致出人命者即依律定罪外鄉人等但有指實者即便公舉到官有司盡法重治枷示三月本院記惡良民不與為禮一賭博乃敗家之緣由做賊之根本開場者譬如窩主束手分財賭博者譬如盜賊夥暪癡幼此輩若不嚴緝地方安得寧謐各州縣官於城市鄉村印貼告示但有拿獲真正賭博者除照例盡法究治外仍於本犯名下追銀十兩充賞明正學勤課藝告諭聖學明則風俗淳䝉養正則士習端訓練勤則藝業精吳中人士文章藻麗為天下冠而敦本正始明倫敬身之道猶有未盡講明者夫本始之教莫重於孝經而養䝉育德莫切於小學合行定期開講為此仰該學教官即便聘耆儒每月十一日在明倫堂講孝經小學之日長吳二縣各社學教讀俱率生徒聽講月課之日教讀一體聽候課試其供給各衙門分日輪備毋得違錯禁賽㑹演戲告諭吳下風俗每事浮誇粉飾動多無益之費外觀富庶內鮮蓋藏偶遇災祲救死不贍本院不勝痛惜如遇迎神賽㑹搭臺演戲一節耗費尤甚釀禍更深此皆地方無賴棍徒借祈年報賽為名圗飽貧腹每至春時出頭斂財排門科派於田間空曠之地髙搭戲臺鬨動逺近男婦羣聚往觀舉國若狂廢時失業田疇菜麥蹂躪無遺甚至拳勇惡少尋釁鬭狠攘竊荒淫迷失子女每每禍端難以悉數本院竊為爾民計以此無益之費而周恤鄉黨親族刋布嘉言懿行則人頌好善積纍隂功何苦以終嵗勤劬所獲輕擲於一日曽有何益本院已屢次諄諄告誡城市之間稍稍斂跡而鄉村僻處曾未之改深為民病合行出示嚴禁禁印造馬吊紙牌告諭民生於勤荒於嬉故禮有游惰之罰律嚴賭博之禁何意乃有馬吊紙牌一事士農工商各有本業一執紙牌曠時廢業無賴棍徒引誘富家子弟一副之內動經數千一夕之間輸輒盈萬夜以繼日叫呼若狂主僕混雜上下無分奸淫竊盜乘間而起真可痛恨合行嚴飭以後槩不許印造紙牌如再不遵立拿重究禁止建碑立祠告諭蘇松兩府士民紛紛具呈妄稱本院德政請立碑建書院作生祠本院不勝駭異蘇松賦重役繁民生困苦上下掣肘諸事維艱本院夙夜拮据捫心自揣有過無功況現任官輒自立碑律有明禁至於建書院造生祠尤為末俗諂諛之習本院素所深惡吳門生祠如林豈必盡有功德甚至過者指斥其姓名厯數其劣狀未嘗以其有生祠而稱羡之也若周文襄王端毅海忠介三公忠直亷惠之名表表天壤史冊載之兒童知之今曽無半間之享本院欲為存俎豆之地而苦無工費為之中止可見生祠之不足為貴重至於書院原先儒講學明道之所人因避生祠之名槩稱講院尤屬無謂此皆好事無恥之徒借以媚官長詐鄉愚漁利行私今欲加於本院是以本院為好諛喜佞之愚人何待本院之薄也合行嚴禁士民宜各守本分自安生業毋得踵習舊套上千律例禁龍舟告諭習俗之奢儉動關閭閻之肥瘠吳民家鮮蓋藏猶自浮費相尚如午日競渡其一也合行嚴禁自後毋論近城逺鄉一切龍舟槩不許集資修葺如有惡少棍徒不遵禁約倡議思修嚴拿枷示爾民各當務本凡遇令節家庭之間洗腆用酒以享髙年以娛婦子既無大費又有真樂何苦以終嵗勤勞所得輕擲一旦荷花蕩鬧㑹亦與此同例毋得抗違取罪嚴禁私刻淫邪小說戲文告諭為政莫先於正人心正人心莫先於正學術朝廷崇儒重道文治修明表章經術罷斥邪說斯道如日中天獨江蘇坊賈惟知射利専結一種無品無學希圗苟得之徒編纂小說傳竒宣淫誨詐備極穢䙝汙人耳目繡像鏤板極巧窮工致遊佚無行與年少志趣未定之人血氣搖蕩淫邪之念日生奸僞之習滋甚風俗凌替莫能救正深可痛恨合行嚴禁仰書坊人等知悉除十三經二十一史及性理通鑑綱目等書外如宋元明以來大儒注解經學之書及理學經濟文集語録未經刋板或板籍燬失者照依原式另行翻刻不得聽信狂妄後生輕易增刪致失古人著述意㫖今當修明正學之時此等書出逺近購之者衆其行廣而且久爾等計利亦當出此若曰古書深奧難以通俗或請老成純謹之士選取古今忠孝廉節敦仁尚讓實事善惡感應凛凛可畏者編為醒世訓俗之書既可化導愚䝉亦足檢㸃身心在所不禁若仍前編刻淫詞小說戲曲壞亂人心傷敗風俗者許人據實出首將書板立行焚燬其編次者刋刻者發賣者一併重責枷號通衢仍追原工價勒限另刻古書一部完日發落嚴禁奢靡告諭衣食之原在於勤儉三吳風尚浮華不安本分胥𨽻屠沽娼優下賤無不戴貂衣繡炫麗矜竒文人喜作淫詞疾病之家聽信巫覡欺誑輒行禱禳鼓吹喧闐牲肴浪費貧民稱貸於人又有遊手好閒之徒或假神道生辰或稱祈安保嵗賽㑹慶祝雜扮故事兒女溷淆舉國狂騖為首苛斂乾沒或因酗酒聚博致生事端又有優觴伎筵酒船勝㑹排列髙果鋪設看席靡費不資爭相誇尚更或治喪舉殯戲樂參靈尤為無禮凡此種種一皆百姓火耕水耨辛苦所致恣其浪費毫不檢恤民力安得不竭國稅安得不逋自後胥𨽻娼優槩不許著花緞貂帽緞靴犯者許人扭稟變價充賞疾病祈禳若有巫覡賽㑹祈保罪坐事主尋常宴㑹不過五簋酒船伎樂髙果看席及喪殯戲樂槩行禁止如敢故犯該地方官嚴拿究懲興復社學以端蒙養告諭化民成俗莫先於興學育材合行出示將本城內外及鄉區村鎮大約二十家以上者設社學一處查本鄉子弟年八嵗以上二十嵗以下若干人除能自備束修外如果家貧無資者該府州縣量為設處廩穀本院亦捐俸相助再行儒學教官通查該學諸生中有學問純正品行端謹者開送聘以為師當此任者須要端肅謹慎為後生模楷先講明孝經小學教之歌詩習禮問安視膳進退揖讓之節循循善誘使知存心敦行之學然後進以四書五經以程朱傳注為主勿玩愒嵗月虛應故事大抵社學為教習學業専以養蒙育德其行止不端及出入衙門囑託公事不能安貧守道者雖文詞優長教官不得開報其剽竊異端邪說炫事立異蠱惑後生者即革去館穀另選教讀須該府州縣誠愛惻怛視民如子勤勤懇懇隆師重道方克有成數年之後士習益端禮讓可風庶不負朝廷興行教化及本院樂育人材之意果有實效者本院不靳特疏薦揚不然雖有他長無教育之實蹟難登薦牘臨行曉諭士民本都院撫吳二載一飲一食何莫非百姓脂膏而地方刑名錢穀簿書鞅掌晝復拮据未嘗暇逸心雖無窮力實有限今䝉聖恩優擢輔導東宫職任重大本當聞命就道因欽件部案限滿當結稍稍料理即星馳北上爾百姓念本都院愛民有心忘本都院救民無術罷市挽留數日聚集院署哀號之聲至不忍聞本都院與爾百姓一體相關豈忍因本都院之行遂使爾等士廢讀書農廢耒耜商廢貿易本都院為之寢食不安本都院於地方利弊民生疾苦知之頗真入朝之後或至尊顧問或因事敷陳或九卿㑹議當盡力鑿鑿言之況聖主眷念財賦重地必簡公忠清惠才德兼全之大臣十倍於本都院者來撫兹土爾百姓何用多慮本都院平日告誡爾百姓之言厯厯具在即朔望率爾百姓叩拜龍亭講解鄉約亦欲使爾百姓知君臣大義朝廷恩德自今以後願爾百姓孝親敬長教子訓孫忠信勤儉公平謙讓事要忍耐勿得妄興詞訟心要慈和勿得輕起鬬爭勿賭博勿淫佚勿聽邪誕師巫之說復興淫祠蚤完國課共享天和此本都院惓惓望於爾百姓者本都院身在京華此心尤當往來於此地本都院見爾百姓如此情狀既愧平日救民之道未盡又不忍遽恝然而去但君命不敢留輔導東宫之任誼不敢辭惟爾士歸書舍農歸田疇商歸市肆使本都院之心稍安無復紛紛擾亂可也湯子遺書卷九
