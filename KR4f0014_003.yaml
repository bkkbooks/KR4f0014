body:
  text: 湯子遺書卷三工部尚書湯斌撰序擬御製大清㑹典序順治壬辰七月御試朕惟一代之創興必明一代之制度蓋紀綱倫敘千載維同而規模品式纍朝各異自唐虞以來典謨大備商著風愆用警有位周垂官禮具訓百工莫不煌煌巨麗於今為昭然道取稽古政貴因時近代惟明本朝所監其設官分職原本古昔權殺於漢而董正之綱維自定員省於唐而職任之貫理甚周祿凉於宋而蠲復之恩禮愈渥宏謨曲算可謂博大精詳矣至孝宗秉睿哲之資股肱多忠良之彥於𢎞治十年詔修大明㑹典閲六年而告成其後因時損益每進加詳制度文為於焉稱備使其臣工克遵罔替何難倣佛殷周比隆虞夏哉朕於萬幾之暇時一披覽因念本朝受命九載於茲而典則不章臣鄰罔守朕甚恧焉用是特命諸曹纂輯舊章别類編文分年紀政以官聯部署為綱以事物儀文為目同異兼晰而無因革難通之患巨細均該而有本末咸宜之美法則折衷於前朝謨訓聿彰於昭代誠至治之良猷實萬年之金鑑嗚呼法難明而易昧民難安而易危寅恭協應勿持祿以養交成憲是遵罔紛更而多事使百姓聞令而心服則朝廷無為而日尊百爾君子尚其敬哉世世子孫尚其敬哉理學宗傳序天之所以賦人者無二理聖人之所以承天者無二學蓋天命流行化育萬物秀而靈者為人本性之中五常具備其見於外也見親則知孝見長則知弟見可矜之事則惻隱見可恥之事則羞惡不學不慮之良人固無異於聖人也惟聖人為能體察天理之本然而朝乾夕惕自彊不息極之盡性至命而操持不越日用飲食之間顯之事親從兄而精微遂至窮神知化之際蓋其知明處當乃吾性中自有之才能參天贊化亦吾性中自有之功用止如其本性之分量而非有加於毫末也堯舜禹之相授受曰人心惟危道心惟微惟精惟一允執厥中其為教之目曰父子有親君臣有義夫婦有别長幼有序朋友有信此聖學之淵源王道之根柢也由湯文武周公孔子以至顏曾思孟成己成物止有此道在上在下止有此學秦漢而後道喪文敝賴江都文中昌黎衍其端緒至濂溪周子崛起舂陵直接鄒魯程張邵朱以至陽明雖所至或有淺深氣象不無少異而中所自得心心相印針芥不爽蓋道之大原出於天天不變道亦不變苟得其本心之同然則千百世之上千百世之下固無異親授受於一堂者矣如高曾祖禰與嫡子嫡孫精氣貫通譜牒昭然而旁流支派雖貴盛於一時而不敢與大宗同抗蓋誠有不可紊者在也近世學者或專記誦而遺德性或重超悟而略躬行又有為儒佛合一之說者不知佛氏之言心言性似與吾儒相近而外人倫遺事物其心起於自私自利而其道不可以治天下國家吾儒之道本格致誠正以為修而合家國天下以為學自復其性謂之聖學使天下共復其性謂之王道體用一原顯微無間豈佛氏所可比而同之乎容城孫先生集理學宗傳一書自濂溪以下十一子為正宗後列漢隋唐儒考宋元儒考明儒考端緒稍異者為補遺其大意在明天人之歸嚴儒釋之辨蓋吾儒傳心之要典也八十年中躬行心得悉見於此斌謝病歸田從學先生之門受而讀之其折衷去取精義微言幸承面誨而得有聞焉天下同志讀是書者無徒作書觀也止由此以復天之所與我者耳吾之身天實生之無一體之不備吾之性天實命之無一理之不全吾性實與萬物為一體而民胞物與不能渾合無間焉吾性未盡也吾性實與堯舜同量而明物察倫不能細大克全焉吾性未盡也吾性實與天地合德而戒慎恐懼不能如乾健不息焉吾性未盡也試由濂洛關閩以上達孔顏曾孟由孔顏曾孟而證諸堯舜湯文得其所以同者返而求之人倫日用之間實實省察克治實實體驗擴充使此心渾然天理而返諸純粹至善之初焉則寂然不動感而遂通中和可以位育而大本達道在我矣不然徒取先儒因時補救之言較短量長橫分畛域妄起戈矛不幾負先生論定之苦心乎陸子曰六經注我我注六經學苟知本六經皆我注腳斌惟與天下學者共勉之而己矣孫徴君先生文集序昔文中子生隋唐之際佛老盛行毅然以孔子為宗匹夫肩絶學之統其有功於斯世甚大朱子集羣儒之大成其徒傳之金華諸子遞相授受至明初制作一代典章率本朱子之教以是知大儒抱道空山修明六經非一世之業也容城徴君孫先生登萬歷庚子鄉薦與鹿忠節為友以躬行相砥礪居親喪結廬墓側於憂戚孺慕中悟心性本原慨然以聖人為可學而至天啓乙丙間大興鈎黨之獄左魏周三君子橫被榜掠故交避匿先生獨上書樞輔鳴鼓舉幡為之鳩衆佽助生死禍福不足動其中其剛大之氣復如此時㑹搶攘保全危城避亂山中隱然負王佐之望徴書屢賁堅辭不應晚年移家蘇門聲華刋落生徒數百結廬相就其地自姚許之後稱再盛云先生於道慎擇而約守之發為文章皆躬行心得之餘未嘗有新奇可喜由其說而持循之人人可以寡過所著四書近指讀易大㫖尚書近指精義明前儒所未發嘗以古今諸儒見有偏全力有淺深要以不謬聖人為歸慈湖以傳子靜者失子靜龍溪以傳陽明者失陽明儒而雜禪不可不辨苟無致知力行之實徒慿揣摩臆度以軒輊先賢先生之所不與也九十老人晨興拜謁家祠獨坐空齊終日無惰容事物之來泛應曲當濁酒孤燈對友談學至丙夜不倦自非功深於人之所不見者烏能自彊不息如此乎當草昧初開干戈未戢人心幾如重寐賴先生履道坦坦貞不絶俗使人知正心誠意之學所以立天經定民彞不因運㑹為遷移振三百年儒者之緒而為興朝理學之大宗其於文中紫陽何如非愚之所能知其有關於世道則一而已矣蕺山劉先生文録序蕺山劉念臺先生文録十八卷斌奉使於浙先生門人黃君太沖與其孫茂林見示得受而卒業焉喟然歎曰先生之學至矣程朱以來體道之精未有過焉者也蓋嘗論之濂溪得孔孟之傳其說太極圖也曰聖人定之以仁義中正而主靜立人極此中庸戒慎不睹恐懼不聞之㫖也而論者以為易流於禪吾謂不然記曰人生而靜天之性也感於物而動性之欲也不能反躬天理滅矣人者天之心也性者天之理也天理非可以動靜言而主靜亦不可以時位論泥主靜之說而不得其義固易流於禪若昧主靜之意而徒事於標末補綴則隱微多疚人品僞而事功無本此鄉願之僞學孔孟之所深拒也程子曰天理二字吾體驗而得之又曰學者敬以直內為本朱子曰靜者性之真也涵養中體出端倪則一一皆為己物豫章延平師友相傳皆是此意其曰窮理者亦窮天所與我之理也故可以盡性而至命博學審問慎思明辨皆其功也後人失其精意遂至沉溺訓詁泛濫名物幾於支離而無本王文成致良知之教返本歸原正以救末學之流弊然或語上而遺下偏重而失中門人以虛見承襲不知所以致之之方至龍溪四無之說出益恍洋恣肆縱橫自如儒佛之籓籬盡撤其流弊有甚焉者故高忠憲顧端文以性善之說救之夫學者於極重難返之際深憂大懼不得已補偏救弊固吾道之所賴以存學者先識孔孟之真身體而力行之久之徐有見焉未嘗不殊途同歸如顏曾為大宗而由賜師商各得聖人之一體若學力不實此心無主徒從語言文字之末妄分畛域根柢未立枝葉皆僞其所為不越功利詞章之習而欲收廓清摧陷之功吾恐言愈多而道愈晦聖賢心傳不見於天下後世也先生生文成之鄉而與忠憲端文遊其學以慎獨為宗於天人理氣靜存動察辨之不厭其詳而終以靜存為要嘗曰姚江之後流於老莊東林之後漸入申韓故擇取中庸以復先儒之舊平生於寂寞凝一中發其聰明智慮通籍四十年敝帷穿榻蕭然布素其立朝也秉義據經難進易退自曹郎以至總憲前後章疏十上大約志在振肅紀綱敦崇廉節重仁義而薄刑名更欲申明祖制寺人不得典兵預政廷杖詔獄悉當報罷寧人主見為迂闊而不敢貶道以從時寧與執政相齟齬而不敢容默以阿世慎獨之學以之自修者如是以之告君者如是以之勉寮友誨門弟子者亦如是遭際鼎革拜辭家廟絶粒空山其從容堅定視生死猶日用飲食也觀其語門人曰胸中渾無一事浩然與天地同流蓋通微達性之學至是而始得所歸宿焉植天經扶人紀固吾儒中庸之道非老佛之幻視君親與鄉願僞學依回附和者所可假借吾願學者捐成心去故智法先生為學之誠而得其用心之所在由是上溯濓洛關閩以達於孔孟則姚江梁溪皆可融㑹貫通而無疑矣斌有慨於聖道之失真微言之將墜故不禁娓娓言之贑州府志序按贑之為郡處江西上游漢唐以前視若荒服至宋濂溪周子通判州事其時趙清獻為守程大中令興國識濂溪於南安命明道伊川受學焉伊洛文獻之傳實肇於此文信公亦以守郡建大義興勤王之師故豫章理學節義冠冕海內而贑郡尤著云然地大山深疆隅繡錯姦宄不測之徒時時乘間竊發疊嶂連嶺處地既高俯視各郡勢猶建瓴非得博大通方威信重臣鎮撫其地則閩楚江粵往往多事故前代特命憲臣駐節於郡王文成公授提督專征伐剗平山寇厥勳爛焉及宸濠逆命天下震動公率二三郡守統兵數千旬日之間擒俘宸濠舉豫章數千里地歸之朝廷豈非重地得人之明驗與而文成公學本周程在贑日與洛村善山南野東廓諸君子講明良知之學天下儒者以䖍南為歸可謂盛矣䖍南盛衰既關數省之安危而聖學修明又肇端於此地故其山川磅礴鬱積瀠回蜿蜒非他郡所可頡頏也豫既考閲舊志得其形勝扼塞之要間嘗登城眺望見崆峒天竺萬峰回合貢水章江雙流奔湍北顧十八灘巨石側立如犬牙森森想見清獻疏鑿之跡謁濂溪書院修其俎豆信國文成二祠亂後焚燬豫移祀書院廣集諸生執經揖讓於前念典型之尚存思徽音之如在不禁為之低徊流連也獨是山川如故風俗漸漓户口消耗賦役繁難選舉應南宮試者十二邑僅數人耳何今昔之不同如此是非任旬宣牧守者之責與後之君子撫覽兹編尚加意綏輯再見清獻之休烈而與賢士大夫講明性道尋墜緒於微茫以上追濂溪陽明之風知必有洛村善山其人出而應之者矣勸賑序順治十六年歸德䨙雨為災自夏徂秋煙雲慘淡洪流浩浩彌望數百里麥未登場黍稷弗播睢州地尤沮洳城郭傾圯蓋父老傳聞以為百年之內所未有也比冬民將扶老攜幼就食四方郡司李饒陽符公慨然軫念遍履部內開誠勸諭繼以涕泣於是各邑聞命輸助麥穀者皆以萬計公之至睢也揖知州事戴侯而言曰上天降災眚於兹土惟我官吏罔獲辭咎其曷敢弗欽既又進紳士耆老再拜而言曰詩云凡民有喪匍匐救之當兹荒歲窮民流離盡矣若珍此豆區之遺倘變生意外安能洗腆用酒而稱無事乎衆咸曰唯唯此流離民誰非我之鄉里親戚乃重煩明公憂於是蠲輸者立粥場者恐後自城市至四境村鎮煙火相望前此民之扶老攜幼奔走四方者皆相告來歸繼而河朔淮泗之民以梁苑為樂土越明年麥登乃止當斯時也豫方銜命嶺北秋八月請告歸里入境睢之父老曳笻趿履率其子弟遮道言公功德曰去年微公我聚已為墟我屬已為魚矣豫曰然抵舍則父老又曳笻趿履率其子弟造於庭曰公大有德於我邦父母兄弟惟公之賜春耕夏藝惟公之賜我民何以云報願為賦詩以紀公功詠而歌之子子孫孫俾勿忘豫乃揚言於衆曰公官以刑名職在懲貪糾猾非錢穀撫循之司也然公學有淵源故平日為政察奸惟明去暴惟勇豪民蠧吏竄伏如鼠而疾痛負寃之民若承雨露公方崇教化日進譽髦而課藝之未嘗恃桁楊之威也豫昔自潼赴贑晤公於杞公為子言刑以弼教非以為教也然書不云乎既富方穀中州自兵火以來家無蓋藏民鮮二釜設不幸有方二三千里水旱之災不知何以禦之往者天下常多故矣其先由饑饉頻仍縣令不上聞藩臬不下詢視民間欣戚漠然不關於心以鳩形鵠面之人而催科是問於是民始忍以父母妻子所仰賴之身而自棄於盜賊夫養不遂則教不興教不興雖有臯陶為士亦不可以理此豫鰓鰓然不能已於懷者噫以公言觀之可謂識治之本矣豫既感公之德又重以父老之請乃拜手頓首而為頌曰歲在己亥商羊告災梁園千里蒼茫莫開麥禾云腐蒲葦塞路耒耜高懸爭網魴鮒夜吼蛟龍庭游鳧鷺苦雨名篇愁霖綴賦惟公曰嗟惟我赤子兵火餘生何以堪此乃檄守令豫親履野時駕輕舸時乘羸馬臯陸渟泓旌旗瀟灑八邑咸臨至睢之下呼爾冠紳拜手廣厦毋吝爾有哀此孤寡紳士合言惟公之命惠我􅑏獨敢不敬聽乃輸倉箱乃助釡甑㷀㷀子遺室如懸磬聞公之命交手相慶廬幕周旋炊煙繚繞左餐右粥歌呼昏曉我公之歸雲霞縹眇淮泗河朔民欣再造何况宋州敢忘拜禱春爾條桑秋爾滌場我公之功高山蒼蒼蒸爾祖妣洽爾鄰里我公之功河水瀰瀰睢州志序睢州處把宋之間壤地不過百里而春秋諸侯㑹盟戰伐與漢唐攻守之跡往往在焉至宋為神京左輔稱雄郡明代文物聲明甲於兩河及其亂也鋒鏑日聞受禍倍烈蓋地處中原之衝世治則冠裳輻輳有故則干戈相尋勢使然也余少時好從長者訪求郡中故實壬午兵火之後繼以河決故家遺書一朝俱盡後於河北得李司空舊志手録以歸吾友吳君冉渠博學好古又購得嘉靖間上黨程公本手自校讐網羅近事捃托遺文功未告竣㑹中丞賈公有修志之檄郡守取其稿以應倉卒付剞劂金根帝虎之訛觸目皆是田賦源流未詳山川古蹟遺脫附㑹為多名宦事實寥落人物自漢魏至宋元名臣高賢表表史册者姓氏湮如入明以來理學勳業忠節文章彪炳㝢內久列一統志者皆僅於選舉表中一見姓名而已使後生末學至語及先輩行事茫然莫知所從來何由聞風而興起乎大者如此若幽貞之士孤嫠之懿沉埋於荒谷廬井者又不知其凡幾也余知非冉渠定本林居日久桑梓掌故聞見漸熟參稽前史搜獵散佚復尋訪父老而折衷之不敢自名州志分為數帙曰睢陽耆舊傳曰風俗志曰遺事考至理學則附入洛學編藏之篋衍久矣雲安程公閲志病其訛陋不以豫空疏無似委之重加參訂余惴惴以不克勝任是懼時冉渠已歸道山從其令嗣摉索遺稿更發豫敝笥而檢閲之核僞黜浮逺不遺而近不濫時當溽暑楗户終日目涉手抄汗流接踵較舊志事增十之五六仍舊定為七卷公一一裁定遂蠲金授梓余於是益歎公之大有造於睢也睢之為州城郭遼廓土田軍民繡錯賦役叢雜壤多沙鹵黃河之患頻仍民寡蓄積一遇水旱道殍相望且界連曹衛奸盜易滋經畫調劑匪易語曰前事之不忘後事之師此編粗定後來者不須旁詢掾史而因革法戒一展卷而得其大略豈特一二世之利哉吾又因之有所感矣前代吾州盛時世家耆碩縹緗充棟操觚之士比屋而居自嘉靖以來百有餘年未聞以志為任者獨賴劉教諭人物一編存其梗概於郡事則未詳也今公於戎馬倥偬征輸孔亟之時毅然為之豈不誠識治要君子哉愧余謭陋寡聞且隨繕隨梓不暇廣質同人舛誤缺漏𫝑所不免博雅君子覆加增潤以成一郡之典則兹編其前驅也夫亦實余之所厚望也夫孝經易知序孝經注釋箋注凡數百家近惟新安呂忠節公所著本義大全最稱詳備吾友登封耿逸菴先生家居講學復著易知一卷其言簡而盡明顯而精切與忠節所著互相發明誠後學入德之津梁也古昔盛時人重倫常家敦仁讓故風俗朴茂治道還淳太和之氣洋溢宇宙挽近之世教化不明本實不敦殫精竭思皆枝葉浮華雖名譽動人而本心已失象山有言親師取友為學力行皆從好事中來故虛而不實此言切中學者病根而吳中為甚經曰天地之性人為貴人之行莫大於孝朱子少年讀孝經題其上曰不如此便不成人孟子曰人之所以異於禽獸者幾希吾人奉父母之遺體當思父母生我之身無一體之不具生我之心無一理之不全何以保守成其為人不至放失淪於禽獸此不可不深長思也自學路久迷陷溺日深重以侈靡之習淫佚之說功利之謀所知所行皆人欲而非天理夜氣之良偶一醒悟真堪痛哭流涕而不能自己者奚暇雕繪浮藻馳求聲譽乎天下萬善同出一原人能孝則事君必忠事長必順交友必信居官必廉臨民必寬故事君不忠非孝也事長不順非孝也交友不信非孝也居官不廉非孝也臨民不寬非孝也進而言之暗室屋漏一念自欺非孝也應事接物一念怠斁一念刻薄非孝也事親能養矣而未能養志知從令之非孝矣而未能諭親於道養生送死盡禮矣而未能事死如生事亡如存其孝猶為未盡也故事親事天一道也盡倫盡性一理也孝之道大矣哉誠能盡孝之道則精義入神參贊化育不外是矣一人盡孝則一家化之一家盡孝則一國化之推之天下皆孝子四海皆仁人則民氣和平災害不生禍亂不作尚何憂治道不唐虞風俗不三代歟劉山蔚詩序嘗閒詩者心之聲也尚書曰詩言志孔子刪詩三百而蔽以思無邪之一言此千古論詩者之宗也騷雅而後言詩者無慮千家我所推重獨靖節少陵耳靖節真懷高寄簞瓢宴如蓋置身羲皇以上而不知有漢魏者也少陵間關氛祲曾無虛日而感時憂國忠愛纒綿即一飯一吟不忘君父故我謂思無邪一言惟二子足以當之即以之續三百篇可也近代空同大復振衰復古為風雅凖的或慷慨豪岸或俊朗風流實各肖其性情糾彈戚畹中夜悲歌抗表閶闔脫屣簮紱浩氣清風至今猶可想見於長歌短詠之間故二子者猶得靖節少陵遺意中州為空同大復之鄉蘇門浚川諸君子先後主盟詞壇吾意今日必有能似續風雅者求之同里而得簣山田子焉又因田子而得商丘劉子山蔚焉山蔚溫粹沖逺嘗隱居南村疏籬竹徑焚香吟詠聲琅然達户外獨與簣山往來唱和無間也余從簣山處見其詩舂容藴藉如朱絃疏越不作衰草寒蛩之響而天真爛漫深有得於言志之義絶非雕繪纂組佶屈纎巧者比吾信其能繼蘇門諸君子而復見空同大復之盛者也夫靖節少陵當時詞章瑰麗樹幟藝林蓋不乏人然或馳情富貴濡跡風塵康樂摩詰未免遺恨二子窮愁著書志意皭然聲名獨翺翔雲漢星日之表石門輞川舊蹟具在後人過之豈能與栗里浣花同其歆慕哉山蔚孝友敦行鄉黨無間言其性情有大過人者自此益加砥礪感遇莫移其志拂逆莫動其心蓄焉暢焉肆焉擇焉且欲己之而不得焉比興寄托自合三百篇之指歸靖節少陵何難千載輝映乎山蔚將刻集問世託簣山索余一言余不敢以固陋辭因為序之如此蔡氏族譜序昔三代之時多世臣因生賜姓胙之土而命之氏子孫世守其家數千年不忘其所自始太史公之著史記也公侯傳國名曰世家亦其遺意也魏晉以來九品中正之法行而世族益重王謝顧陸盛於江左隋唐崔盧李鄭號為右族至為天子所稱歎然其初類皆有公侯將相名聲顯赫所謂貴其姓者也其後則皆以姓貴耳自辟薦科舉之政行天子所與共天下者皆誦習孔孟之徒故旦白屋而夕朱户則其貴不在世族而在詩書然又有官躋崇要而後世不欲聞其姓字或宦途顛頓甚至終處岩嵁狎鷗鷺而操薇芝者名震霄壤則貴其姓又不在官爵而在德義矣蔡之先出於周文王蔡叔度既遷其子胡率德改行周公舉以卿士復封之蔡尚書蔡仲之命是也後世往往為將相名賢史不絶書如中郎之博藝也子尼之雅正也君仲元應之教也端明之政事文章也季通父子與介夫之學皆照耀古今矣睢陽之有蔡氏也自元季始也世多名人濟南司馬兩公父子相繼登巍科濟南清介剛果治行為海內第一司馬豐功偉績在馬端肅許襄毅之間雲中兵變談笑而定之著在國史班班可考也下此若懷寧君之執法却賄雁峰君之耽精著述館陶贑州二君之齊名文苑此豫得之傳聞者也月賔懸圃兩君之文章才藝藴藉風流則豫所親炙者也然則天下之言蔡姓者必歸重於睢陽而睢陽世家亦必以蔡氏為重豈無故歟鴈峰君始作族譜亂後失散我師茂翁先生窮摉博訪得其原稿續成之姓源世系塋域各有圖先世之有聞者為家傳女子以節著者為外傳誥敕祭葬碑銘附焉可謂彬彬然詳且備矣手録一帙命斌校正斌既素仰濟南司馬之德業而又有感於懷寧諸君之賢與中郎子尼諸君子相輝映也且我師採購之勤紀述之精皆仁人孝子之用心不可不亟表章故舉人之所以貴其姓者以告後之人焉後之子孫觀斯譜也尚思繩其祖武勿墮家聲以無負我師之志則孝矣唐成齊制義序吾嘗謂六經之文體製回别而義藴無窮千萬世文章不能外焉下此如老莊荀列申韓之書屈原宋玉之騷賦漢兩司馬董仲舒劉向揚雄唐宋韓柳歐陽蘇曽之文章方其書之未成也天下固不知有如此之文也及其既成而出之雖純駁不一皆為天地間不可磨滅之文何則其學有本而發之性情者真也人必有真性情而後有真學術有真學術而後有真文章若徒剽竊模擬雖窮極工巧終為陳腐歸於澌盡泯滅而已譬之草木種種花實各不相肖皆含造化之生氣剪綵為之何足貴也自有制義以來守溪荆川典型具備當時之人固不意其後之有鹿門震川也鹿門震川變而之古浩氣逸情籠絡一代不意後之又有正希大士也數君子者皆負孤特無所附麗之志而又深以數年之學故其文能自樹立不謂前之人已極後之人遂無以加也近日士子不務為有本之學專一剽竊摹擬入書肆購決科之文數百篇閉門而誦之又擇其庸腐纎靡者以為式左割右扯幸而獲第取其所揣摩之技鏤板布傳後生又從而效之所謂太倉之粟陳陳相因朽敗而不可食而天下幾無真性情矣豫方􅍀然憂之而成齊唐子以平日所作制義見示讀之見其磊落宏肆脫去畦徑於古人之法無所不備而欲摘其某字某句為蹈襲某書某篇者不能也其能繼正希大士而逺紹王唐歸胡無疑也成齊操履端潔於人不妄交見事之乖於義者必正色爭之司李撫州持法明允決大獄伸理沉寃不畏彊禦卒以直道獲戾貧不能治裝士民爭為居停及歸杜門窮經課里中子弟選定古今文手録成笥布衣蔬食茅屋數椽不能蔽風雨泊如也是其性情有大過人者故為文能自運機軸不屑屑隨人步趨而自與古人法度黍毫不爽誠有其本也吾又因之有所感矣富貴爵祿賢者得之固多而不賢者得之亦復不少若天之所不甚愛惜未嘗擇人而與之也獨於文章不輕畀人故往往有享高爵厚祿聲勢赫奕足以震動一世而求一言之幾於道者無有也成齊之文如此而不能博一第甫仕即蹶輪囷抑塞殆終其身而撫之人歌而思之鄉黨後進無少長皆知有唐先生也彼貴幸一時茫然無所自恃者視成齊為何如余序成齊之文而必原本六經及歷代子史大家者誠見文必有本而後可傳更望成齊勉之不僅以制義傳也則庶乎不負天之所畀也已黃庭表集序戊申遇黃庭表先生於錫山以所著忍庵集數卷見示當是時吳中文章家方以聲華浮艷相高而先生獨原本經術以古人為繩尺心竊重之後十年同應召至京師有明史之役遇休沐輒相過從遂得盡讀其近稿益歎先生之學大而有本非時賢所可頡頏也竊謂學者為文必內本於道德而外足以經世始不徒為空言可以法今而傳後否則詞采絢爛如春花柔脆隨風飄揚轉眼蕭索何足貴也西漢儒者湛深經術不為百家所惑莫如董江都通達治體議論深切於事情莫如賈長沙而好為淫靡綺麗之辭不根據理道莫如司馬長卿此固人所易辨非甚深逺難知者乃韓退之號稱知道而叙述古今文章之盛自孟荀屈莊以至相如揚雄之倫詳矣而賈董曾不一及焉何歟宋儒以退之為文人之雄未可言知道其殆以此歟夫相如之賦義在諷諌有為而作君子猶有取焉若近世自命作者輕俳浮薄摉集稗官野乘繁淫怪誕之辭妃青儷白補綴成篇其意可數十字畢者率衍為千百言而不休徒以示我之高才博聞為譁世取寵之具將古人立言之體蕩然無復存矣安能望相如之眉睫哉今觀先生集中圖書象數之奧性命理氣之微闡發幾無遺藴禮樂兵刑漕渠水利盛衰沿革名物度數無不究極原委期鑿鑿可見諸施行其斯為體用兼全之學也乎其為文也醇雅而不冶簡質而不繁謹嚴而不夸吾不敢知其於先儒何如要之為董賈不為相如有斷然者先生操履端靜雖出入禁林官稱侍從而所居委巷版門竟日無剝啄聲凝塵蔽榻寂寞著書刻苦要眇如窮愁專一之士蓋其志量逺矣其人如是其文亦如是是豈可僞為哉西澗集序豫往在長安晤王去非於慈仁僧舍得劉子道力刻詩一卷余與劉子生同里交遊頗久而未知其能詩竊歎天下恢奇不羈之人雖久與處猶未易盡識如劉子者往往然也及豫自嶺北歸里日偃卧茅齊交游鮮通問者獨劉子時時過從欹竹數竿松隂滿徑談詩竟夕歌聲蕭然振林木劉子巨族家故饒少遭喪亂不事家人生産遂貧落篤好吟詠庭户牖榻題墨幾滿家人或誚讓之曰此何物曽不足以供饔飧劉子怡然不為少變也家既貧達官貴人鮮稱譽之而劉子負嶔崎歷落之骨亦恥與達官貴人遊時扶杖孤往徜徉自放焉或談及仕宦紛華田廬貨財昂首雲霞弗屑也噫今天下身世通顯者莫不自托於歌吟聲詠沾沾以為能而胸懷齷齪往往以半畝數椽爭競不息宜乎劉子之以白眼當之矣今劉子聞東南多佳山水波濤洶湧峰巒峭峻將扁舟於采石九華之間而肆志焉乃集近詩命余敘之余以江上往來多隱君子必有知劉子之詩者故不具論論其為人大略云楊彭山春望詞序京口形勝甲東南金焦北固其名特著故畫舫籃輿日萃其下而未有知所謂楊彭山者是山也雖無奇峰危巘深澗絶壑之觀然登其上而三山雲樹環翠如屏長江洶湧風帆隱見與潤州城堞樓櫓烟火十餘萬家無不近在几席俯仰指顧亦登臨之勝槩也特其名不見於山經輿志故騷人之遊屐不至即或至焉而文字不足以發之世亦莫得而傳焉則山川之幸不幸豈不以人哉戊申三月董子文友來自毗陵與何子雍南程子千一偶登此山乘春騁望各賦詩十章曰楊彭山春望詞二子皆以詩文擅名當世其詞雖記一時見聞所及而江山形勝如指諸掌吾聞京口盛時名家巨族競選山水靚冶之區治園亭臺榭極四時遊覽之娛自海艘告警山川如故風景頓殊三子懷古眷今感慨係之宜其詞之婉麗而悽愴也夫天下幽巖邃壑徒為樵夫漁子所棲遊者多矣此山南望則米元章之遺墓在焉其西則昭明太子讀書處也風流文章倣佛想見其人何從來遊者篇什零落乎此詩流傳於世吾見尋奇探幽者詫為奇聞異蹟必將載酒登高窮極眺望墨版淋漓侈為遊覽盛事四方聞而不得至者與金焦北固同入夢想也故我謂仙宮佛窟士女繽紛不可言遊遊楊彭山者自三子始書此所以慶此山之遇也雪亭夢語序雪亭者蓮陸魏君侍徴君先生於夏峰自名其所居之室也夢語者記其所聞於師與夫讀書有得之言以自考也蓮陸受業先生之門三十年中頻遭喪亂患難與共及先生遷夏峰蓮陸自山右辭官而歸率間歲一至每至必留數月後構屋以居為先生訂正年譜白雪盈山孤燈午夜上下古今視千秋如旦暮故及門問答之語蓮陸為多庚申秋余卧病燕邸君自上谷䇿蹇來晤見余繩牀破被數椽不蔽風雨慨然曰此猶見雪亭風味因出夢語讀之余病為之頓減京師繁嚻余寓齊居闤闠間車馬之聲不絶而門內數日無一足音蒼苔滿徑槐落凝階獨君時披户入掃敗葉煮苦茗君或攜酒至則相對陶然共酌而夢語首章敘豫章延平結茅水竹象山白沙陽明念菴山居靜坐故事又敘一峰留客荆川青衣布履卧處惟一板門以為諸君甘貧樂道守孔顔家法余因自念壯歲歸田忽忽二十年雖從遊夏峰亦嘗設榻雪亭與聞緒論而因循玩愒無所成就今年逾五十奉召史局汗青無期惟杜門絶應酬稍存山中面目視君蕭然世外不及逺矣故讀夢語輒廢卷而歎歎已復讀不自休有以也今衰病侵尋行將乞休與蓮陸相約以餘年證明師門宗㫖無忘雪亭夜坐時青松白石實聞斯言西山唱和詩序宋子牧仲遊西山歸示余詩一卷而屬為序余謂山水文章恆相因也謝康樂赤石麻源諸詩岡嶺溪澗松竹猿鳥讀者歷歷如見元次山道州諸詩栁子厚栁州永州諸記亦然獨怪終南去京兆為近唐世號多詩人遊南山詩倣佛康樂元栁者殊不多見也豈士大夫身處京華日僕僕緇塵遂不暇窮山水之勝與抑或縈情圭組不能心跡雙清雖遊而詩亦不工歟牧仲官西曹稱繁劇更盡心職業嘗爭疑獄數大案似不暇遊又清羸善病而乃於休沐之頃呼朋攜子極登臨之樂其詩與康樂元栁不必盡同要之蕭閒淡逺無長安貴遊繁嚻氣習披覽一過煙雲杳靄繚繞几席間信牧仲於山水文章有深情也余入京師且數年埋頭史局忽忽無意緒每薄暮下直信馬垂鞭望西山暝色輒凝目久之而不果一往今序牧仲詩余滋愧矣王似齊詩序詩以言志而雜出於貞淫正變上世采之以觀風尼山刪之以垂教誠謂本於性情而足以風化天下耳後之作者非不研思搆彩窮姿極情或尚高華或開奇奧要於風化亦有補否王子似齊辛酉科余所取士也承其尊人慎齊家學出其緒餘發為詩歌擬古懷親送弟憶昔諸篇溫柔敦厚最近風騷以為詩也是名理也以為理也是象趣也求之也近而即之也逺豈徒研思搆彩窮姿極情而已哉近時取青嫓白與夫險仄僻拗者尤不可同日語矣努力自愛振起頺風不無厚望世其可僅以文人目之乎送魏蓮陸歸保定序昔孔門諸賢惟顔子最為好學孔子稱之曰一簞食一瓢飲不改其樂而不言所樂何事及觀喟然一歎然後知顔子之樂真有不能自已者區區貧富得喪不足以易也孔子生平心得弟子不能傳而孔子傳之自十五志學至七十從心所欲不踰矩固夫子自述之年譜也下學上達知我其天與夫發憤忘食樂以忘憂不知老之將至亦即夫子自傳之像贊也孔子與顏子相知最深所稱終日言而不違者也而魯論所載與顔子言者寥寥豈其微言妙義門弟子不能盡識而顔子獨能默悟神㑹歟因歎聖人之文義藴宏深而喟然一歎一聖一賢之精神至今猶在天壤也吾師夏峰先生平生大節偉然其氣力足以砥柱兩間而細行必矜小物克謹所謂豪傑而聖賢者也其自述日譜凡日用動作與應事接物纎細必書雖患難流離人事繁沓未嘗一日稍廢晚年造詣益精默契神化超然獨得非先生不能自知也蓮陸魏子從遊日久庚戌冬自上谷來蘇門先生以日譜授之使刪定焉雪夜挑燈中宵不倦爐火既燼丹鉛未休余以胃病未得共事明年春將北歸貽書屬余校正余何敢辭獨念蓮陸才大而養之以靜學博而守之以約嘗刺晉之大州搜訪隱遺折節下士去官之日匹馬雙僮而已世俗升沉得失無足介其胸中者後日為師門顔子必蓮陸也譜中所載八十年來躬行心得歷歷可考蓮陸定有得於精神意氣之表未可以言辭形容者矣昔朱子與呂成公輯近思録於寒泉精舍至今過者必徘徊想像其處我觀後之遊蘇門者亦必將訪問魏子刪述之所低回流連而不能去矣於其行書以送之送宋牧仲分司贑關序戊午宋子牧仲以秋官尚書郎視𣙜贑關於其行也同朝士大夫贈之以詩至盈卷軸余於宋子姻友也適應召來都下不可以無言贑州居江廣之交地號僻逺往時𣙜政以通判領之歲時報成數而已後用言官議改部員以重其任軍興以來嶺海多故戈鋋縱橫於蠻洞瘴溪之間估客冒險往還其難十倍於承平時今國儲告匱餉需孔殷而商旅之難如此牧仲兹往其所以裕國課而恤商困者可不加之意乎然此固牧仲之所優為者也天下事莫患於因時苟且而無真誠之意動輒曰時不可為也事多掣肘也牧仲之在刑曹一副郎耳每慮囚必細審其得罪之由察其情僞稽之律例有求其生而不得則死者與我俱無憾之意有不合者動色力爭即豐鎬舊臣亦諒其真誠改容而敬禮之雖不能盡如已意其所全活者亦多矣今其視𣙜也由司寇推舉天子臨軒而遣之授以專敕其體為京朝官與督撫藩鎮不相轄也非若部郎之多旁掣其肘者也吾嘗謂司𣙜政者禁胥役之需索信放關之期㑹則商不病杜豪強之夾帶絶權貴之請託則課不絀而其要在律已嚴而綜核慎此皆牧仲之所優為者也而余之所望於牧仲不盡於此焉人身之所重者元氣也國家之所重者人才也古人宦轍所至必以咨訪人才為首務其所為人才者非詞華藻麗馳聲藝苑之謂也必經術足以明道才略足以匡時有精苦之志有沉深之謀此其人必不欲以浮華顯往往在深山窮谷可以遁世無悶或浮湛人間落落穆穆非得其同志則不能相求也西江自宋以來名臣大儒不可勝數今豈遂無其人乎余昔參藩嶺北屬有軍旅之役事定而疾作請休歸里寧都有魏冰叔兄弟與彭躬菴邱邦士方讀書易堂余知之未暇入山一訪亦以諸子深藏交修不求聞於世余爾時雖粗知其姓氏未能悉也今得讀其所著書想見其為人屈指當日已二十年矣河山阻修光隂荏苒惟有浩歎而已天生人才無間古今往者已矣來者未可量牧仲更從冰叔益求知所未知焉勿如我之過時而悔也還朝以此為使歸之獻則牧仲之所以報國者深矣送汪檢討奉使琉球序國家威德誕敷臣服萬邦大荒之外日月之所出沒罔不梯山航海貢琛獻貝象胥之傳譯為勞鴻臚之贊引不給琉球為東南島裔奉職尤謹自定鼎以來朝㑹之使數至康熙二十一年中山王世子遣陪臣來請襲封天子嘉其守禮惟謹下廷臣㑹推可使者以名聞僉曰檢討汪某學行足稱儀度俊偉以充正使必能光照下國天子曰可賜麒麟服璽書金册臨軒遣之汪君既受命上書陳使事皆所以昭聖德重國體優詔悉付所司余方與汪君載筆史局晨夕共事今一旦乘傳出都宣布天子威德於海外萬里之邦公卿大夫相率餞焉余何能無一言以贈竊以聖人論士必曰使於四方不辱君命春秋大夫如叔向子産之徒皆以辭令增重鄰國夫友邦聘問當時猶難之至天王使於侯國必大書特書誠重之也而二百四十二年無貶詞者蓋鮮焉按史稱琉球植棘為籓以盈虛為晦朔以草木為冬夏隋唐以後屢興師討之賔服無聞至明初不煩軍旅輒遣子弟讀書太學策名朝廷彬彬為守禮之國豈非文德來逺之效哉今國家湛恩汪濊不寶逺物而汪公學古通今識體得宜尤長於辭令廷臣此舉為得人矣夫叔向子産皆以博物著聞世固未有學無本原而能專對不辱君命者也以汪君之學兹行也必能使其國君敬信而悅服上以增天朝之重而益堅其服事之心且使環海後至諸國不煩樓船橫海之師而聞風景附稽首來享後世傳之為奉使者所取法焉君之功亦偉矣哉余株守史局汗青無日因念司馬子長周遊天下歸而作史記然猶未至海外也君涉海萬里而至於其國波濤浩渺極天下奇詭瑰瑋之觀非僅僅空同江淮㑹稽禹穴者比歸而筆挾風雲上下千古當有過於子長者余與同人執筆以俟之惠母陳太君七十壽序余與長洲汪鈍翁先生同直史館因得見其所與遊者而惠元龍稱最賢云元龍博學高才為文章有矩度交遊多名公卿顧獨時時過余邸舍論文常至日昃不倦將南歸持鈍翁所為母陳太君壽文示余再拜言曰吾母年七十遊子入京華欲有得而歸以為母榮也乃今葛衣敝屨持殘書數卷登堂問起居外愧無以為母歡吾母高節淑行與吾師同里閈知之為悉敢邀惠得君一言以慰吾母庶幾為遊子進一觴焉是君之賜也余既雅重元龍又嘉其意殷懇展卷讀之既畢而告之曰太君之德盛矣然元龍欲慰太君也交遊中名公卿操文章之柄者衆矣迂拙窮老不合於時莫余若也何足為元龍重且自聖賢之學不明而功利之習日熾父兄之望子弟者不越富貴利達使子弟登高科躋膴仕輿馬赫奕賔從雜遝遂快然自鳴得志不暇問所從來蓋世俗之陋久矣婦人當尤甚如此則元龍以不遇歸即攜名公卿文章數十軸日誦太君之前有拂然不樂耳况迂拙無用於世如余者乎乃今觀太君則有異事姑孝謹滫瀡必親又有樛木逮下之德斯已賢矣前明之季勸太翁律和公曰時事可知公能師伯鸞高義妾請椎結布衣以從遂偕隱龍山東渚躬自操作不謂尤難乎夫婦人盛年則以貴顯望其夫晚年則以貴顯望其子人情也太君志行如此若不知人世有富貴利達者豈以其子登高第輿馬赫奕夸耀閭里為榮乎元龍其可以無愧然吾謂從來母子之賢亦交相成也有陶母截髮而後侃功業聿著於晉代有歐母畫荻而後修文學冠於宋室此有母以成其子也然必有侃之功被八州而後陶母之截髮始顯有修之德重三朝而後歐母之畫荻始聞是又有子以成其母也太君之所以教元龍者余未及聞然即其勸勉太翁者觀之諒必有在富貴利達之外者既已無慚於二母矣元龍其益勉之元龍博學高才譽望隆於時貴顯行有日矣他日立朝著當思有所建樹無愧陶歐則所以壽太君者仍在元龍而不在祝頌之紛紛也請以此言告之太君或亦開顏而進一觴乎徴君孫先生九十壽序康熙癸丑徴君孫先生壽登九十嘉平月之十四日為懸弧之辰睢陽門下士暨平日私淑先生之教者若而人將渡河稱觴於兼山堂下斌再拜頓首而言曰人生百歲為期先生年踰耆耋步履輕翔神完而氣固著書未嘗以寒暑輟弟子執經請益者趾錯於户應答終日無倦容竊念自古九十好學弗衰者衛武公而後不過數人耳先生之壽殆天之有意斯文與夫壽者假百年以為萬古者也道體流行萬古不息非人則道無所寄非聖人則道無以行非天假之以年則聖賢凝道之功或未能深詣其極而造化之流行於萬古者不能盡屬之於我故此身者百年之物逮功力積深充實光輝上繼往聖下開來學則百年而萬古矣孔子以天縱之聖自十五志學猶必至七十而始能從心所欲不踰矩也道無止境則學亦無止境使更假以年必有日進不已者特後之學者亘千百年不能證取從心不踰矩之真境况能知其進此者乎使孔子年未及七十而止則後人必以知命耳順為學問止境矣使顔子而有夫子之年則所謂未達一間者其終於未達歟夫壽之可重也如此哉先生蚤年濳心濓洛之學以孝親敬長為根基以存誠去僞戒懼慎獨為持要出門定交與蒼嶼廓園蓼洲諸君子議論往復以砥柱中流自任浩然之氣百折不回㑹璫焰熾張諸君子並罹鈎黨平日交游身都通顯者皆閉户掃軌噤不敢出一言而先生獨不避虎獶力為營救當其時岌岌濵於難矣而卒恬然無恙也今氣運剝極而復興朝定鼎崇儒右文先生讀易百泉韜光斂耀靜悟淵思德益卲而學益邃徴書歲下纁帛屢賁巖阿至朝虛祭酒之席以待而先生鳳隱愈高公卿藩臬擁篲到門執弟子禮先生與臣言忠與子言孝鮭菜苦茗常至更䦨燈炧猶娓娓弗倦或千里書札問難為之條分縷析無不人人各得其所求有初接者才品高下即衡量不爽與之言論輒中隱微若久與處洞悉其生平者即秦越人之視病不是過也回視數年前學問必有日進月長可自證自勘而非他人所能識測者矣今天下理學蒸蒸而起詖行淫辭之習漸以消磨謂非先生倡率鼓舞而然歟蓋昔年處運祚之終而今日當風㑹之始處其終者與羣賢聲應氣和不能奏廓清維挽之功當其始者碩果獨存靈光巍然千百年正學之傳手闢蠶叢而立登康莊固知天之厚豫大年者真非無意也衛武公耄年進德淇澳抑戒之詩風雅傳焉先生結廬衡門與淇澳百里而近請以金錫圭璧之章為先生一侑觴焉是為序募建六忠祠序睢城西門內舊有六忠祠祀唐中丞張公太守許公以南雷姚賈四公為配廟貌赫奕春秋官屬奉祭惟謹壬午黃河決城祠沒於水後土人竊其地改建尼菴六公棲神無地過者悽愴於今二十有餘年矣唐自祿山犯闕明皇西狩令狐潮尹子奇輩鴟張梁宋間名城巨郡望風納欵者恐後張許二公獨率二千殘羸之卒慿孤城遏三十萬之彊敵以保障江淮其精忠大節至今八百餘載天下學士大夫以及牧豎耕夫皆能道之吾州在唐為睢陽屬邑張公初守雍丘移軍寧陵許公以睢陽太守迎入則我州亦張公所往來提戈揮兵處而廟祀不立蒸嘗無所甚非所以妥侑忠魂曲奬人心之義也况邇來琳宮梵宇所在金碧莊嚴而六忠祠無議及者左道日盛大義不明有心世教者不禁為之長太息也今文學黃君於舊祠之西施地一區謀建饗堂三楹重門兩廡期復舊觀但力薄費繁尚賴羣公共成盛事人倫天道明訓昭垂凡具秉彞應有同志務俾規模閎敞俎豆一新薦紳襟裾登堂拜謁見日星之常存凜英魂之如在四方君子軒車過之亦知吾州人士識所重輕不至崇異端而忘大義也賀王叔平進士序余少時聞先大夫言柘城雪園王先生今之大人君子也心竊嚮慕之及通籍後先生為御史按兩浙余見於睢陽郵署先生握手與語娓娓不倦所以訓勉之者備至出所著傳習録定志諸論及詩文數十帙見示余受而讀之不敢忘前年遇先生子叔平於商丘氣度渾金璞玉不自矜飾居然有道之容其所為文高潔簡練得大家之遺余竊歎賢者之後必大於先生益信矣已酉叔平舉於鄉明年成進士里中親知將修羔酒之儀而問言於余余不佞年來於世故酬贈之文謝絶久矣顧以為少時知敬愛先生親聆謦咳二十餘年矣今幸見叔平捷南宮何可無一言以賀夫諸君以為一第足重叔平乎自有制科以來登高第者何限也然有布褐終身而風采照耀今古或身躋巍科而碌碌無所表見二者其為人輕重何如也從來言道德者必推濓洛關閩五先生中濓溪伊川未登進士明代理學推薛王陳胡四先生而白沙敬齊亦未登進士可見甲第者特士子致主行道之階而非所恃以不朽者也何足以為叔平重吾之所以重叔平者亦曰能法雪園先生而已矣先生之令交河也畿輔近地值貂璫縱橫之日他人皆束手不敢施為先生獨毅然不畏彊禦核地畝清郵傳弭盜省刑治行最著及入掌柏臺正色端笏議論侃侃按轡所至奸弊杜絶尤孜孜以延攬後進講明性學為務自浙東歸舟中惟圖書萬卷而已叔平學行得於過庭者久於書無所不讀而能守之以謙於海內名士無所不交而必歸之於正自兹以後必能舉先生之所蓄而未發者措之天下矣是可賀也吾聞先生之學以王文成公為宗文成良知得於真修真悟當其折權黨於方熾定大變於呼吸無非良知之妙用羽書旁午講書不輟是豈勉彊者能之乎彼山農汝元之徒剽竊影響張皇自恣卒來世人之譏夫文成平生行事皆可對之天地後之人果能倣佛萬一焉否也叔平承先生之志進而取法文成必能躬行心得一洗世儒之陋今見用於時天豈有意斯文乎是又可賀也余受先生指誨稍知端緒今之所以期望叔平者亦所以仰答先生之意也若侈揚家世門閥之盛徒為諛詞而已則吾豈敢送徐電發序徐君電發以徴辟官禁苑文章詩賦在香山涪翁之間常請假里居門庭蕭然還署未匝月遽謫官去同朝士大夫多太息賦詩以贈其行余方病杜門謝客不能出郊一送又怔忡不能為詩無以為電發贈乃強起邀至小亭酌酒而告之曰人生豈必以一官為重哉古之賢者宦跡落寞而聲名表表於後世者衆矣如君之才固不以官之崇卑論也吳中山水清妍多隱君子君往從之相與究性命之微探濓洛之㫖必將斂華就實超然自得道德之歸有日矣豈止以文辭擅長乎余違夙好潦倒中外精力頽然而勢不能遽去即幸而得請而舊學荒落無所進益百年碌碌良可歎也人生絀於此必伸於彼君不得志於時矣必有聞於後君其勉之電發曰諾爰書以志别湯子遺書卷三
