body:
  text: 湯子遺書卷八工部尚書湯斌撰雜文粵西平露布館課臣聞版泉振旅於皇家輝煌玉簡苗野奮戈於帝世照耀金封蓋文德丕播不因秉旄誓鉞而尊崇而聖武布昭正兼執玉舞干而益大滄海全歸禹貢淪紋豈增萬里之波祝融久戴堯封寸地亦遵昊天之命非臣猷之克壯咸與維新實聖德之如天無逺弗屆恭惟皇帝陛下宣昭義問敉寧武功垂裳秉圭而天下嚮風動顔變色而海內鎮定黃旄右指劍閣雲新玉仗南臨衡湘波靜白環西獻流沙積石之鄉楛矢東來洧盤日出之郡卿雲爛漫山林無紫芝之歌日月光華太史著河清之賦獨此粵西星分宿未地近日南白象陵山孔禽蔽野西京之王會不通周禮之職方罔載今河山奠矣謂宜梯山航海而來王豈日月出矣猶然鑽燧鑿榆而自照蒼梧慘淡鮫人泣明月之珠平樂蕭條估客棄桃枝之簟臣等恭承璽命逺播天威組練發而星斗明旌旗張而雲日曉樓船輕度細栁營開大將某指揮明月禆將某劍戟秋霜皆右仁左義珮忠戴信乃布德宣令而纁組來迎韜戈束􅓚而壺漿恐後桂林象郡悉成鼚鼓軒舞之民瘴雨炎風盡為祝華呼嵩之地日無私照南邦永以無虞海不揚波北户宴而不閉幽荒絶壤始知天子之為尊六慰三宣共識聖人之在位蓋王師無戰龍城勒銅柱之勳大武維揚薄海靖兵戈之氣此皆受成廟計憑藉天聲不然何以熊斾未開犀甲未振而鵝山之險盡作籓籬煙瘴之墟永無狐兔也君之德也果如叔向之言臣何力哉豈曰郤縠之讓臣等無任慶忭激切屏營之至謹露布以聞繵地議睢州地畝州衛錯雜欵項繁多奉文行繵查對數載地畝有逾額缺額之不同弓尺有長短大小之不一不能盡符原額致稽轉報從來州縣地畝各有則例睢州畝數不可比例商鹿睢陽衛弓尺亦不可比例歸德衛也州地四百八十步為一畝本自清楚無容置議獨睢陽衛比例歸德衛弓尺不能無議焉歸德衛弓尺較民弓大三寸八分派銀三分六絲零睢陽衛除徭役與民弓相同外如屯地則派銀三分五釐零新增屯地則派銀四分四釐零較之歸德衛糧數迥殊弓尺何得無異當年按弓定糧睢陽衛三項弓尺每畝較民弓多地二分五釐此從來定規也今若比歸德衛弓尺則每頃當減去九畝三分另行起科衛地糧已極重何堪減畝若依本衛弓尺則各項之有餘不能補衛地之不足夫地猶是昔日之地昔何以照本衛弓尺而足額今何以照本衛弓尺而不足非歸併衛所之時州縣之移送未明即丈量田地之日繵外之遺漏尚多版籍之定例未敢遽更賦役之徴輸理當慎重若今日茍簡了局後日之歸咎誰任雖上臺之催提已久而執事涖任方新合無申請寬限設法查補地在鄰封則詢之舊衛旗丁繵餘遺漏則責之四鄰舉首務期地無欺隱糧無重纍然後按繵定糧勒石垂後國課民生咸有賴矣至於目前急務惟在後里有衛蠧張化鵬所報之無地懸糧六十餘頃國課則年年缺額徴比則無地無人里書之敲撲徒煩官長之考成受纍似當速就各項逾額地內仍照本衛弓尺撥補明白目下無懸糧之纍而後可徐議總數之足額此又今日最要之著統候採擇焉題一樂堂卷昔孟子論三樂於父母俱存兄弟無故而即曰仰不愧俯不怍蓋父子兄弟之間必德行純備俯仰無慚而後其樂始真然欲不愧不怍亦不必他求也還當自父子兄弟始孔子曰天地之性人為貴人之行莫大於孝又曰孝弟之道通於神明光於四海世固有勳業冠天壤而門內多慚德者矣雖名列竹帛能俯仰不愧怍否乎題趙憲清卷戊午余寓京師吾師孫徴君先生之子君僑數相過從間告余曰先子之講學夏峯也灤州憲清趙公方官許昌遣其子介兹渡河從逰先子與之語輒能默識不忘其穎悟出人數等及先子棄養公移守磁磁為南北孔道使車絡繹不絶羽書旁午軍出關隴荆湖者往來殆無虛日官斯地者疲於供億日昃不遑食簿書期會之繁不與焉公乃單騎三百餘里為先子任執紼之役時會葬者近千人咸嘖嘖歎服其賢先子所著尚書近指公為校正付梓先子手澤不至泯滅者公之力也幼弟不幸罹難槖饘周旋不憚煩瑣言未既淚涔涔下既而曰余兄弟感公厚誼慮無以報為制一卷將求海內有文章行誼者為之題詠以表公德且以見余兄弟之不敢忘也請君一言辨其首其無辭余從先生逰最久先生著讀易大旨精義多前儒所未發余曽請於先生任剞劂之役先生以此書當終吾身未敢遽問世也及先生歿後適值軍興追呼日迫力不能獨任欲求同志者共為之遲回未能就也聞公之義其能無愧乎君僑又曰公之為政寬大精明吏不能舞文署中襆被蕭然寒窗竹几篝燈課子弟誦讀書聲琅然達户外與文士談經講藝握手勸勉尤加意煢獨不以擊斷為威蓋古之循吏不過也余謂當今世而知尊師重道表章大儒遺文急友之難其賢於人逺矣則其為循吏也固宜爰次其語書於卷首徴君先生詩卷跋庚申冬蓮陸魏君訪余於京師邸舍持一卷則徴君先生手書贈詩二章蓋甲辰北上至容城時作也先生身任絶學憂患之來衆人震懾未遑者獨能坦坦如無事時此足驗先生道力而蓮陸以門人周旋患難紫峰擬之蔡季通冀元亨良不誣也先生以明末寇變內外臣工殉難者指不勝屈慮事久湮沒著書表章此大義所關何可磨滅雖風波旋定而先生猶自悔艾無幾微不平之氣且以得歸子舍展先墓為幸而字法蒼秀堅老如嵗寒松柏盤紆竹墨間真可寶也敬附數語而歸之省齋詞跋省齋先生文章風雅為詞林領袖乘興遨遊湖山六橋煙樹雙峯白雲杖屨幾遍時同年不期而聚者六七人攜酒登髙賦詩倡和甚相得也追憶昔時長安並轡忽忽三十年事少壯者今鬢髮種種矣酒酣為小詞數闋壯涼髙逸與稼軒放翁馳騁上下濟武先生將南遊太末余以使事告竣亦且北歸歎我輩相聚之難而後會之未可期也不能不撫卷流連云孫徴君先生像贊當代儒者誰稱先覺允惟哲人光輝孔倬敦行孝弟修明禮樂由忠貫恕既博歸約日新又新鳶魚飛躍默契先天聲臭寂寞蘊涵元氣發越磅礴譬彼星漢終古昭灼易傳者像難盡者學仰止夏峰泰山喬嶽王山史像贊蒼然如深谷之松矯然如晴天之鶴絶慮寡營素懷寂寞凝塵滿席濁酒孤酌寄志羲皇吟詠間託著述嵗久光氣磅礴相彼畫史含毫綽約七絃靜張古音淡泊手拂緗帙陶然自樂開卷視之想見其胸懷之淵穆與立行之介確蓋具經綸天下之才而退藏不見其崖略也毛會侯戴笠垂竿圗像贊溪水洋洋似君之清也碧石嶙嶙似君之貞也默然垂釣宴坐若忘遊魚過之而不驚也君非山澤之癯而廊廟之英也胡為乎芰荷之與處而鷗鷺之與盟也意者家近富春思羊裘老子之髙節逸情而余之少也亦嘗扁舟過之而受瀧水之澄泓也倘君他年得垂竿於兹余亦將戴笠相從於煙雲杳靄之間而世人莫得而名也同門公建徴君孫先生夏峯祠堂啓昔仲尼歿而微言絶孟子出而楊墨之道熄其後濓洛關閩繼洙泗之統金溪姚江闡心學之宗聖道賴以彰明彛倫賴以不墜故得從祀兩廡俎豆千秋至於所生之地所居之鄉與夫講學遊厯之處後人必為之建祠設位嵗時習禮有司亦遂載之郡乘列之祀典四方君子讀其書登其堂慨然想見其為人低徊留之不忍去以此見天理常存而人心之不容泯沒也我徴君先師生於容城遷於蘇門著書明道立教淑人抉性命之祕定理學之準上自公卿大臣以及儒生隱士近自畿輔河洛以及齊魯晉楚吳越之間有志斯道者無不負笈從遊見其語默動靜天理流行發微闡奧透人心髓皆踴躍興起知聖賢之可為吾性之具足其功真可逺紹濓洛近比姚江非同山林獨善無關世道之士也獨是移家夏峰近三十年與偶爾遊處者不同松楸在望祠堂未建後學無所瞻仰實為闕典今同門公議卜地庀材定期鳩工用是遍啓羣公共襄盛事指日楹桷森鮮階序有嚴與邵子洛陽朱子武彛之祠並耀千古於以報禮先儒章示來學所關匪細肩任師傳固當努力此舉乃尊師之大端凡在門牆應有同心四書淺説小引四書為聖賢傳心經世之典備六經之旨奧自漢儒以來傳注純駁不一至朱子注出集羣儒之大成國家遂用以取士永樂間奉敕纂輯大全採收宏備審擇未精虛齋次崖諸先生繼之而考亭之注益明然為書浩繁初學未能得其要領吾友成齋唐君憂之手著一編名曰訓兒淺説言簡而意盡文顯而旨深篇章段落聨貫如珠童子可以成誦即宿學由博返約亦有賴焉其有功於學者大矣成齋方病目猶手自繕寫其為功甚勤恨余力薄不能付剞劂以廣其傳也郎君稚年聰穎非常必能世其家學謹書篇首以勉之華嶽禱雨文惟神體函金德位列兑方功配兩儀澤潤萬類惟兹關輔實處神宫牆之下雨㿩寒燠咸賴神休乃自去嵗三冬無雪入春恆暘轉亢雲興斯飇塵霾晝曀麥苗洊稿百姓無所歸命夫休咎徴事祥異從人良由斌等奉職無狀或政乖刑濫而獄有寃民或吏墨兵驕而里盈怨氣或單丁獨户窮苦重其租徭或鰥夫孤兒死亡莫之振救以故感動天威召致災眚然神目孔明官之不職宜明賜誅殛奈何舍其有罪而殃我羣黎今斌躬率寮屬早夜步禱數月於兹矣呼神莫應籲天則髙下民何知遂妄疑神聽不聰而欲求媚於淫昏之鬼夫山魅澤怪神之所宜屏斥而淫昏之祀明主之所宜禁也若三日不雨民奔走於淫昏之鬼斌不能止也倘氣極而通偶與雨會則民將歸靈於鬼魅將淫祠日盛左道日興雖告以名山大川澤被生民其孰信之惟神念官吏士民悔過之誠敷奏上帝屏風伯招雨師雲奔電趨貽我來牟使農夫饁婦知嶽瀆明神果能闔闢隂陽吐納風雨將益堅其畏信之心而淫昏之鬼自不能惑我民志是神之眷祐斯民不但錫以有年之慶兼賴以正德之福仰戴神休永永無既祭孫徴君先生文嗚呼道之在天下也如元氣之在人身彌綸磅礴上蟠而下際者小不離乎日用而大即麗乎彛倫斯誠須臾不可離矣而胡真見而體備者之難其人卓哉先生維德之純博極造約窮理識真以孝弟為盡性之基由忠恕為達化之門當蚤年辨志定交江村析義理於秋毫等富貴於浮雲固已抗志聖賢之途溯洄洙泗之津及璫焰肆虐禍逮清流不避虎獶力為營救雖運數難回而天地正氣有所榰柱而長存推其本志固已視死生如旦暮而恬然無恙者以是知天之未喪夫斯文德盛道尊徴書嵗頻衡門之間安車蒲輪而先生堅臥不起天下想望髙風如泰山喬嶽之嶙峋才本王佐而不用學為帝師而無民天欲存斯人之命脈故留碩果以至今晚年結廬百泉嘯臺行窩雲物一新兼山堂上彈琴鼓瑟曽無間乎晨昏四方學士負笈摳衣公卿牧守擁篲乞言而先生悉開𨗳啓誨之殷殷家庭肅雍孝慈睦姻薰蒸涵育而聞風興起者莫不油然而相親即頑梗之夫澆薄之俗皆一變而敦厚醇龎又孰非先生之過化而存神道隆益謙業廣彌勤朝乾夕惕自強日新通達物我而不滯酬酢萬變而不紛融朱陸之同異與濓洛而為鄰隱顯無間體用渾淪想像其所至庶幾乎乾坤同其消息造化合其屈伸凍解氷釋而湛然不動者如天空月皎無纎微之埃塵此固與道為體矣何尋常功業文章之足云某從遊十載提撕維勤日出而談至於夜分青燈白雲誨言諄諄方恃為斗杓之可依豈期天不憖遺而兩楹之兆遽聞嗚呼年屆期頥名垂後祀生順殁寧亦可無憾於蒼旻矣而獨是微言既絶聖道荆榛異端日起雜學紛紜功利詞章之説惑於前而虛無寂滅之教誘於後更誰為挽世風於既靡疏長河於將堙音容依依而如在旨緒茫茫而莫尋傷儀型之永隔悲卒業之無因尚冀先生翼我冥冥之中俾勿隳迷途勉䇿駑駘之力而上臻祭同年施愚山文嗚呼當世之有先生也吾道之標準也而今竟溘然長逝耶哲人云亡後學其何宗乎先生之鄉為盱江敷教之地而大父中明公倡教東南與漪園南臯為師友先生賦資中正漸濡庭訓孝友純懿仁慈篤摯見利思避慕義若競常以博愛𢎞濟為心會友輔仁為樂誾誾諤諤不亢不隨推挽名流吹噓後進是皆出自真誠非由矯偽至矜恤困苦如拯溺救焚夙夜遑遑猶恐不及世之學者髙談性命樹立壇坫求其惻怛為懷渾忘物我如先生者幾人乎又宣城文章風雅代有傳人梅都官尤兩宋詞人之冠先生為文不尚鉛華醇深瀟灑而精力所注於詩尤深都官詩歌見稱廬陵以今準昔不啻過之世之文人學無原本妃青儷白補綴為工遂足取譽一時自矜博雅求其典型不墜追配前哲如先生者幾人乎晚嵗出入承明秉筆史局老成宿素典故熟聞考據精詳褒彈不茍倘藉以告成即不敢遽言班馬亦庶幾希蹤歐宋而汗青無期哲人凋謝此又不能不為之痛惜也某與先生定交三十餘年良友砥礪之情知已存亡之感言之不能盡而獨舉其大者以見先生所關於世非偶然也嗚呼先生其以豫言為然乎否耶湯子遺書卷八
