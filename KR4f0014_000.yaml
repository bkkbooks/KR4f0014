body:
  text: 湯子遺書别集類六國朝提要臣等謹案湯子遺書十卷國朝湯斌撰斌有洛學編已著録斌在國初與陸隴其俱號醇儒隴其之學篤守程朱其攻擊陸王不遺餘力斌之學源出容城孫竒逢其根柢在姚江而能持新安金溪之平大旨主於刻勵實行以講求實用無王學杳冥放蕩之弊故二人異趣而同歸今集中所載語録可以見其所得力又斌雖平生講學而康熙己未召試實以詞科入翰林故集中詩賦雜文亦皆彬彬典雅無村孰鄙俚之氣至其奏議諸篇規畫周密條析詳明尤昭昭在人耳目者矣蓋其著述之富雖不及陸隴其而有體有用則斌尤通達治體云乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀湯子遺書丁卯冬先生薨於位友人田簣山評其遺藳刻於中州彭少司成又刻節要於吳門門人蔡彬與其宗人九霞謀刻全集惜未梓完癸未燦搜輯遺文益所未備編為十卷顏曰湯子遺書從九霞之舊也先生往矣後之學者思先生而不得見讀先生遺書如見先生焉雖其畢生之道德功業垂諸不朽者不獨以文傳然而讀其文益以見先生之不可及也云爾門人王廷燦謹識卷一周易尚書四子書皆古聖賢語録也其言廣大精深總以闡明道要降而為諸子百家近於雜漢唐箋疏涉於誣去聖賢之旨逺矣皇極西銘近思録諸書庶幾近之我夫子所以語人者一以存誠主敬為宗以修身實踐為究竟此真近得濓洛之微旨逺契鄒魯之道妙者也集語録卷二嘉謀嘉猷入告爾后大臣之體則然然求其為民請命而纒綿剴切紙上如聞太息聲者匡稚圭陸宣公張曲江數人至今獨傳夫子撫江南裁二載而請蠲請賑疏凡數十上恫瘝百姓言人所不敢言真所謂傷居爾體痛在臣心忠愛之誠溢於楮背今試取其文展讀再四必不以余言為阿所好也集奏疏卷三序之體不一有序其書者如孔子之序書子夏之序詩是也有序其人與事者如漢史之世家列傳是也要以理有旁搜詞無溢美務使我之精思奧義櫽括乎其書與人與事之中而實洋溢乎其書與人與事之外於夫子之諸序見之矣集序文卷四事何以記甚重乎其事也重其事奈何黌宮明倫也書院興學也立祠功德之在人心難歿也會館有記重桑梓也記寺記堂記山房或嘉其勞或重其人也砥世礪俗彰往勸來固煌煌乎巨典哉有其事無其文不傳夫子之文誠足以傳之矣集碑記卷五楊惲之與會宗固多怨悱之詞昌黎之上宰相未免干進之意若夫不卑不亢辭旨和平惟發明性命之微與戒懼慎獨之要者尺牘中固不多得也夫子集中如與孫徴君田簣山諸公書綢繆往復直抉性理諸書之要其中或簡或詳各因其人所云與呂公言不得不少與溫公言不得不多也集書牘卷六賦頌之體麗以則如陳周鼎商彝論辨之體精而核如指草蛇灰線此其大凡也析言之賦不難於典贍而難於流逸頌不難於張皇而難於微婉論則確陳其是不使我有未窮之蘊辨則直指其非不開人以可議之端求其披郤導窽而又遊刃有餘者微夫子吾誰與歸集賦頌論辨卷七蔡中郎曠世逸才也其志傳碑銘之文無慮數十篇而自敘則云不愧我文者惟郭有道由此言觀之則伯喈之苟作亦多矣我夫子生平不妄交一人不輕發一語豈其人既歿顧反為諛墓之文乎我信其文因以信其文所傳之人也集傳及墓志並行述事狀卷八文之不能無雜著也如歲之有閏餘也大衍之有歸奇也五嶽之有分支四瀆之有歧渚也皆天地自然之數而不可缺者况經世之文原非常額所拘乎欲分類則體孤欲他附則義别因另為一卷集雜文卷九嘗讀漢詔有云雕文刻鏤傷農事者也錦繡纂組害女紅者也是飢寒之本也又云人不患其不智患其為詐不患其不勇患其為暴不患其不富患其無厭當時詔令所及至有扶杖往觀歎息泣下者夫子下車伊始即有禁奢侈嚴賭博斥淫祠諸教條刋布逺近訓誡諄諄務期與斯民更始真浸淫乎漢詔而出之者仁人之言其利溥矣集告諭卷十古詩以六朝為宗康樂參軍非不妍擅詞場也而必以淵明為稱首律體自遵三唐髙岑溫李各臻妙境矣然必於少陵推絶調焉詩固佳抑其人忠貞節烈有必不可沒者甚矣詩固以人重也今讀夫子賜遊溫泉講筵紀事諸詩體氣神似少陵詩餘倣古樂府而真至朴實則儼然柴桑之遺也詩不朽有不朽乎其詩者在集詩詞附録集既成因附年譜行實並墓志祭文於末蓋以志夫子行事之實亦以存同人景行之私云爾
