body:
  text: 湯子遺書巻五工部尚書湯斌撰書上孫徵君先生書竊嘗三復古本大學此謂知本此謂知之至也在本亂而末治節下葢修身為本之本即物有本末之本格物之物即物有本末之物致知之知即知所先後之知即知止有定之知格致誠正所以修身所以眀德明德為本新民為末修身為本家國天下為末一也此即示人以格物致知之功也下接所謂誠其意者一段中間反覆明德新民止至善而終之以此謂知本可見聖學入手惟在誠意而致知格物則誠意之功也原不得分為二事所謂格物者格明德新民之物也明德新民雖竝舉其實總是明德明德即是仁仁者以天地萬物為一體一民未新即我德有未明處故曰明明德於天下者明德新民必止於至善則格物為聖學徹始徹終工夫可知矣又舉聽訟一事蓋新民之一端而大畏民志即明明德也故曰此謂知本古本原自明白直截非有錯文亦無勞補義後章如好而知惡惡而知美若保赤子心誠求之雖不中不逺所惡於上毋以使下云云皆格物致知之最明白易見者也故一部大學皆格物特未處處明言格物二字耳千古聖賢心心相印毫髮不爽大學之格物即中庸之明善孟子之集義理一而詞異不然若數聖賢各有心得漫不相合所謂傳心者何事哉唐虞授受十六字辨晰危㣲精以察之一以守之格物也非禮勿視聽言動與夫非禮之禮非義之義大人不為格物也親親而仁民仁民而愛物各有差等不同兼愛格物也即至演易繋辭窮神盡變禮儀威儀三千三百無非格物也故曰道外無物物外無道朱子以古本有錯簡為之改正補傳心良苦矣然明德新民止至善各為一傳本末格致誠意各為一傳文義似為明晰而下手頭緒反不如古本之直截歸一此陽明古本之復誠不容已而非有意多事起後人之爭端也格物之説陽明以朱子窮至事物之理為偏屬知程子曰窮理亦多端或讀書講明理義或論古今人物而别其是非或應事接物而處其當皆窮理也又曰致知之要當知至善之所在如父止於慈子止於孝之類朱子曰或考之事為之著或察之念慮之㣲或求之文字之中或索之文字之際此與孔曰博約孟曰詳説同義固非徒求之外物而不騐之身心以親還父子以義還君臣以序還兄弟以别還夫婦以信還朋友可謂真切簡當矣然亦未有不稽之往哲考之經傳遂能處之咸宜者也其或泛覽博觀弊精耗神本性汨沒於汗簡竹冊之中此則不善學者之過陽明大聲疾呼拯其陷溺泝流窮源不得不歸咎朱子然究其為説正以救其流弊而非操戈後人不察或詆朱子為支離或病陽明為虛寂皆未覩大學之全者也陽明以良知倡天下功信偉矣但言無善無惡心之體而龍谿遂併意知物皆為無善無惡則覺有刺然不安者孟子因性善二字費無數精神正學始賴之以明此正示人以大本大原令其在在時時兢兢業業為天下後世慮者誠逺也陽明無善無惡心之體有善有惡意之動此言本自精確而龍谿之言則恍惚茫蕩與禪學何異恐後學為其所誤君子未免歸咎陽明也愚陋之見不知有當否乞直示之在内黄寄上孫徵君先生書斌庸陋無似得侍起居仰見先生動靜語黙無非道妙一堂之上太和元氣朱公掞見程子如坐春風中景象不是過也更䝉提誨諄諄示之以體用之大全朂之以責任之難諉自此以後夙夜砥礪斷不敢時刻稍懈以負真切指授之意别後三日至内黄晤仲誠張進士名沐任道之勇求道之切今日罕見其匹得此良友殊為欣慰與君僑同訂理學宗傳挑燈商確常至夜分窺管之見不敢不竭但學識疎淺錯謬恐多為惴惴不安耳又上徵君先生書春仲在夏峰承先生飲食教誨感何可言近覺從前悠忽度日未有精進功夫遇事拂亂不能做得主定痛自警醒總是集義工夫有疎應事接物以至暗室屋漏一念之動不合於義則此心不能快足而氣餒矣學者上生千古下生千古總要復得本體與天命流通若稍有夾雜稍有隔礙稍有虧欠便不充滿安能上下古今貫通一氣古聖賢千載而下光輝發越如日月經天正是真精神不可磨滅然真精神正是戒慎不睹恐懼不聞所生此道見得真自無歇手處孔子至七十從心所欲不踰矩亦未嘗住手若説有住處便非乾健不息之體學者讓第一等人不做做第二等便是自暴自棄然俗根習氣漸染日久時俗乖正抵當最難一事有失終身莫救一念不謹遂成墮落爾室有愧夢寐難安孟子牛山諸篇真令人如冷水澆背也三上孫徵君先生書去歲侍几杖甚䝉䇿勵别來倐復一載未能專使脩候瞻仰函座不勝依依某賦質庸劣年來因敝州苛政駭人視聽人心洶洶不能自安既挽囘無術而又不能漠然此心遂為所動思以魯齋之賢當時河内有苛政惟有避地一法既力不能為徒累心無益又思孔氏畏匡尚不動心何况今日總由見理不明故主心不定杜門靜坐體察天理久之覺一切外事可驚可駭皆屬平常如疾風隂霾不過一時即至變出不測亦自有道理處置此心遂覺洒然拂逆之來漸漸不至擾亂至若游行自在獨往獨來斷斷不能每見先生事務繁沓天真湛然因物付物之妙心甚企慕不知何以臻此也承諭洛學編某近苦經書訓註太繁論説不一雖反覆翻閲終無心得欲斟酌先儒之説平心理㑹聖人立言之意不穿鑿不附㑹定為一編五經中易與春秋為難故先治其難者此非數年工夫不能草草脱稿今奉先生命欲暫輟經書從事洛學但敝州書籍甚少恐有遺漏且義例體裁未奉明示如有稿本乞發下參酌庶可蚤竣事也與田簣山書某昔與曹厚菴魏環極諸先生遊稍稍聞其緒論謝病歸田實欲與同志共證斯道吾州英俊頗衆惜究心聖學者亦未多見夾輔無人遂因循偷惰幾至淪落時一猛省為之惕然蓋師友講習為益最多孔子曰學之不講是吾憂也此道與師友講明一番則此心光明一番蓋講學為已非為人也古人尊師取友豈徒為聲氣哉近世聖學不明談及學問便共非笑不以為立異即以為好名不知立異好名誠學者之弊而本體不明工夫無序雖剽竊前言往行終是不著不察終不免為義襲而取今世功利訓詁詞章之習陷溺人心天之所與我者幾不可問訓詁詞章固是害道而功利之害為甚今人起一念舉一事㣲細追求未有不從功利起見者若不細細講明未免認賊作子足下篤學力行某遊歴中外求友四方中心嚮往惜所居稍逺不能時時請益恐志氣昬惰無人警䇿行年四十已非少壯可比實望足下脱去形迹不時鞭䇿來州則設榻茅舍面賜指誨勿存一毫情面即不能常㑹手札相商亦不得將就許可孔子曰朋友信之面是退非非信也一毫不信非友也君臣父子兄弟夫婦非朋友講明不能各盡其道故朋友之倫所以經緯夫四倫猶五行中之土五常中之信故願與足下存此一大倫勿如世俗但有朋友之名而已也答田梁紫書每有㑹晤常草草錯過未獲實實考究身心與世之往來徒了人事者無大差别逺如朱陸近如龍溪念菴析疑辨惑絶無一毫蓋藏我輩當體此意與劉心周書昨過莘野連牀對語永夜忘倦足下體道切深氣象光風霽月而論道真切懇至不作一體面浮游語弟骨力脆薄正苦夾輔無人日就昬惰乃於同里同年中得同志良友可以時常切磋何幸如之江村先生曰不敢以實未了然之心含糊歸依不敢以實未凑泊之身將就冒認八字著腳真實理㑹做工夫晦翁於象山之外不再許人良有由也答褚懷萬書此道無古今無聖凡人人可以自盡然須先識本體識得本體工夫已在其中矣不然終是習不著行不察終是義襲而取孔子曰學之不講是吾憂也今人以講學為立異好名不知師友講論一畨則此心光明一畨乃為已非為人也古人尊師取友豈徒為聲氣哉胡敬齋先生踐履篤實與月川可相上下至於發明道體有功聖學似難與考亭姚江並故孫先生列之明儒考中與康齋白沙同為一編位置或亦不錯上郡守宋公書繵冊一事仰荷嘉意釐剔真利澤無窮睢士民銜恩不朽者也報竣之後聞復駁囘即向趙尉處取鈞票公閲仁言利溥不禁加額相慶吾睢何幸得執事直究利弊之源為吾儕子若孫計永久也獨至徭役大軍不折一語則不能不竊有請者睢陽衛地共有四項曰大軍曰新増曰餘屯曰徭役弓口惟徭役以二百四十步為一畝其起科獨少大軍新増餘屯三項總以三百步為一畝約計小地十畝折行糧地八畝猶之州地之二畝折一畝商丘等縣之或四畝折一畝或三畝折一畝之不同雖創始莫能詳求而奉行業已久逺此前代二百餘年之遵循亦我皇清定鼎來所率由而未改者迨庚子辛丑間蠧書詭影過多錢糧難敷遂有以大軍三項强作小畝派糧者是名為擠地年來追比不前逃亡相繼上以悞官下以病民幸執事犀照破奸杜絶永弊真萬民更生之㑹也而衛書輩久蠧其中視為利藪擠地既久而詭影愈便故明謀密議必不肯盡行清楚今乗鈞票一言遂公然號於衆曰大軍與徭役一同不折已奉本府明文矣竟將肆行徴派士民嘵嘵莫知所由某等深知執事軫念窮黎之慈衷與釐奸剔弊之盛心必不令蠧書假借使版籍紊亂士民無所控愬故敢合扎奉啓以仰副見委諄切之意乞發鈞示令各項地畝概從舊例不得那移紛更庶里役無以借口矣總之衛地自經丈量之後花户與地數皆可按籍而求除徭役一項外凡軍新餘屯查繵冊内小地十畝者赤厯内註地八畝小地一頃者赤歴内註地八十畝則從前之擠地自去而當年之舊例自復在蠧書之言必曰依小畝則足額依舊例則不足額不知地猶昔日之地本朝賦役全書額地額糧悉依故明之舊昔何以大畝而足額今何以必擠地而後足額此非詭影之地多即繵外餘地之未報前屢奉明示令花户自首四鄰舉報不啻墨盡頴秃矣今竟有花户報冊在官而里書遺失無存者夫欺隐而不報者責在花户已報而遺失者責在里書里書所司何事托言遺失果否出自無心總之不欲地畝清楚耳某等以為詭影之地繵外未報之地未有里書不知者總責里書勒限清報期於大畝足額而止既無虧於國課復有利於民生澤及千家恩流弈世州士民惟有焚香頂禮效九如三多之祝而已上糧道張爾成書漕米舊例官收官解去年䝉執事軫念㷀黎准解原徵漕銀發灘役代買官吏省盤費之累士民免接濟之害造福地方功徳無量格外之恩何敢再望然今嵗時勢更有不同某誼切桑梓不能不再為禱籲也去嵗止州判丁憂解任今嵗吏目亦緣事斥逐衙官之署空然無人萬不能官買矣外此里下代買既干功令惟有差役買米一法耳凡兹胥役有何才識見利忘身比比皆然若領銀到灘任意花費正額漕銀必至不敷欲另行賠補官吏無㸃金之術即追比原役而花費者不能復還敲扑終屬無益若加派接濟則旱蝗告災窮黎難堪再剥况目下協濟桃源派栁六萬隆冬守候河干顛連萬狀真仁人君子所惻然憫念者接濟之説固執事之所嚴禁即時勢亦所萬萬不能者也伏乞准照去歲例將額銀解上發灘役代買庶胥役不得借端分費里甲不至重累即某伏處鄉閭亦同農夫野老歌頌弗諼矣與管河郡判馮公書桃源協栁一事䝉執事嘉惠窮黎就近設厰省轉運之勞九屬受恩無量睢州派栁六萬遵奉嚴檄俱已星速上納但稍數繁多限期迫促採辦運送晝夜拮据亦不能給某等誼切急公反覆籌畫有一通融之術實官民兩便之道敢冒昧瀆陳希賜採擇焉睢州舊有栁稍約四萬有奇久貯河干年來疏濬得宜宣房無恙今協工告急似宜載運前去那緩就急既以慰河臺西望之意復以見執事救助之功新派栁稍接續上納報完協工之數既足仍補完河上舊稍以備萬一之用在執事不過畧為通融而民問稍緩須臾遂可免典妻鬻子之苦不然限期逼迫勢難周轉鞭笞雖施亦鮮成效執事天地父母之心諒必惻然動念也如曰枝稍各年派定不便那移竊思枝稍與他項錢糧不同堆貯河濵日久亦漸糜爛存之數年竟歸烏有誰非百姓脂膏何忍聽為棄物若一通融不但有益東工且本地收以新易陳之效執事福德鴻厚自是平成永賴即或培固堤堰為預防之計而舊數依然新陳較勝况士民孰無本心感恩圖報方銜結不遑踴躍歡呼上納更自敏速某等窺管之見不敢不竭伏惟慨諾幸甚幸甚答耿亦夔書昨辱賜顧言下直截了當無葛藤囘互之病真任道之器也復承手教慮把持不定及事物留滯累心具見工夫近裏著力非從事口耳者比愚以為學者當先明心體心體既明日用間只用提醒法使心常在莫令昬去自無閒思雜慮不用把捉若把捉反添一念越見雜亂矣朱子曰人只一心識得此心使無走作雖不加防閑此心常在又曰心只是一個心非是以一個心治一個心所謂存所謂收只是喚醒又曰學者常用提醒此心使如日之升則羣邪自息他本自光明廣大只著些子力去提醒照管他便了不要苦著力著力則反不是合三説觀之大要可覩矣答耿亦夔書承教檢得慎思一語時為照對具見工夫之密此道惟在人所不見處用功離了事親從兄處事接物何處討本性著落離了戒懼内省何處討復性工夫打併此心歸之一路久久自有宇泰天空景象不然欲治私而萬起萬滅之私愈不可治何由見寧貼時乎文章千古事得失寸心知况心性之學乎又答耿亦夔書前屢承手教知用力真切循環讀之不勝佩服吾輩處世無無事之時亦無皆如已意之事事物拂亂正學問得力處定靜安慮總由知止知止工夫在格物致知此知之本體是天所賦我的能致知的本領亦是天所賦的但人不肯用力耳能致知則意可誠心可正廓然而大公物來而順應矣此事未可騰口説亦難速效答施愚山書足下道德文學為海内所宗齊魯西江壇坫相望遊屐所至摳衣受業者甚衆倡明吾道非足下其誰望乎弟材質駑下不能日承鞭䇿此中徒懷鬱鬱耳孫徵君先生天不憗遺已於乙卯之夏捐館舍以時方多難即歸窆矣逺承慰存并貺雙金即托友人寄之蘇門子完深荷髙誼感頌不容口子完樸實長者熱心為人多受人負誠如台教可謂相知之深聞耕巖先生即世此弟仰止數十年者不得一遂問字之願先生晩年遁迹空山造詣益深必有遺書可紹先哲足下自當為之表彰若有付梓者求示一二施兄虹玉工夫篤實有真精神鼓動後學未易及也聞之不勝嚮往吾道衰頽總由躬行實踐者少利欲之根難斷巧偽之術易工苟非識察本體擴而充之終日終身緜緜密密曽無滲漏何由對天質人不愧不怍一切聰明意見門面格套皆是的然日亡悞人一生惟年兄從直賜教千里如同堂也答姚岳生書名爾申舍弟西旋承寄手教敘性道大原歸於太極累累千餘言詳且盡矣又惠社藝九篇皆醇正雅當反覆讀之知河洛之間復有如月川雲浦者出焉吾道之幸不勝喜躍獨其文詞過恭若欲問道於盲者則何敢當此道無古今無人我象山謂東西海有聖人出焉此心此理同也千百世上下有聖人出焉此心此理同也學者必求得於心證其所謂千聖同源者勿牽滯於文義訓詁之末則善矣來書引朱子言人須是於大原本上看得透仁義禮智毎日開眼便見四字則世間道理若決江河沛然莫之能禦此言最為真確仁義禮智開眼便見則應事接物無非天理流行此不是尋常摘句得來亦不是空空思索可至必須日用倫常隨處體認天理久久純熟自有得力處識得本體好做工夫做得工夫纔算本體先儒立論各有所重心之精㣲口不能言况筆之於書乎惟好學深思心知其意始為善領畧近代一二名儒辨晰極其精詳不為無功而分别過甚反滋後學之惑本體未明工夫無據即闡盡道理終屬門外漢周子所謂太極豈徒索之天地隂陽乎亦證取人之所以為人耳答姚岳生書來教慮外物牽泥私念起滅疑本真未透涵養未熟具見進脩之功愚意二者實兼有之外物亦不能却私意亦未易滅此中主腦惟在必有事焉一句若丢卻必有事工夫萬起萬滅之私何由可止昔王心齋先生一念愛親出於真誠久久純熟忽心量洞明悟性無礙遂覺天地萬物為一體自此行住語黙皆在覺體中足下今髙堂眉壽兄弟怡怡此人生最難得事於事親從兄之際時時要見真性發露推之應事接物處處著痛癢久之自見全體渾然物我無間時不可徒向古人窠臼作一場好話説過也初入道怕抵當流俗不過一切世情紛華念頭纔起便當斷却與李襄水書足下正學强骨清操長才天下無其倫比涖任以來一塵不染興利革弊造福百姓聞之殊為欣慰近聞均役一事本欲拯民困苦而守郡者輒為中傷之端賴洪都諸君子諒其苦心公道猶存然時至今日作善良非容易天下君子原少上官豈能盡賢且人情難測我輩愛民之心常切而事上之才常拙任事之意常盛而弭謗之術常疎萬口歡騰之時忌者即從中而起往往然也故今之吏黜弊去其太甚舉事必存小心循規蹈矩無露鋒鋩異日當國家大任不茹不吐正在此時磨鍊出來勿謂異已者非我輩藥石也答廣文魏聞野書聖政日新比隆堯舜待選之人鱗集闕下猶念及告病官員令保舉起用皇上愛惜人才之至意古今罕覯臣子何心其忍恝然地方官仰承德意保舉人才自是盛舉被舉者不敢冒昧承當具呈辭遜亦是各盡其道難進易退古之人皆然何足怪也皇上本意憐才而地方官不能相信遂至夤縁干求是此典徒開天下奔競之門以此起用欲受職之後清白無欺豈可得乎州守程公愛賢重士卓有古風某所深感恐天下如程公者不可多得耳軍政一案本府駁語隠隠為此既不能相信而欲苟且求一轉詳自處無乃太苟簡乎古之人未嘗不欲仕也又惡不由其道承諭程公難於具結某以為仍保舉則難於具結若以為既有此事免其保舉竟行回銷似無甚難又承諭托人向郡守一言此正某所以堅辭之意也出處大節三十年所學何事十四年林下只如旦暮過此再十四年即成六十老翁矣人生如白駒過隙安能枉道博一區區方面哉總之臣子誼當報國地方官相信而故辭之不可也功令甚嚴地方官不相信而必强之亦不可也某之自處如是惟足下教之答張仲誠書來書云存心必實見所謂心而存亦不虛養性必真知所謂性而養自不眩諸語可稱透宗佩服無量某竊妄意五經四書字字從原本發揮今人惟不真識所謂性故以聖道為平實者多滯於形迹而不知聖道不離日用飲食而非粗淺也以聖道為髙逺者或涉於虛空而不知聖人窮神知化而非虛空也躭虛空者固茫無把柄矣以日用飲食為道而不明原本則行不著習不察何由上達天德乎程子之學在主敬此自已得力處原有存養工夫在内故其言曰存養是主人省察是奴僕非若世人把持裝綴之謂也陽明致良知苐是就平日得力握要處舉以示人即誠正功夫亦在内亦非世人重知遺行之説也凡真儒立言雖若偏主工夫俱包體用惟大學中庸首章説得分明完全人真信得道不可須臾離何時可不戒懼何所容其襲取秦中近已大定閩海又已廓清楚蜀蕩平應在指日此畨劫運既過廟堂當有一畨久安長治規模非大賢不能任此且難進易退固士君子之節而仕止久速又有非可用人意見者以先生今日所處似西行在所難已兵火之後撫綏殘黎登之衽席亦我輩快事不知先生以為何如答李襄水書聞足下遂動拂衣之興果爾使生民不得被大儒之澤似不可也然賢者出處闗係世道天相國家恐有欲退不得者以義論之身在危疆委曲擔荷方圓並施經權互用總以保固地方拯救殘黎為念古之君子當此境界儘有苦心不可告之人者及事過險出人皆服其深心大力足以𢎞濟時艱物望愈重鉅任將歸此一道也若事有難為奉身而退以威武不屈為髙此亦一道也二者總内度之心而已矣進退所闗要徹底打算合乎天理無一毫私心則進退皆道也出處二字非人所得與故某不敢為執一之論再答姚岳生書耿先生力任斯道河洛正傳為之大振不禁神往足下朝夕請益當有心得此道不在多言惟時時刻刻將先聖先賢言語反覆尋繹一一體㑹上身來久久得一貫通處是真主腦先聖先賢無閒言語句句是要義只被千百年來皮膚訓詁埋沒令聖賢垂世立教字字從誠意中發出來的都晦昧不得顯現亦散漫不得歸一所以學者靠不得書冊却離不得書冊離不得師友亦靠不得師友惟得之難此理斯真為吾有故聖人循循善誘也觀夫子告曽子與告子貢一貫者可識其㫖矣答耿逸菴書前歲得讀為學六則平正精實次序分明已勒之座右矣去春復承教道本中庸作不得一些聰明執不得一些意見逞不得一些精采三語最為精當某謂人生一落軀殻便有氣質自有知識以來各就氣質偏重處積染成疾未易脱離必須消磨不使乗機濳發本性得以用事方可言學然習氣根株已深力量最大發不及覺覺不及持夾雜隱伏消磨實非容易方自以為剛毅也而中藏客氣自以為密察也而實多粘纒與人似恭敬也而陪奉世情之意常多論事似持平也而依阿不斷之意時有利心即不動矣而名心未必全消邀福之念不生矣而殀壽未能不貳凡此皆非真金經不得烈火一煅誠使日用動静盡是天命流行則本性自有明覺而非作聰明也本性自有正見而非執意見也本性自有光輝而非逞精采也先生有過人志行過人力量某所夙夜仰止者不能時時就正為歉然耳答耿逸菴書某前札請教中多率易之言所云日用動靜盡是天命流行工夫純熟後當是如此明得盡渣滓都渾化談何容易我輩只是懲忿窒欲遷善改過是切實用功處時時見有善可遷有過可改便是學問進益處此心不可令昬散亦不可躁迫如養鷹如馴雉只要耐心久之上臂歸庭自有日也承教未去窮理便説涵養却涵養個甚的具見體認之精某思窮理工夫亦未易盡必待窮理盡後方用涵養何時是涵養時窮理非空空窮理程子謂或讀書講明義理或論古今人物别其是非或應事接物而處其當皆窮理也又曰只整齊嚴肅則心便一一則自無匪僻之干此意但涵養久之則天理自然明又曰若不能存養只是説話又曰敬以直内是涵養事如此則涵養二字亦不得分在窮理前後今人把涵養二字看得空了故易流於虛寂窮理是零碎積累的工夫涵養是主宰本原的工夫固自無容等待無容分析也程子云涵養須用敬進學則在致知朱子亦曰主敬以立其本窮理以進其知二者不可偏廢使本立而知益明知精而本益固二者亦互相發明固未嘗截然分先後也答顧寧人書前歲山史自闗中見訪詢及交遊名賢即曰吳郡顧先生品髙學博國家典制郡邑掌故天文歴象河漕兵農之屬無不洞悉原委坐而言起而可見諸行事真當今第一有用儒者也後晤甫草元禮往往言與山史同某私心嚮往冀或旦暮遇之屏居丘園過從稀簡又足跡久不及四方度無從奉教左右一旦承先生手翰逺及若以某為可與言者感愧何如吾道之衰久矣得大力闡明豈非斯人之幸承諭近日言學者溺於空虛無當最中今日流弊竊謂孔門七十子稱顔子最為好學孔子所與終日言而不違者今論語所載不過問仁問為邦而已言仁以視聽言動合禮為目為邦以虞夏商周制度為凖喟然一歎亦以博文約禮為夫子之善誘則聖賢之學非空虛無當也明矣至曰一貫曰無言總見聖賢全體大用内外合一動靜無非道妙亦非虛空之説所可假借陽明良知實從萬死一生得此把柄當時確有實用今人不求所以致之之方而虛作一畨光景玩弄故流弊無窮某妄謂今日無真紫陽亦未必有真陽明也大刻精確有禆世道敬服敬服惜不能得日知錄盡讀之何時面聆台教聞所未聞乎與田簣山書山蔚見示徐先生制義今又獲讀論學諸牘與足下所敘行畧徐先生一生學力具見於此誠後學所當盡心也弟庸腐無似濫竽史局執筆為之始知才力不逮馬班無論矣陳永祚李延壽何可及哉近見人侈口備責前人皆坐不解事耳張先生抱影河濵三十年聲光俱寂其躬行心得之妙豈外人所能及知但史目斷限尚未議定即夏峰先生亦在商確正可相例也忠節門人物甚多不敢遺漏無問於在内在外台意具悉無煩過慮也衰病侵尋入春過甚史事全無頭緒而告歸者已多近於自求便安故有所不敢若史事粗就即可乞身不能俟其成也知行並進敬義夾持千聖心傳不外此八字必須百情刋落方能證取此非實歴過者不能知聖賢妙諦不可作言語文字觀正以此耳答田簣山書六月二十八日得接五月二十八日台函言及禮文之編謙讓過甚引考亭云云以為必有積於立言之先者然後可得而言又云是書雖以通俗為凖必當上溯古經以窮其源使人知禮所自來為吾日用之所不可缺下酌時宜以浚其流使人於禮皆可盡不苦吾財力有所不能辦㫖哉言乎非有道者誰能為此此某之所以逡巡而不敢任此某之所以謂非足下不足任也中州之以禮自持學博綜而審權衡者足下之外有幾人乎吾夫子曰立於禮又曰不學禮無以立若平時未嘗講明一旦臨事即平日知其不可者亦隨俗行之蓋中無所主驟難執持也即欲執持而譁之者衆卒亦變而從之也倘如考亭言慮後日為此病敗則亦求勿敗而已矣若慮其必敗而不為非有志之士所敢安也凡著書草創規模為難至斟酌損益尚賴朋友文不必太奧奧則人難暁也亦不必太繁繁則人難知要也某展轉思之終以為非足下不能任願足下留意勿讓也不然吾州幸有一好古秉禮之君子而不能成此書則末流頽俗誰與砥乎亦可歎也已上總憲魏環極先生書先生道徳經濟清操峻望朝廷倚為柱石士林仰如山斗凡有進對皆國計民生賢才進退治道升降所關至誠剴切足以感動天心皇上虚懐採納言無不從明良相遇天下拭目以觀太平近復辭司宼之命請留總憲以汲黯自擬皇上亦嘉悦而留之君臣相信無間三代而後不多見也先生正色立朝百寮嚴憚所謂猛虎在山藜藿為之不採固不在條舉一二事糾參一二人遂足盡職掌稱報効也而都下縉紳以及儒生不能盡明斯義以為翹首跂足願聞讜論而兩月以来未聞有所論説議論紛紛近聞有錢塘監生馮景致書臺下某未見其書云何又有云此書已達政府呈御覽者料此言必不確而口語籍籍至有公言於班行者某實聞之䝉先生下交二十餘年又辱薦牘知已之感古人所重若有聞不告非事大賢之道且非所以報知已葢自請留任為近代不經見之事故自處較難無再拜他官之理而總憲非乆居之地壯徃直遂非大臣之道而委蛇順時非自任之誼盛名難副晩節難保先生詳審之某不敢以此聞於人也答劉叔續書前榮任朱襄即奉德音旋應召北上未得一晤清輝抱歉殊深敏修入都盛稱足下持躬教士榘矱卓然日切仰止長安鹿鹿未得修候乃逺承手翰謙沖過甚令弟致命再三嫌於自外不敢不仰承髙誼僕學無原本疎懶自廢二十年林泉與漁樵為伍時人以為淡於名利似稍知道者其實不然也竊嘗負笈百門側聞緒論學者首在志道而遺利重内而輕外以聖賢大道為必當由異端邪徑為不可蹈其功在主敬窮理程子曰涵養須用敬進學在致知此入道真訣也惟在細心體認今師道乆廢膠庠虛設士風日頽振興匪易柘邑素習近古足下一稟先型以身為教敏修刻志躬行精進匪懈敝州田梁紫踐履篤實學極淵邃此皆可與夾輔進德十室必有忠信惟要有真精神鼓勵多士秉彞具存必有賢者應之胡安定曺月川豈異人任君子思不出其位毋以蓿齋冷局視為不足為與世俗同類相效也講學只在當下所處之地所處之時舍此而談空説悟直作一好話頭講過終與自已無益也僕生平不敢為此學以為今天下大病總坐一偽字有來相問者惟欲先去此字然後有商量處耳與劉叔續書張仲誠先生在京時常晤對其學真腳踏實地其要在於主敬程子曰整齊嚴肅則心便一一則自無匪僻之干只纔整齊處便是天理别無天理只常常整頓思慮便一此一段是仲誠得力處仲誠與崔玊階先生皆精於易學有心得不依傍前人制行皆端方確有把柄此當代真儒也惜仲誠不免西川之行西川當有賢者待其陶鑄不獨殘黎沐德化也士君子行止皆闗天意非人所能為也答黄太沖書戊申承先生賜證人㑹語又得讀蕺山遺書知吾道真傳實在先生當時渡江匆匆未得面晤至今歉然戊午入都於葉訒菴處讀待訪錄見先生經世實學史局既開四方藏書大至獨先生著述𢎞富一代理學之傳如大禹導山導水脈絡分明事功文章經緯燦然真儒林之巨海吾黨之斗杓也承乏試事擬撤棘後一登龍門遂夙昔之願乃䝉主一惠然逺臨台函眷愛慇慇若以為可與聞斯道者某何幸得此於先生哉竊以學者要在力行今之講學者祗是説閒話耳詆毁先儒爭長競短原未見先儒真面目學者不從日用倫常躬行實踐體驗天命流行何由上達天德何由與千古聖賢黙相契㑹如此即推奉先儒與詆毁先儒皆無當也蕺山先生曰心體是圓滿的忽有物以攖之便覺有虧欠處自欺之病如寸隙當隄江湖可決切至之言也先生曰蕺山從嚴毅清苦中發為光風霽月學問縝密而平實人譜一書真有途轍可循不患不至上達此善論蕺山者也與黄太沖書蕺山先生忠誠憂國似司馬君實奏對詳明似陸敬輿骨鯁清直似汲長孺雖未盡其用而大疑大案據經廷諍維持國體保䕶正人世道人心補益𢎞多其學辨析義理之幾㣲究極天人之奥窔此孔孟之真傳濓洛之嫡派也學路久迷事事皆為奔走聲利之塲詆譏先儒樹立壇墠雷同附和不知身心安頓何地深懼吾道荆榛雖勉自砥礪獨行寡助如瞽者之倀倀無所適伏望時賜指南加以鞭䇿倘有所進飲水思源敢忘所自答陸稼書書先生正學清德僕私心嚮慕久矣來諭云孔孟之道至朱子而大明學者但患其不行不患其不明但當求入其堂奥不當又自闢門户此不易之定論也再讀學術辨云天下有立教之弊有末學之弊又云涇陽景逸未能盡脱姚江之籓籬皆極精當獨謂僕不欲學者詆毁先儒是誠有之然有説焉僕少無師承長而荒廢茫無所知竊嘗泛濫諸家妄有論説其後學稍進心稍細甚悔之反覆審擇知程朱為吾儒正宗欲求孔孟之道而不由程朱猶航斷港絶潢而望至於海必不可得矣故所學雖未能望程朱之門牆而不敢有他途之歸若夫姚江之學嘉隆以來幾遍天下近有一二巨公倡言排之不遺餘力然海内學術澆漓日甚其故何與蓋天下相尚以偽久矣巨公倡之於上隨聲附和者多更有沉溺利慾之場毁棄坊隅節行虧喪者亦皆著書鏤版肆口譏彈曰吾將以趨時局也亦有心未究朱程之理目不見姚江之書連篇累牘無一字發明學術但抉摘其居鄉居家隱㣲之私以是居衛道閑邪之功夫訐以為直聖賢惡之惟如孟子所謂不得已者可也學術精㣲未嘗探討功業昭著未易詆誣而發隱㣲無據之私以快其筆舌用心亦欠光明矣當年桂文襄之流不過同時忌其功名今何為也責人者貴服人之心自古講學未有如今之專以謾罵為能者也或曰孟子嘗闢楊墨矣楊墨何至無父無君孟子必究其流弊而極言之此聖賢衞道之苦心也何怪今之君子與夫陽明之果為楊墨否姑未暇論竊以謂孟子得孔子之心傳者以其知言養氣性善盡心之學為能發明聖人之藴也蓋有所以為孟子者而後能闢楊墨熄邪説閑先聖之道若學術不足繼孔子而徒日告於人曰楊墨無父無君也率獸食人也恐無以服楊墨之心而熄其方張之燄矣孟子曰今之與楊墨辨者如追放豚既入其苙又從而招之則知當日之與楊墨辨者亦不乏人矣今無片言隻字之存則其不足為輕重可知也然則楊墨之道不傳於今者獨賴有孟子爾今不務為孟子之知言養氣崇仁義賤功利而但與如追放豚之流相頡頏焉其亦不自重也已來諭曰陽明嘗比朱子於洪水猛獸是詆毁先儒莫陽明若也今亦黜夫詆毁先儒者爾庸何傷竊謂陽明之詆朱子陽明之大罪過也於朱子何損今人功業文章未能望陽明之萬一而止效法其罪過如兩口角罵何益之有恐朱子亦不樂有此報復矣故僕之不敢詆斥陽明者以為欲明程朱之道者當心程朱之心學程朱之學窮理必極其精居敬必極其至喜怒哀樂必求中節視聽言動必求合禮子臣弟友必求盡分久之人心咸孚聲應自衆即篤信陽明者亦曉然知聖學之有真也而翻然從之若曰能謾罵者即程朱之徒則毁棄坊隅節行虧喪者但能鼓其狂舌皆將俎豆洙泗之堂矣非僕所敢信也僕年已衰暮學不加進實深自愧惟願黙自體勘求不愧先賢或天稍假以年果有所見然後徐出數言以就正海内君子未晩此時正未敢漫然附和也答友論學書某少遭喪亂學無師傳入仕與曹厚菴先生同直史舘得承指示年少心粗方留意詞章未能窮究根柢泛濫先儒之説時悟時悔靜坐久之覺喜怒哀樂未發時真與天地萬物同體日用之間四端隨時發見但存養功疎故擴充無力濓溪以來師友授受原有真傳秘㫖不從本原透徹不從存養得力將先儒真切指示之言都作影響混過何由融㑹貫通近世功利詞章之學陷溺人心不知天之所與我者何在徒襲取先儒形貌妄分畛域所言非所見所見非所履亦可怪也與宋牧仲書閲北闈題名錄知令五弟介山高捷不勝雀躍俟入都當恭賀也浙闈文章素稱最盛而亦弊藪也以某庸碌濫叨斯任同考諸公廣文幾半且年皆遲暮與此道茫然闈中費盡心力費盡脣古巻數八千二百有餘限以半月且瘧疾大作不敢言勞每日漏下四鼓始休雖額數有限不能無遺珠之歎而入彀者皆苦志芸牕且多藜藿不充之士榜下皆嘖嘖稱歎言此科孤寒吐氣某聞之殊不自安天下才人原不盡在孤寒某亦何所容心或主司貧苦氣類偶相感觸耳出闈後與撫軍諸公約斷不敢一事相干瀆公筵之外無私㑹也無私札也浙中例候舉人親供全始解巻舉人有逺者一時不能至詢之學使言往科亦有不候親供之例遂與撫軍言於九月廿日解巻某遂於廿二日遣牌廿五日登舟矣此某奉使之大畧也某離家三載老母年髙借便歸省于子老入都匆匆漫陳一二乞賜垂照敝衙門諸先生與同鄉諸公未敢一字相候乞為道意答閩撫金悚存書先生邃學𢎞才為中朝領袖頃者入境大疏具見振刷實政公恕嚴明兼而有之長安道上無不歎服竊以今日吏治壞極百姓苦極有司亦困極不但七閩為然而七閩為甚大賢風示於上自應丕變然事有難為不無阻礙要在大力深心且須去泰去甚從來化否為泰固自有漸惟大端既正風行草偃不勞而成固不必事事改易也海上善後之䇿為今日第一要務至尊明見萬里廟算𢎞深迥出恒人意表但身在地方倍為親切綢繆經畫期於盡善封疆重任惟謀久逺不在鋪張聖主緩台衡之命暫畀南服宵旰籌度良有深意固知姚宋韓范併於一身非先生不可耳與楊筠湄書向於邸抄讀大疏以為漢之汲長孺唐之張曲江於今再見國有直臣社稷之福傾心向慕晤教無從近者秉衡三晉人頌歐陽某於各省學憲概不敢以一函相通故不敢破例達尺素於左右然有一事欲聞於大君子之前藏之胷中逡廵而不敢者數矣既而思之若於試事相干涉則斷斷不可若闡揚濳德或亦大君子之所樂聞也趙城同宗諱家相字泰瞻已丑進士孝友亷介本自性成言規行矩非由矯節筮仕常熟惠政洽於人心以催科政拙例當左官士民千里詣闕號泣請留舉旛相約輸納恐後數載逋賦一朝報竣三吳縉紳歎為從來未有部議還職再補南漳地最荒殘境逼巨宼招撫流移訓練鄉勇養民教士具有成績督撫擬舉卓異而蓴鱸興思遽賦歸來居鄉杜門却掃絶跡公府宦既不達家徒壁立惟訓迪後進敦尚躬行誠盛世之循良儒者之卓行古者鄉先生歿而祭於社若斯人者以之俎豆鄉賢使後人有所矜式實大典之光也門祚衰㣲恐無由達之執事某知之最深故敢為發㣲闡幽之舉惟冀博採輿論慎而行之幸甚與王抑仲書長安道上有稱頌足下新政者未得其詳既而知立義學七十餘處從學弟子六七百人近且重農積穀水旱有備此漢代循良所為何幸於今日見之教養二字王道之本近日長吏不講久矣某昔承乏潼闗亦力行社學鄉約義倉保甲四事頗費苦心雖寮友承行不能盡如鄙意然亦有效可覩矣足下學有源本才足經世今日乃兼善天下之始也聞以呂司宼公諸書課子弟此書最善入人化俗為易婦人女子皆能於變真快事也半載之後似當課以孝經小學近世人才不古若只為少此一段工夫就中擇其才可大成者進以經書講明正學三年之間當有大賢出而應之有功吾道不小也賢才不擇地而生特振興無人遂就頽廢耳此亦天意之所甚惜也更聞勇於拔薤疾惡過嚴此自初政宜然親民之吏慈惠為上民既嚮風威嚴宜弛愚者千慮或可一採治行卓異不拘俸次旦晩内召梓里藉榮翹望翹望與宋牧仲書都門奉送台旌遂如三秋足下壯猷偉略為三輔屏藩輿頌一新洋洋盈耳吏從冰上人在鏡中請以相贈事繁而處之若簡民詐而馭之以誠在足下固自裕如然努力加餐實所願也某才本駑下年來史事浩繁心血耗盡不意孫屺老榮轉閣學某濫叨新命同張素老進講内廷學術疎陋何能仰助高深且衰年多病風雨寒暑不輟豈能勝任聖主恩深不敢控辭足下何以教我兹因小价領米之便奉候興居附有請者目下盛暑每日進講瀛臺苦於步履急欲買一脚力不得妥當廏中良驥必多求暫借一小而馴者俟置得即還上借乗之風在春秋已歎其難朋友與共子路以之明志或世人以為不易者而賢者可與言情乎笑笑與杞縣令王慎齋書長安晤對退而自喜不謂斯世復見龔黄别後音問疎闊時切懷想偶有便鴻附候興居劉文烈公理學節義彪炳宇宙後嗣守其家學閉户甘貧文行可稱曽孫忠昆相見京師接其言論朴誠可掬令人想見名賢家法篤念賢裔扶植衰㣲古道於今非大君子其誰望乎聖朝表勵忠節卓冠百王文烈公既荷旌恤輝煌史冊四十年來墓碑未立後人過之竟不知有斯人之墓亦地方之闕典也伏望與紳士公議勒片石以誌不朽此近世所視為迂闊不足為而先儒以為知務也伏惟垂察焉答沈芷岸書去冬匆匆一晤未得罄展積悃别後企望雲帆不禁耿耿於懷也今春閲邸抄知酉闈得雋者六人而足下拔幟先登曷勝欣躍更獨荷聖恩簡授中秘從此積學樹品大用可期不佞得以一日之雅藉光無既然初入仕途擇守宜慎長安名利之場聞見繁難最易摇惑三門急湍砥柱良難足下識力堅定宜静重養望勿逐時好相競躁進前輩典型昭然可見署中堂聨人重官非官重人徳勝才毋才勝徳真座右銘也幸勉旃而已答王世兄書某謬以庸菲處第一繁難之地救過不遑惟恪遵功令夙夜不怠天鑒民瞻時凛於懐一載有餘未嘗敢與鄉士大夫以書札相通吳中多貴遊亦無以私相干者某何敢以已所不欲施之於人且自破籓籬將来何以自處故萬萬不敢也今聖主振興文教特簡學使一時諸臣無不爭自濯磨况貴鄉以名元賢侍御處孔孟之國自當一秉至公洗從前之陋副當宁之心士君子苦志誦讀自能邀其鑒拔若稍存他念則志意不立文筆必弱反失之矣故惟患學業不精不患有司不明專心致志不為詭遇聖賢之道實實在此某年来於千辛萬苦中頗有得力見此理頗明因感師恩不敢不以實告惟世兄稍賜垂察毋為世俗之言所移也與魯敬侯書山中歲月未可虛度濳心經史務求明體適用濓洛以來大儒之書細細窮究蕺山先生典型尚在梨洲定菴學有淵源虛心請教必有所得古小學先儒講學之地也與同志君子相商興復士大夫居鄉興學立教變化風俗是第一要務但要實從立德明道起念勿存聲氣名譽私見成已成物皆性分中事不可錯過此生負天地生成之德也子閎端品清脩真誠君子正當交相砥礪以聖賢相期士立志要高不要卑要定不要雜要堅不要緩讓第一等人不做做第二等便是無志今世士大夫以古道自持不隨流俗者如足下蓋不多見不佞實有厚望故敢畧陳其愚答孫屺瞻侍郎書逺接手教仰見大君子慎始圖終大業出於小心非時輩漫無逺謀者所可同日而語某愚昧無識未嘗久習河務然既承下問不敢不竭鄙見下河之患固在海口壅塞然海口之塞匪自近年祗因上流不治河淮失其故道漕隄潰決因而閘壩多開止求洩上流之水以安蹔時之漕不為水求歸宿之處遂以七州縣城郭田廬為巨壑矣皇上南巡親見下民婦子田廬皆處洪濤之中真若恫瘝在身真天地覆載之心也即堯舜之憂勞洪水大禹之飢溺由已何能加焉今欲開海口以治下河皇上之意固專在民生然漕運久逺之計實不出此蓋天下水未有不以海為歸者黄河北岸減水壩由沭陽安東等處皆入海之路潘印川減水壩俱建於河北岸欲其從灌口入海也今南岸減水閘壩之水安歸乎歸洪澤湖耳淮湖之水日増日漲河流帶沙湖底漸高清口太狹則湖逼高堰昔潘印川用高堰逼淮刷黄寜犯大忌浮議沸騰而不敢輕開尺寸者而今竟開六壩二閘矣更加以三十六湖之水盡注漕河漕隄安得不危故又開一百餘丈之滚水以洩之其意以為漕隄不潰則河臣之事畢矣七州縣之民命可無問也獨不思下河之地有限而上流之來水無窮以有限之地供無窮之源將來水無所容一線漕隄勢必大壞由此言之開海口治下河非但救七州縣之民命已也實所以為漕運久逺之計也今欲閉漕隄之壩必先開高堰之壩高堰之壩不能全閉欲閉高堰六壩之二三必先塞黄河南岸之閘壩黄河南岸有毛成舖北岸有大谷山徐城可無患矣王家山以下一路減水閘壩不可稍閉免洪澤湖之泛濫墊淤且留以蓄水刷沙乎自碭山以下至清河南北減水壩三十餘座水分則流緩流緩則沙停將來正河運道不有淤塞之慮乎又印川之減水壩比隄稍卑二三尺耳今與地平矣昔云歸漕者常盈今何能盈乎此上河之可慮者也河督之堅執不移者不過以開閘開壩費帑金無算今日可塞昔日何以誤開恐有從而議其後者耳愚因於㑹議向中堂九卿言之治水如治病因病立方補洩隨時難以執一不得以後日之用補歸咎於前日之誤洩昔日開壩以保隄也今日塞壩以刷沙也猶先應用大黄芒硝者用大黄芒硝後應用參茋桂附者用參茋桂附各有其宜歸於愈病而已此言實有至理亦欲河督開豁疑衷從長計議為國計民生圖久逺之䇿此出自誠心而不謂河督之堅執如故也然今日下河工程當在范公隄外此非壩水所能到也但於石䃮丁溪二口開通一二處則浮水可去内地水當漸淺河湖舊形當漸露再尋訪所謂射陽德勝平望喜鵲諸湖舊迹而以閘壩之水開引河以歸之再由湖歸河以入新開海口條分縷析脈絡分明即大禹治水亦不過如此若曰一開海口而遂使下河盡為平陸焉萬萬無是理也故目下不在減水壩之塞與不塞而在地方官不肯盡心相助呼應不靈人夫物料恐難凑手耳若諸事凑手即當盡心嚴督工程勿惑浮議成大功者小小順意不足喜小小拂意不足懼惟先定成局持堅忍不拔之志如行兵然當有定算偶爾勝負何足憂喜如弈碁然當爭全局一著二著何足較量下河苦水久矣今歲之旱乃偶然耳若盡如今歲則海口可以不開矣前讀大疏斷無海水高於内地之事此先生親身閲歴之言故鑿鑿如此非如他人紙上談兵也只此一言便見治下河定算矣皇上神聖不世出之主滇黔閩粤指顧蕩平海外自古未入版圖之地皆立郡縣漢唐以來從未臣服之國盡來歸附豈淮揚近地開一二湮廢之河道以救數城之殘黎發自聖心特遣部堂為臣子阻撓而罷以為聖主之心能宴然而已乎故減水壩不可塞則海口更不可不開下河之水愈大則開海口之功亦愈大惟先生斷然持之耳某以為成功可操券而待也與王似齋書足下有體有用不佞所深愛客冬晤尊公知足下家學之有自也頃札至詢為學之要見足下立志不凡為學不在語言文字之間惟於倫理身心無愧無怍便是聖賢一路足下勉之不佞生平從不代人作文亦未嘗倩人代作聞杞縣碑文借不佞出名寒家無寸土在把豈可妄列邑人之末幸為改去是所望也湯子遺書巻五
