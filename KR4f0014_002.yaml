body:
  text: 湯子遺書卷二工部尚書湯斌撰奏疏陳史法以襄文治疏竊惟史者所以昭是非助賞罰也賞罰之權行於一時是非之衡定於萬世皇上御極初年即命史臣纂修明史仰見皇上留心文獻與唐太宗敕魏徵等撰次隋書明太祖敕宋濂等纂修元史可謂千古哲王若合符節但當時纂修止據實録未暇廣採臣愚竊以為立法宜嚴取材貴備實録所紀恐有不詳臣謹取其大略為我皇上陳之如靖難兵起建文易號永樂命史臣重修實録則低昻髙下之間恐未可據他如土木之變大禮之議事多忌諱况天啓以後實録無存將何所依據焉一也二百七十餘年英賢輩出有身未登朝而懿行堪著或名僅閭巷而至性可風萬一輶軒未采金匱失登則姓氏無傳何以發潛德之光前代史書如隱逸獨行孝友列女諸傳多實録所未備者二也天文地理律歷河渠禮樂兵刑藝文財賦以及公侯將相為志為表不得其人不歷其事不能悉其本末原委三也臣謂今日時代不逺故老猶存遺書未燼當及此時開獻書之賞下購求之令凡先儒紀載有關史事者擇其可信並許參考庶幾道法明而事辭備矣臣伏讀順治九年十一月十七日上諭云明末寇陷都城君死社稷當時文武諸臣中豈無一二殉君死難者幽忠難泯大節可風大哉王言開一代忠孝之原肅萬載臣子之極一時在京諸臣若范景文倪元璐劉理順等皆被旌録自當照耀史冊但明末寇氛既張蹂躪數省或銜命出疆或授職守土或罷官閒居或至布衣之士巾櫛之婦其間往往有抗節不屈審義自裁者幸遇皇上扶植人倫發微闡幽而忠魂烈節猶有鬱鬱寒泉之下者則後世何勸焉伏乞敕下各地方督撫確訪奏聞併將實蹟宣付史館與范倪諸臣並例同書則闡幽之典愈為光昭矣更有請者宋臣歐陽修纂五代史不為韓通立傳後世譏之宋史修於至正三年而不諱文謝之忠元史修於洪武二年而並列丁普之義古今偉之皇上應天順人救民水火雲霓之望四方徯蘇然元二年間亦有未達天心徒抱片節硜硜之志百折靡悔雖逆我顔行有乖倒戈之義而臨危致命實表嵗寒之心此與海內混一竊名叛逆者情事不同伏望皇上以萬世之心為心渙發綸音概從寬宥俾史臣纂修俱免瞻顧則如天之度嫓美前王於以奬勵臣子昭示後世其於綱常似非小補臣在史言史不識忌諱無任戰栗隕越之至睢沭二邑秋災情形疏康熙二十三年十月初九日江蘇布政司布政使章欽文詳據淮安府詳據睢寧縣詳稱據本縣儒學生員魏奮翼等鄉民夏王賔等稟稱國以民為本民以食為天本固邦寧食足民安理勢然也痛睢積年以來非旱即潦災荒頻仍百姓已不聊生兼之地濵黃河夫役繁重糜費過於正賦所以上纍考成下致逋缺此官民兩害之原也况今嵗春荒糧食騰貴率皆賣兒鬻女以活生命吞草嚼葉以度朝昏壯者散而老者絶顛沛萬狀慘不堪言滿望麥秋收穫以延殘喘不意二麥成熟之後五月五日大雨奇降平地水深數尺二麥朽爛仍望秋禾活生不意西水順流而下縣治南北一帶泛濫橫流深者丈餘淺者五七尺不等其秋禾登場者被隂雨連綿二十餘天並未入倉漂流而去房屋淹倒無數遍野已成澤國殘黎並無棲止已種之麥盡沉水底未種之地現今水沉不惟今嵗無賴來嵗更無所望不惟已逃之民不復思歸故土即未逃之民亦且樂奔他鄉民逃則地荒地荒則賦逋士民危極情極公叩電憐百姓困苦恩賜轉詳得邀蠲免則父母之仁能轉河伯之虐矣等情到縣據此該卑縣竊查睢邑歷年災患頻仍黎民塗炭今春賣兒賣女者有售無受以故哀鴻遍野碩鼠興歌滿望麥熟或可少蘇不意暴雨連旬將麥損傷過半復望秋粒奈三伏不雨禾黍皆枯入秋霪雨連綿二十餘日黃水陡發而睢邑里社坐落黃河南北兩岸近年修築隄工較平地約髙丈餘水無注泄一經漫溢即如倒海西水順流而下遍地汪洋故將已穫秸粒悉皆漂蕩方種麥苗俱沉水底屋廬衝決民無定所衆姓哀號傷心慘目卑縣職司民牧不得不據實陳情仰祈軫念民瘼恩賜轉詳題請蠲免或議賑恤或緩催科起瘡痍而肉溝瘠萬姓皆沐洪恩於不朽矣等情據此除一面專員飛赴確勘另報外事干災傷擬合通報等情又據該府詳為黃水永注沭邑災黎終絶更生哀籲詳請亟賜拯救事據沭陽縣詳稱據本縣士民魏鯤等連名禀稱沭居清宿下流幸䝉皇恩蠲免孑遺稍延殘喘不意今嵗入秋以來霪雨連綿晝夜如注又兼山水暴漲以及黃水田攔馬河泛漫由邳睢等邑直灌沭境淹沒慘狀惟見水天一色百里無烟又不止積水漫淹與謹報安東等案沉田溺丁已也切思糧從地起無地何以徵糧鞭自丁出無丁何以輸鞭若不叩天詳請畫一永久之計不惟民命堪虞亦且考成焉副縱天臺視民如傷其應徵額賦果能一一問諸水濱乎伏乞軫念水患益深民生愈蹙施拯溺救災之洪恩思安上全下之至計據實申詳為民請命隂功萬代等情稟縣據此該卑職看得沭邑謹報安東積水漫淹兩案沉田溺丁荷䝉上臺題請蠲豁災民幸得更生於康熙二十二年冬奉江撫都院委勘查報二案涸田六百一頃一十五畝二分五釐題報升科在案第查田雖稍有露尖實則沙荒無人耕種惟冀今嵗招集流移拮据播種稍全國賦不期自夏而秋諸水泛漲由宿遷縣等處而下水勢溢流沭邑為滙歸之區不惟去冬報涸之地復沉水底即未淹之田間亦浸漫卑職南闈回縣但見四野汪洋目擊心傷忝司民牧不得不亟為請命合無據實申詳本府軫念沭民叠罹奇災懇將涸地升科漕糧正賦亟賜具詳疏題蠲豁末吏災民兩佩洪恩於不朽矣等情詳府據此除一面專員飛赴確勘另報外事干災傷擬合通詳各等情到司據此該本司查得淮屬地處卑下入秋霪雨連綿諸水泛漲積注未泄今據淮安府將睢沭二邑田地被淹廬舍傾頽情形詳報前來除一面飛行批飭淮府迅行各該縣加意撫綏設法賑恤并確查是否成災及該府屬逾限日期查明另報外事干地方災傷合即通報伏乞迅賜核奪㑹題等情到臣據此該臣看得淮屬睢沭二邑地處卑窪叠遭水患荷䝉皇上軫念民艱蠲賑屢施災黎得以稍延兹據布政使章欽文詳報今嵗入秋霪雨連綿諸水泛漲以致田地被淹廬舍傾頽等情除經飛飭該司迅委能員親詣確勘果否成災照例造具冊結同報災違限日期一並扣明另詳題報外惟是據報秋災情形例應先行入告伏乞睿鑒施行積年未完之漕項已荷分徵五載壓缺之正賦更祈蠲緩以廣皇仁以蘇民困疏三吳賦稅甲天下軍儲供億仰給實多我皇上智勇天錫命將授鉞淵謀睿算威震海隅而轉輸不匱江南每嵗本折五六百萬較他省蓋數倍焉我皇上念財賦重地於軍需匱乏之際猶蠲租賑饑恩恤備至乃者聖駕東巡洪恩覃敷蠲漕免丁帶徴漕缺除一時並徴之纍詔到之日白叟黃童靡不舉手加額感激而泣以為皇上如天之仁軼唐虞而超三代實亘古所未有也獨是漕糧雖荷天恩而地丁錢糧自康熙十八年至二十二年五年並徴民力猶苦不支每臣一出士民環馬首泣訴求為陳情者殆無虛日臣以國課關係重大隆恩未可妄邀曉以大義使各勉力輸將而士民遑遑哀求不已既而思之使並徴有益於國臣何敢妄有所請乃於國計無所補益而下民實為苦纍臣不為奏陳是為溺職上負聖恩矣故敢冒昧為我皇上言之臣按蘇松等處賦額繁重雖在豐年所入常不敷所出乃十八十九兩年異常災荒逋缺獨多今年之尾缺即為來嵗之帶徴下年之未完又為次年之並比陳陳相因日以增益小民終嵗胼胝不過畝收石粟欲正供之外兼完積逋勢必不能且錢糧之在公家雖有起存漕項之分而小民之輸將總一條編原無差别未完起存錢糧之民即是未完漕項之民今計十八年至二十三年未完地丁並時追呼而二十四年新糧又復啓徴矣州縣比較大率十日一限假使每日輪比一年則十日中僅三日空閒而七日赴比矣近城附郭猶得稍息其窮鄉僻壤奔走道途匍匐公堂欲求盡力農桑不可得已設有司見考成期迫不暇念及民生或一日而並比數年則先因某年之缺而敲撲之復因某年之缺而加責之血肉淋漓哀號之聲上干天和亦所必至也臣仰體皇上視民如傷之仁時時告誡有司既不忍使疾苦遺黎受此摧殘又不敢以定限考成為之寬假誠恐民之積缺己多剜補無術惟有拚此皮骨以捱徴比官知遞年壓缺催科計窮亦惟拚一降革以圖卸擔究之官之更代愈速錢糧之頭緒愈亂加以蠧役乘機侵欺小民逃亡相繼國課必至大絀臣愚以為民間止有此力併徴數年其輸納不加多帶徴一年其輸納不加少而分年帶徴則官免畏顧考成那新補舊之弊民免纍日並比荒廢農桑之苦所全實大也故敢冒昧叩懇皇上推廣帶徴漕缺之德意俯俞臣請除康熙二十三年錢糧尚未奏銷不敢請緩將康熙十八年至二十二年民缺地丁錢糧俯照漕項一例於康熙二十四年起分年帶徴以抒民困臣又念此數年中十八十九兩年水旱叠承地多版荒人多逃亡今時已五載牽連親族者有之遺纍鄰户者有之所謂有糧無田有户無人者實實不乏儻䝉聖恩將此兩年概賜除豁准自二十年後分年帶徴務祈全完在民既無並徴之纍在官又無虛懸之項然後律以考成之法小民亦各有心既感皇恩又怵功令誰不踴躍爭先以完正供此實有禆公帑無損國計而江南士庶歌詠皇仁億萬斯年永永無極矣泰州災復加災亟叩蠲恤疏泰州居髙郵寶應興化等州縣之下流素稱澤國自康熙七年洪水為災田地陸沉民生昏墊荷䝉皇上飢溺為懷蠲賑頻頒孑遺獲存復將淹田錢糧於微臣目覩等事案內准豫蠲停今於每年冬勘明淹涸確數分别蠲徴歷年遵奉在案至康熙二十二十一兩年該州田地陸續全涸隨即據實勘報具題是以微臣目覩等事案內止存山陽清河等七州縣而泰州不與焉臣於康熙二十三年十月內接任撫事至十一月據泰州里民呈控該州田地自二十二年復被水淹情詞迫切臣即備查卷案該州田地已報全涸何得妄稱復淹且未據地方官申報難以慿信批行布政司轉委淮揚道副使多𢎞安親詣查勘務在確實不得稍有虛揑去後續據該道將復淹田地情形詳報前來臣查田地疆界豈無髙下分别冊內多有未明恐有虛揑復據該司詳委蘇州府同知金鑑㑹同揚州府同知朱射斗前往覆勘臣又諄切面諭務須矢公矢慎細加察勘不得稍有扶揑今據布政使章欽文詳稱同知金鑑等履畝查勘據稱泰州田地原分上河下河其上河田地久成膏壤惟下河一帶與興化接界地最窪下海口未開髙堰湖水時常漫溢淹涸無定逮二十二十一年嵗值大旱田中積水全涸二十二年雖涸田復淹然雨水驟漲尚冀旋消是以前撫臣於彚題案內未敢遽請蠲豁至二十三年九月內湖水暴發橫流旁灌宣泄無路注而不流至今田沉水底播種難施等情臣惟淹田涸出固宜隨時勘報起徴以足額賦如涸後復淹亦應據實陳請以邀寬恤我皇上視民如傷逺邁千古巡幸經臨見民廬舍田疇被水淹沒深軫聖懷特遣大臣循海察勘不惜經費專官疏濬下流期民安土復業萬姓歡呼祝頌聖壽無疆所有泰州康熙二十二十一年原報涸出田地既經屢勘實被淹沒見在播種難施應徴錢糧委難責令輸納亟懇皇仁准豫停緩以後仍歸微臣目覩等事每年冬勘案內與山陽等州縣一例察勘涸出另報起徴浩蕩皇恩非微臣所敢妄冀也郡守因公降調士民控籲迫切代陳輿情疏臣屬七府現缺知府者三常州府降調知府祖進朝履任未及一載素聞其操持廉介涖事勤慎臣私心重之頃緣失察法寶一案部議降調奉有俞㫖乃常州五縣紳士商民不知朝廷功令以為進朝服官頗能潔已愛民驚聞解任輒搶地呼天號泣罷市若一旦頓失怙恃者奔赴臣衙門請為題留日不下數千人街衢擁塞哭聲震天更有蒼顔皓髮年逾八十平日杜門靜修足不履公門者亦至臣公堂叩首求達天聽臣諭以朝廷自有定體保留之例久已停止爾等當靜聽部選新官毋得瀆擾士民愈加哀痛以為常州四十年來未有愛民如祖進朝者其減差輕耗興學正俗戢奸除暴息訟安民種種善政窮鄉僻壤盡沾惠澤豪强蠧胥不敢作奸皇上軫念東南如江寧府知府于成龍䝉特恩超擢吏治丕變今進朝操守才幹實可與成龍頡頏而獨以一眚被謫萬民驚惶殆不欲生言畢泣下不能止臣再三撫慰許以代題皆望闕叩頭而後去又聞赴督臣衙門控訴者亦不下數千人臣不知進朝何以感人之深如此臣查失察法寶一案無錫縣知縣徐永言以協拿免議進朝身為郡守失察之罪何辭况部議察取督撫職名臣受事四日拿獲法寶是受事之日已為失察之日自當靜候處分何敢代人瀆奏惟是常州為江南巨郡一月以來士不安於庠農不安於野商賈不安於市行旅不安於途臣䝉皇上特恩簡畀封疆大任屬吏之敗檢者得而糾劾之廉能者不能為之一言非公也民情皇皇如此而不為之解慰安輯非仁也畏罪緘默而使輿情不能上聞非忠也有一於此皆負聖恩無所逃罪因與督臣熟計再三敢不避斧鉞為之陳奏實從通達民情起見非敢違例題留恭謝天恩疏康熙二十四年五月二十四日皇上頒賜日講易經解義到臣臣隨恭設香案望闕叩頭祇受恭惟我皇上道協乾元明符離照正位凝命秉剛中而六爻八卦之用全富有日新體易簡而三極兩儀之理備奮神威於遐甸日烜雷動見萬國之咸寧布愷澤於蒸黎雲行雨施與四時而合序蓋顯行藏用無非圖書未發之英華而致逺鈎深更窮河洛以來之理數說諸心研諸慮參伍錯綜之必詳樂而玩居而安象變意言之悉㑹法天德以行健既有自强不息之功觀人文而化成尤以教思無窮為大於是頒行解義昭示臣工範圍在一人已通健順剛柔而敷治推行先百職俾體盈虛消息以宣猷從此户誦家傳猶如觀法懸象二五應而位當上下交而志同容保無疆有孚而化臣行多悔吝識昧㑹通曩者侍寶幄以敷陳愧顓䝉未聞妙道聆玉音之闡發知神聖自有心傳今兹職備封疆時復神遊殿陛瑶編下賁恍依御座以趨蹌奧義重披宛接天顔於咫尺敢不惕深覆餗節勵匪躬仰對時育物之淵懷敬以訓規寮寀承設教省方之至意敢用告誡編氓懇憐積苦大沛蠲恤以存要地疏淮安府屬地方居長河大湖之濵民間田畝多因積水未消難施耕耨地利既失困苦日深而土瘠地衝民窮賦重惟宿遷尤甚恭遇聖駕東巡問民疾苦而宿遷縣生員陸爾謐等民張士𢎞等以豁免暫加三餉失額丁銀失額糧地曠土虛懸四欵具奏陳請我皇上以巡幸宿遷親見民生有窮苦形狀特敕部議行臣確查據實具題臣捧誦恩綸仰見我皇上飢溺為懷逺邁千古一夫不獲皆厪聖慮此真宿民出塗炭而登袵席之時也臣敢不仰體皇仁悉心詳察以副如天覆冒之心隨行江蘇布政司逐細根查毋虛毋隱據實詳報去後今據布政使章欽文取結詳覆前來臣查陸爾謐所奏暫加三餉一欵即係全書所載九釐地畝欵項始於明季萬厯四十七年加徴而宿遷一縣則派銀至四千三百二兩八錢六分零併隨正編徴水腳我朝定鼎初年凡明末雜派悉賜豁除一切錢糧俱凖萬厯年間起科而此項因係萬厯末年所加故當日未邀特恩仍舊派徴相沿至今惟念該縣地畝非濵河傍湖即沙礫斥滷不但淹沒之地望涸無期即升科之田亦荒瘠難墾民生昏墊實與他處不同且田畝科則又與鄰近之海贑邳睢等州縣較重故士民之呼籲倍切仰懇特恩將宿遷縣九釐地畝一項破格全蠲以廣皇上巡幸恩澤實千載盛事也又失額丁銀一欵全書刋注該縣人丁叠因兵火水旱災祲以致逃亡缺銀三千二百七十兩八錢於順治十三年閏五月內前漕撫臣蔡具題部覆均於原額田地之內帶徴仍嚴督設法招徠清補此乃一時權宜之策原非經久之計尚冀流亡歸復旋即減除豈期該縣田地沉廢屢屢見告民無常産見在者難免逃亡缺缺者焉能復業以致年復一年因循包賠臣查民間完納錢糧丁田原自有分今以磽瘠之地責其按畝輸賦尚且難支况缺額丁銀何堪久事攤賠即該縣有續報墾田皆地方官勸諭見在人丁勉力開墾非另有逃亡復業人丁况順治年間年逺缺額豈能清補合請皇上將前項缺額丁銀暫行免徴督令地方官盡心招徠數年之間流民知無攤賠之苦庶幾漸歸故土將來編審案內陸續增補以符原額誠為至便至失額糧地一千六百六十九頃五十八畝蓋因該縣地處濵湖坍塌失額康熙三年丈缺前數經前撫臣韓於請除丈坍等事案內題請蠲免奉㫖行令督臣麻親勘確實於康熙九年間部覆准將九年錢糧暫行停徴而十年以後仍舊徴輸又續報曠土六百二頃三十四畝一分原因糧田永沉等事請蠲祠堂駱馬湖等處水沉田地一案前撫臣馬奉㫖親往查勘見有山岡荒廢之地具疏題明部覆招集業户開墾今該司府雖經行縣查明失額田地見沉水底報墾曠土俱係石田詳請豁免臣因永蠲錢糧務期詳慎且該縣見有糧田永沉決口地廢二案內奉㫖停徴前項失額地畝是否即在其內至續報曠土係於康熙十六年認墾今稱實係不毛無有虛揑復經飭行該司備移淮徐道僉事常君恩親往宿遷逐一詳詢據稱失額糧地係於康熙三年丈缺而糧田永沉決口地廢二案係於康熙十一十六兩年報淹其時里民各照被災區啚開報前項坍田實在二案之外另有坍塌從前失額錢糧未奉除豁原案見在可核其續報曠土向因需餉孔急部文招徠開墾故將山岡版荒地畝報升不意既報之後艱於耕鑿依然榛莽應升之課虛認均完等語臣惟聖朝任土作貢必小民盡力畎畝而後可責以輸將今宿遷縣失額糧地既付波臣續報曠土又屬砂礫難墾歷經該府縣查明又委淮徐道常君恩親往查確具有不扶印結既無虛冒所當一併題請豁免庶包賠之纍盡釋積年之困頓除萬姓歡呼祝頌聖壽無疆億萬斯年皆知我皇上巡幸所至有非常恩惠不但如古昔省耕省斂而已也續報揚屬異常水災疏揚屬髙郵泰州寶應等州縣地居淮黃下流諸湖交滙素稱澤國自康熙七年遭堤堰沖決以來下河田地久矣陸沉災民流離播遷慘苦萬狀素在聖明洞鑒之中幸賴皇仁浩蕩蠲賑頻頒子遺猶存不致盡填溝壑此皆我皇上深仁厚澤惠養之所致也邇年以來天心效順雨暘時若髙阜之田已獲有秋即勘涸田地災民莫不感奮勉力播種冀有薄收以輸國賦不意今嵗自夏徂秋大雨傾盆連綿月餘先據興化縣詳報被災情形已同淮徐二屬邳州山陽等州縣題報在案今復據髙郵泰州寶應并江都縣紛紛詳報雨水日積無路宣泄更兼黃淮交漲諸湖漫溢萬壑沸騰堤堰難禦致將熟涸田地無論髙下盡被淹沒所種秋禾俱沉波底廬舍漂流男女涕號悽慘情形鄭圖難繪臣披閲之下不勝蒿目驚心一面飛飭各屬設法撫綏一面行令藩司確查除見在委官確勘災傷分數另疏題請破格蠲恤惟是淮揚徐等屬叠罹水患民生昏墊今嵗水災又非尋常可比臣仰體我皇上視民如傷之仁除經飭行各屬查明實在被水深重災民將常平倉向存積穀動給賑濟務令安集不致流離失所仍將動給過穀數及賑濟花名造冊另報外所有被災情形臣謹㑹同總督臣王總漕臣徐合詞具題淮揚水患非常亟請賑恤疏淮徐地方居黃河之濵而揚屬州縣又在淮湖下流雍冀豫兖之水皆以黃河為歸而宛汝梁宋潁壽之水又皆以淮湖為歸是淮揚者固天下之澤國也自康熙九年堤堰潰決而民不堪命矣賴皇上蠲賑頻施得有今日上年恭遇聖駕東巡覩水勢瀰漫田廬淹沒深懷憫惻特簡能員大加疏治仰見我皇上不忍一夫不獲欲起瘡痍而登諸袵席真堯舜如天好生之心也以為從此立奏平成永除昏墊不意今嵗五六月間大雨連綿經旬浹月更兼河湖洶湧川澮盈溢禾稼淹沒秋成絶望臣備將被災州縣情形陸續入告并分委府㕔等官親詣各屬確勘災傷分數造具冊結題請蠲恤在案惟是今嵗之災非尋常秋災比也蓋山東河南皆有異常水患故河朔之泛漲尤甚而題報之後霪雨不止至七月二十六至二十九大雨四晝夜又遭颶風海潮萬壑沸騰山水閘水建瓴直下舟行堤岸之上城市之間水皆數尺扶老攜幼上下奔逃溺死者不計其數悲號之聲震動逺邇奇災異慘從來所未有也臣以庸菲謬撫兹土痛自修省寢食俱廢隨即移咨督漕河鹽諸臣馳檄司道等官博詢捍禦拯救之方廣募捐輸賑濟共圖存恤今失業之民已有流入常鎮等處者臣嚴飭各地方官隨處撫綏賑恤勿令逺徙難歸將來田疇永荒必至大損國課惟是淮揚徐三屬被災州縣共計二十餘處其被災稍輕者拯救猶易至於淮屬之邳睢山鹽海安清桃宿沭等州縣揚屬之髙寶興泰等州縣具屬積淹之餘徐州及蕭碭二縣田地荒瘠户有逃亡今更罹此奇災慘苦倍甚臣與地方諸臣縱竭力捐輸告糴平糶并動常平倉穀稍資賑濟然為力有限僅可暫濟目前將來秋盡冬交飢寒愈迫不能接濟必至壯者流亡老弱填於溝壑矣臣查康熙十八年各屬旱災請賑飢民百萬即十九年水災僅髙寶興泰鹽五州縣并江都縣邵伯一鄉請賑飢民亦有三十餘萬俱荷俞㫖特開事例并准先動庫帑買米發賑得以源源相濟飢民咸獲更生今嵗水患較十八十九兩年更為慘烈被災地方更為寬廣飢民當亦不止數十餘萬若不籲請皇仁大沛恩膏百萬生靈豈能全活臣不早言上負聖恩罪無可逭今事例久停何敢妄請但救荒無奇策而拯溺勢不容緩非有激勸之典則人懷觀望誰肯爭先請敕部略倣往年賑濟事例量行減數或准士民頂帶貢監官員加級紀録及抵罪還級等項則人知鼓舞庶有實效今時已秋深寒冬迫近恐飢民難待乞准臣先借司庫項銀或撥鹽課銀兩遴委廉幹官員前赴江西湖廣採買麥米分運各屬賑濟事後另報請銷或另議補還為國家保數十萬耕田輸賦之良民即可培國家億萬載無疆之元氣浩蕩殊恩出自皇上非臣所敢自必也飢民望賑甚迫先動帑買米疏據江蘇布政司布政使章欽文詳稱竊照淮揚徐三屬頻年昏墊今嵗復罹水厄以皮骨僅存之衆當此懷襄震蕩之凶其顛連困苦情形業經節次繪圖入告固已不勝其慘矣乃日來水勢不退益加瀰漫叠據各邑迫切呼號咸以颶風霪雨接續摧殘山瀑河流交相泛濫城垣到處傾倒陸地成河村墟一望汪洋河堤如線災黎扶老挈幼載道流離乞食無門棲身無地目今漸次秋深飢寒日迫寧忍立視其死是發粟散賑誠難須臾緩也而各縣儲粟無多勸捐尤難猝辧惟有動銀委官早赴江楚買米分發賑濟是為要著本司伏查康熙十八等年亦因災民絶食賑救無資於賑項無出等事案內奉督撫部院題准部覆既稱江南省亢旱蝗蝻繼起飢民絶食與平常荒歉不同應如該督撫所題照鳥沙船工事例捐納至次年六月初一日停止將現存剩倉庫米麥銀兩酌量先行動賑俟捐輸補還奉㫖依議欽遵行司遵照當經升任丁布政搜查倉庫並無餘存銀米隨詳准動支司庫正項分頭散賑又經詳題展限計自康熙十八年冬季開例起至二十二年春季止共得銀四十七萬三百二十兩內除康熙十八十九二十等年用過賑濟銀四十一萬六百一十八兩五錢零外仍餘急公捐納銀五萬九千七百一兩零於賑案報部可考而此捐納事例隨於再陳水利案內經前任撫院請濬白茆孟瀆兩河先動正帑濟工望賑飢民得以赴工趂食寓賑於工請展事例捐納還項奉部覆允仍開此十二案事例捐補彼時復又溢收銀八萬三千二百五十兩未經動用起解夫此項餘存捐銀雖屬公帑然原係官紳生俊人等急公輸納溢收餘存之項與已前捐賑准動倉庫存剩之例相符且不係地丁正帑合無於內酌量動支至於需銀數目查淮揚徐三屬應賑被災州縣衛所災黎房屋蕩然從何覓食雖現在各屬查取真正絶食男婦老幼確數目下遽難懸定應請自十月初一日開賑起至下年麥熟之期止總計二府一州州縣衛所飢民多寡不等約略不下數十餘萬需米甚多今惟有先儘本地捐穀屇期先行放賑續後買米酌量運給乘此新穀初登應請先動銀三萬兩遴委松江府海防同知李經政再動銀二萬兩遴委蘇州府海防同知劉三傑前往湖廣江西等處採買仍請咨明兩省督撫部院聽其與民間照時平糴星速運回分頭酌發仍照前項事例捐輸補還夫此流離瑣尾之災黎即異日耕鑿輸賦之赤子頻年災沴久荷皇仁破格蠲賑留此殘喘兹當水患滔天民皆艱食委非平日尋常災傷可比仰賴剴切陳請大沛恩膏起瘡痍於衽席不致失所流離矣等因到臣據此該臣看得臣屬淮揚徐地方今嵗秋夏霪雨連綿田禾淹沒臣將各州縣被災情形節次入告復將失業飢民亟需賑救勸捐力難普遍且恐不能接續請准先動庫帑採買米麥接濟緣由具疏題明嗣據布政司將各委官勘明災田分數造册結詳臣具題見候部覆分别蠲恤惟是被災州縣二十餘處皆因五月至八月霪雨颶風接踵肆虐更兼河湖泛漲山水驟發以致田沉波底廬舍漂流失業窮民無衣無食老幼哀號惟賴賑濟稍延殘喘况轉盼嚴冬飢寒愈迫若候部覆至日動銀採買往返道途緩不及事勢必流離轉死溝壑有負皇上如天之仁今據布政使章欽文請於開濬白茆孟河溢收捐輸事例銀內動支五萬兩遴委蘇州府同知劉三傑松江府同知李經政前往江西湖廣等處採買米石以資接濟仍俟捐輸還補等情前來除嚴飭委官星夜起行上緊採買務毋浮冒作速運回分發賑濟外所有借動庫銀買米緣由臣謹㑹同具題詳陳蘇松逋賦難清之由疏臣惟財賦為國家根本之計而蘇松尤為最重之鄉臣以庸碌謬撫兹土見錢糧纍年拖缺每當奏銷之期多者嘗缺至五十餘萬最少亦不下三四十萬夙夜疚心懼無以仰佐國計恆惴惴不安初疑官吏之怠玩繼疑豪强之頑梗乃一載以來詢問耆碩體察民隱間嘗巡行阡陌訪田則之髙下考徴科之多寡然後知蘇松逋賦實由民力維艱斟酌調劑貴在及時敢悉心為我皇上陳之蘇松土隘人稠一夫所耕不過十畝而倚山傍湖旱潦難均即豐稔之嵗所得亦自有限而條銀漕白正耗以及白糧經費漕贈五米十銀雜項差徭不可勝計而仰事俯育婚嫁喪葬舉出其中終嵗勤動不能免鞭撲之苦故蘇松俗好浮華而獨耕田輸稅之農民艱難實甚兩府與常鎮嘉湖皆壤地相接而賦額輕重懸殊即江浙閩楚並號財賦之鄉區區兩府田不加廣而可當大省百餘州縣之賦民力所以日絀也夫兩府田賦之重固起自明初臣嘗考洪武年間籍沒張士誠將士私産號為官田賦額特重而民田之起科較輕永樂以後漕運愈逺加耗滋多宣德正統間巡撫周忱奏減蘇州租七十餘萬石松江租三十餘萬石民困稍蘇至嘉靖初蘇州知府王儀請行均田之法盡括官民田而裒益之當時稍救官田之敝但正耗兼配科則繁雜吏易為奸其後以耗米作為正糧又運綱諸費額外取之於民因事派徴又如所謂九釐地畝之類日漸加益非復正嘉以前之舊至啓禎時軍餉孔殷加派日繁民不堪命矣本朝定鼎田賦悉照萬厯年間則例盡革明末無藝之徴洵稱救民水火近年因時制宜如白糧經費運軍行月永折加價等項載在全書其官收官兌之法最稱便民不可更易然亦因明朝賦重役繁以耗作正不得已為此補救之計而民力則已殫也順治初年錢糧起存相半考成之例尚寬後因兵餉急迫起解數多又定十分考成之例一分不完難逭部議以四十餘萬錢糧之州縣至與小縣錢糧不上數千或僅一二萬者一例考成官斯土者雖賢如黃霸魯恭何能自免謫譴夫人千里而來為吏誰肯以催科無術甘心自棄一存顧惜功名之念則展轉苟且之計必生或以存留而抵起解或以此項而借彼欵或以新糧而抵舊缺參罰期迫則以缺作完賠補維艱又以完為缺種種弊竇莫可究詰一經發覺身家俱喪官之更代日勤蠧胥因之作奸頭緒紛淆侵漁任意雖嚴加追比究之欵額空懸惟二十二年適遇嵗豐二十三年荷䝉聖恩蠲漕故僅有一二縣地丁全完而仍多掛缺又以年外報完未副議叙之例夫人才力不甚相逺豈他省之吏幹濟獨優而蘇松之官催科偏拙良以百姓之脂膏既竭則有司之智勇俱困而前途之功名絶望則官針之砥礪難期心已灰矣地方何賴吏治人才皆足惜也積缺年久惟待赦蠲我國家𢎞敷大賚每一赦詔蘇松免租多者百萬少者七八十萬是糧額雖重原非可完之數與其赦免於追呼既窮之後何若酌減於徴比未加之先使得完肌膚而樂升平且無損國家嵗入之實數乎蘇松版荒所在都有臣常委官履畝踏勘非盡石田不可耕也祗因田不抵賦力難任役一户逋逃數家株纍小民畏懼不敢承佃倘䝉皇恩稍賜寬減其孰不踴躍復業數年之後按畝升科將見田額漸增國賦日裕是蠲無益之虛額而收墾田之實課也前此諸臣纍纍陳請適當軍興旁午餉需告匱之日且俱言前朝苛政欲復宋元之舊事勢難行今賴皇上德威逺播海表日出之邦絶域不庭之國莫不稽首來享奉琛恐後斯正國家休養蒸黎培植根本之時上年鑾輿親巡洞見村落蕭條深軫聖懷又蠲漕免丁帶徴積缺深仁厚澤淪肌浹髓白叟黃童感極而泣以為生逢堯舜之主視民如傷若地方官能以民艱上聞必當大沛恩膏起三百年之痼疾臣身在地方義無可諉不敢逺引宋元之說亦不敢比常鎮嘉湖之例惟叩懇我皇上念民力之已竭察虛額之無益宸衷獨斷渙發德音及此纂修簡明全書之時博集廷議將蘇松錢糧合盤打算各照科則量減一二分定適中可完之實數無存過重必缺之虛額再將科則稍加歸併使簡易明白便於稽核或將賦額最重州縣另立勸懲之典不與小縣一例考成使守令知可以久任可以升遷不至苟且因循事務廢弛庶幾野無不耕之土户無不完之租民力裕而吏治清稅賦充而國用足億萬年太平無疆之休端在是矣臣非不知賦額久定未便更張但體國經野貴永久而無弊苟有未善正宜變通况前朝之苛政乎我皇上神聖立極事事垂法萬世此尤關國計民生之大者宏謨逺算總自睿裁非微臣所能仰贊也謹陳調劑驛困之法以杜耗費以清欵項疏竊惟驛站之設所以通命令而速章奏甚重也仰賴皇上聖德天威海㝢寧謐無軍機重務星夜奔馳之事而皇華之使與海外殊域朝覲貢獻未嘗不絡繹於道臣屬江蘇等七府一州為浙閩江廣之衝所屬縣驛額編錢糧先於敬陳減差案內裁減十分之四後奉恩詔准復二分近於驛遞之差使甚少等事案內將復二錢糧查明議裁已經具疏題明候部議覆矣惟是臣屬驛遞既號衝繁而淮揚徐等處復多荒缺向例凡災荒蠲停不敷之項按年查明缺額數目於司庫撥給造册咨部核銷臣以平日所聞參之今日目覩知司庫支領不便者四請約略為我皇上陳之藩司駐劄蘇郡而淮揚等屬近者五六百里逺者千里至於徐州屬縣則有千二三百里者矣渡黃河涉大江波濤之險道路之虞皆所不乏此既赴司起解彼又赴司支領往返徒勞跋涉即隨到隨發當亦浹月經旬設或稍有愆期則守候更須時日夫馬嗷嗷豈能懸待此不便者一也司驛各官每日應付差使勢不能親身赴領或委家屬或遣衙役所委之人豈皆忠信無欺或有浪費或有疏虞或借衙門使費以侵漁或假長途水腳而那空夫馬枵腹何堪中飽此不便者二也司庫撥補一應錢糧雖臣再三嚴禁不致扣尅需索然而耳目有所難周况藩司事務繁冗豈能一一覺察則投批領文之間保無胥役作奸掯勒使費以打㸃之厚薄為給發之遲速者乎此不便者三也驛站錢糧係馬夫計口之需必須按日給發荒缺之項不得不隨時撥補在司庫或因原欵屬解不前或因别項動撥已盡往往不能按年按欵有以别年之銀而撥此年之用者有以此欵而應彼項之需者每煩部臣核駁經年纍月完結無期此不便者四也臣查河工錢糧經總河臣靳輔題明凡荒缺不敷銀兩得於起運銀內就近撥補今驛站雖不敢比例河工亦係按日給發萬難缺少之項今既減定額數所有原編不敷及荒缺蠲停應補銀兩應請比照河工例即於本州縣地丁實徴銀內就近撥足如本近鄰封州縣應解裁站銀內按數協抵每年藩司㑹同驛傳道預定確數行各州縣遵依一面報臣衙門察考蓋鄰封州縣體勢相等無打㸃使費之需無掯勒短少之弊無跋涉險阻之虞仍各於地丁驛站奏銷册內開列注明欵項既得清楚造報亦易稽核實為至便臣查淮揚徐州等屬地丁錢糧除荒缺蠲停及應解河工倉漕等欵外仍有應解司庫充餉之數今以應解之銀扣抵本地應補之項而將附近成熟州縣裁站銀兩應協别屬者統歸司庫充餉總之各屬驛站錢糧解司者不必支領支領者不必解司既可免縣驛解領守候之苦又可杜侵漁扣尅之弊更可省牽混核駁之繁一舉而數善備焉如慮鄰封州縣勢位相敵彼此膜不關切或有愆期不妨申請藩司行文嚴催凡在屬邑誰敢不遵何必解司轉發多此煩勞臣嘗以公事接見屬員詢問地方疾苦言及赴司解領站銀莫不蹙額相向即布政使章欽文亦恐司役借端作弊不能覺察獲罪求歸各州縣自行支發近又因裁減復二站銀不堪再有旁費致驛路頽弛所關非細故敢比例題請米色難期純一謹請紅白兼收以恤災黎疏竊照淮屬邳州海州山陽清河鹽城桃源宿遷睢寧沭陽揚屬髙郵泰州江都寶應興化及徐州并所屬蕭沛碭山等州縣去秋䨙雨為災更加黃淮交漲田禾淹沒秋成絶望臣經照例委官勘明㑹題又經總漕臣徐旭齡將漕糧漕項㑹疏題請分年帶徴荷䝉皇上軫念災民特遣户部侍郎臣蘇等馳至察勘確議賑濟白叟黃童靡不感頌聖德靜候恩綸於康熙二十四年十二月二十四日接到部覆內開除漕糧漕項例不蠲災外地畝錢糧被災九分十分者照例免其三分七分八分者免其二分五分六分者免其一分等因災田地丁等項已荷蠲免之恩惟是漕糧漕項未允緩徴臣即飭行各屬速催徴兌起運以副漕限隨據各該州縣紛紛申詳咸稱今嵗被災最重汪洋千頃今時已嵗暮即敲骨吸髓亦難副冬兌冬開之限籲請再叩皇恩緩至明春臣查宿遷興化邳州鹽城髙郵五州縣康熙二十四年下半年康熙二十五年上半年地丁各項錢糧特奉上諭豁免其被災州縣錢糧亦已照例蠲恤則淮揚士民受災雖重䝉恩已深况漕糧例不蠲災已奉俞㫖凡在士民自當勉力輸將以報皇仁何敢再請寬緩隨即批飭設法勸徴尅期兌運毋得延緩去後而各屬又復申請以本處地産紅稻向例納漕用純紅米色今本地既無收穫勢必告糴外郡安得純紅米色請題明准其紅白兼收等情臣查本地無米逺方採買時日已迫又責其一色徴收此萬難得之於災民者也查康熙十九年被災州縣漕糧原䝉恩准紅白兼收買秈搭兌成例俱在今康熙二十四年分被災田地漕糧仰懇睿慈准照十九年之例紅白秈粳並收俾災黎拮据措辧告糴外郡勉力輸納庶漕運不至遲誤查江北漕糧例限十二月以內過淮今部咨於十二月二十四日始到晝夜追呼災民實屬無措不敢不冒昧籲請皇仁也請㫖行取疏行取官員以備言路之選誠聖朝用人之大典也臣一准部文隨行布按二司選用開報惟是部行必無錢糧盜案官員方准咨送而臣屬地方賦重役繁甲於天下實與他處不可同日而語故銓選時掣得此缺便形神沮喪親朋為之惋惜以為半生功名付之逝水自非志趣堅定不以升沉利鈍介懷者未有不頽然自放甘心以不肖為歸者也臣奉命撫吳以來首以察吏安民為念無時不告誡屬員以我皇上至聖至神超逾百代求賢圖治宵旰弗遑且知人之明出自天授為臣子者苟能仰體聖心潔已愛民決不至沉埋下寮反覆申諭舌敝筆秃故一時守令爭自濯磨操守廉潔政蹟表著者實不乏人然稽其錢糧考成則萬萬不能十分全完蓋勢處其難智勇才力無所用也今奉文行取若拘定成格必以合例之官咨送𫝑必以僻壤小邑易於藏拙者塞責此其人即幸叨選用未必能光大典况斷不能逃我皇上之睿鑒則臣濫送匪人之罪無可辭矣若真知其人而𨼆不舉用則蔽賢之罪與俱等臣採訪再三查有蘇州府屬吳縣知縣劉滋操守端嚴涖事精敏興行教化勸課農桑廉能之績最著又吳江縣知縣郭琇居心恬淡風骨堅凝撫字能勤訓迪不倦士民之稱頌如一此二官者並無未完承緝盜案惟經徴帶徴各年正雜錢糧不能如額臣於大計薦舉卓異疏中亦曾列其廉能祗以格於定例未敢開入正薦已荷皇上睿照查吳縣吳江縣錢糧自康熙十九年起至二十二年止俱奉文停徴至康熙二十四年始分别按年帶徴其康熙二十二二十三兩年地丁錢糧俱經奏報全完止有康熙二十四年并徴十八年地丁漕項及各年蘆課雜稅與承追前任侵那各案俱有尾缺尚在年限之內查二縣錢糧歷年不能全完今二官兩年地丁錢糧全完則非二官之才短惰徴可知也臣查前督臣阿前撫臣慕任內有常熟縣知縣林象祖上海縣知縣任辰旦亦以錢糧未完與例不符曾經㑹疏題請奉㫖破格擢用今劉滋郭琇二官臣實真知其才品久協輿情兹據署江蘇布按二司事蘇松督糧道副使劉鼎暨蘇州府知府胡世威交薦合以臣之見聞無異然臣終不敢自信一已之見違例輕舉復又咨商督臣隨准移覆二官清操卓起敷政精勤堪膺行取之選是亦從愛惜人才起見臣思以人事君為臣子之大義用是冒昧比例具題仰懇皇上俯鑒准破格録取俾循良之官益知感奮而地方之繁劇與兩邑相等者亦知有登進之階相率而為良吏以仰副我皇上圖治安民之意所關匪淺鮮也丁額科則獨重包賠苦纍實深籲懇亟蠲以安子遺疏山陽縣地最衝疲而丁徭一項又最為繁重蓋淮屬最大州縣不過六七萬丁小者常不及萬而山陽一縣原額人丁至一十六萬三千六百九十八丁編銀至三萬七千二百餘兩此諸屬之所未有者也當年嵗豐稔得以按編徴輸民力亦自無餘逮康熙七年以後叠罹河患民生日蹙康熙十五年編審清查缺額至四萬二千六百餘丁時因需餉殷繁未敢遽請蠲除仍照舊額徴收小民包賠苦纍已非一日至康熙十九年前撫臣慕飭司府清查除陸續招徠復業并清出新丁抵補外仍有實缺人丁二萬九千八百二十六丁於淮民纍苦已急等事案內具題部覆奉有俞㫖自康熙十九年為始准照見在人丁徴輸積困頓蘇不意於康熙二十年編審案內因部文駁查至二十二年覆准仍照原額徴解查此項缺額丁銀於二十年始奉准蠲即於二十年編審一年之內長養幾何今二十四年應徴丁銀已荷皇恩蠲免萬姓感頌無斁矣所有二十二年缺丁銀兩應於二十八年帶徴其二十三年缺丁銀兩在見徴未完數內有司仰遵功令非不盡力追呼徴比無人勢必責令見丁包賠連年水旱叠告災傷異常見在遺黎賴我皇上𢎞仁蠲賑得以僅存應徴之賦尚苦供輸維艱此項缺額人丁豈能責令包賠况宿遷挑源安東沭陽等縣淹溺流移人丁見於決口地廢等事各案內照舊停免山陽故絶無徴丁銀亦係專案題蠲事同一例仰懇皇仁垂鑒山陽丁繁則重災傷頻仍即今現徴一十三萬三千八百七十餘丁已屬艱難將二十二三兩年缺額丁銀特賜豁免其二十五年以後俟今次編審明有無增補照實在見丁徴收庶災黎獲免包賠哀鴻得以安集將來長養生聚日漸殷繁可以足額裕賦於無窮矣詳陳蘆課辧銅之艱疏江省非産銅之地必採買於外省定價不敷請照各屬額徴蘆課多寡分行州縣多方購覓以速起解當經咨明部臣在案除康熙二十四年所派銅斤已飭各屬勉力採辦赴部交收外兹據江蘇布政使章欽文詳稱康熙二十五年蘆課銅斤飭行各屬遵照採買各州縣咸以賠補艱難籲請停辧前來臣查錢局需用銅斤向於各關稅銀內動支辦解因蘆課錢糧當年亦差蘆政部司經收故照關差一例辦銅逮後蘆政衙門奉裁課銀歸併有司徴解時因銅價騰貴外省停鑄惟京局所需之銅止令關差動支稅銀辧買而不及於蘆課誠以此項銀兩在小民係計畝輸將在州縣按則徴解嵗有定數非若關稅按貨征收嵗額之外稍有盈餘可以通融補劑者比今部定銅價每斤止銀六分五釐而各處時值則有一錢五六分以至一錢七八分不等是時價之與定價不啻三倍况江寧所屬每年派辦十七萬斤為數既多一時採買價值更加騰湧重以領解員役舟車盤剝需費浩繁雖康熙二十四年各州縣勉力捐賠辧完起解然後難為繼今康熙二十五年各屬紛紛具詳臣查銅斤定價既有不敷採買交解更多賠纍若不變通將來各官賠補無力必至科派那移官民交困仰請皇上俯鑒蘆課與關稅不同停其辧買銅斤其應徴之銀照舊充餉如或錢局必需萬不可缺亦懇皇上敕部於每斤定價六分五釐之外照依時值酌量加增庶承辧之官不至有賠纍之苦則那移錢糧科派洲民之弊可免而京局鼓鑄急需亦得無誤矣恭謝天恩疏康熙二十五年三月二十日奉上諭諭吏部自古帝王諭教太子必簡和平謹恪之臣統領宫僚專資贊導江寧巡撫湯斌在講筵時素行勤慎朕所稔知及簡任巡撫以來潔已率屬實心任事允宜拔擢大用風示有位特授為禮部尚書掌管詹事府事其現任詹事郭棻少詹盧琦歸允肅著照舊留任其詹事朱瑪泰著對品調用少詹喇拔色度著解任照原品隨旗上朝爾部即遵諭行特諭欽此欽遵移咨到臣准此寵命自天驚惶無地當即䖍設香案望闕叩頭謝恩訖伏念臣至愚極陋蒙我皇上起自田間俾列侍從拔置講筵記注聖政編輯祖訓總裁史局數年之內屢荷天恩驟遷學士自顧謭劣深愧非分乃蒙特簡出撫江蘇陛辭之日天顔和霽奬勵有加賜賚有加恩溢格外臣負乘滋懼覆餗是虞受事以來夙夜兢兢惟思勉策駑鈍以圖報稱於萬一而才薄事繁力輕任重拮据雖勤涓埃莫效叢脞屢見荷蒙聖恩優容臣每捧接溫綸感激涕零以為際遇之隆千載難覯而又自念精力漸衰心血枯槁常恐終至隕越辜負聖慈何期復承寵命不次超擢特㫖褒嘉榮逾華衮臣何人斯當兹異數敬惟皇太子徇齊天縱敦敏日新我皇上諭教宫中寒暑罔間神聖指授自有精一心傳豈臣下所能仰贊髙深况臣學識踈陋尤在諸臣之下乃荷兹重任局蹐屏營罔知所措敢不益矢恪恭勉思襄贊且臣職司封疆心依黼座兹得再瞻紫極拜舞龍墀犬馬微忱不勝踴躍請録先賢後裔疏歷代賢主莫不褒崇儒學優禮先聖而本朝尤為明備孔顔曾孟及先賢仲由先儒朱熹子孫皆世襲五經博士我皇上崇儒重道復録程皓程頥子孫聖駕東巡録周公子孫近又録周敦頥子孫皆世襲博士聖賢後裔盡承異數甚盛典也臣躬逢聖朝愧無以仰助文治謹按臣屬蘇州府常熟縣為先賢言偃故里偃以文學著稱弦歌之化深契聖心其學道愛人一語可為治行之準所稱行不由徑非公不至可為取人之法蓋以詩書禮樂為教孜孜以人才風化為先務視有勇足民精粗不侔矣嘗考禮記檀弓所載時人問禮者十有四皆以子游一言為可否蓋其考禮論道必貴知本不僅在器數儀文之末可謂得聖學之精華者矣且孔門諸賢多産魯衛密近聖居興起為易獨偃生長勾吳政教之所不通乃能奮起遐荒學傳洙泗開東南數千年人文之盛其功之所及尤大且逺而後裔未獲邀一命之恩實為缺典恭惟我皇上神聖天縱集堯舜以來之大成既已海內乂安治化蒸蒸更修明典禮表章先哲文治之隆萬古為昭倘䝉聖恩念偃之賢比例仲由録其子孫於以光大治化昭示來兹禆益良匪淺鮮矣臣更有請者孔門弟子如閔損冉耕冉雍端木賜卜商有若諸賢其造詣雖不無淺深要亦顔曾之流亞若䝉敕下禮部㑹同翰林院詳加酌議行各直省訪其子孫量賜録用補前代未備之典章實熙朝不朽之盛事也臣又考宋太祖真宗髙宗皆嘗親製孔子及諸弟子像贊故一代儒臣號稱最盛我皇上道本生知學稱宥密天文炳煥暉麗日星薄海臣民莫不顒仰倘萬幾之暇揮灑宸翰御製先聖先賢像贊頒示天下學宫傳之史冊當與典謨並重熙朝人文之盛將必駕漢逾唐比隆三代豈近世所敢望哉毁淫祠以正人心疏臣才具庸劣奉命撫吳陛辭之日蒙我皇上諄諄誨諭以移風易俗為先務聖駕南巡又諭以敦本尚實使民還淳返朴臣仰承德意月吉齊集士民講解上諭十六條又定期至學宫講孝經小學使人知重倫常而敦實行一年以來風俗亦漸改觀竊以吳俗尚氣節而重文章闤闠以著述相髙固天下所未有也但風涉淫靡黠者藉以為利而愚者墮其術中爭相倣效無所底止如婦女好為冶遊之習靚籹艷服連袂僧院或羣聚寺觀裸身燃臂虧體誨淫至於斂錢聚㑹迎神賽社一幡之直可數百金刻造馬弔紙牌編作淫詞艷曲流傳天下壞人心術婚喪不遵家禮戲樂參靈綵服送喪仁孝之意衰任恤之風微而無賴少年教習拳勇身刺文繡輕生好鬬名為打降如此之類不可枚舉臣皆嚴加禁飭委曲告誡今寺院無婦女之跡河下無管絃之聲迎神罷㑹艷曲絶編打降之輩亦稍稍斂迹若地方有司守臣之法三年之後可以返朴還淳且浮費簡則賦稅足禮樂明而爭訟息固吳中之急務也然此皆地方官力所能行不敢上煩諭㫖惟有淫祠一事挾禍福之說年代久逺入人膏肓非奉天語申飭不能永絶根枝蘇松祠有五通五顯及劉猛將五方賢聖諸名號皆荒誕不經而民間家祀户祝飲食必祭妖邪巫覡創為怪誕之說愚夫愚婦為其所惑牢不可破蘇州府城西十里有楞伽山俗名上方山為五通所踞幾數百年逺近之人奔走如騖牲牢酒醴之饗歌舞笙簧之聲晝夜喧闐男女雜遝經年無時間歇嵗費金錢何止數十百萬商賈市肆之人謂稱貸於神可以致富重直還債神報必豐里諺謂其山曰肉山其下石湖曰酒海耗民財蕩民志此為最甚更可恨者凡少年婦女有殊色者偶有寒熱之症必曰五通將娶為婦而其婦女亦恍惚夢與神遇往往羸瘵而死家人不以為哀反艷稱之每嵗常至數十家視河伯娶婦之說更甚矣夫蕩民志耗民財又敗壞風俗如此皇上治教如日中天豈容此淫昏之鬼肆行於光天化日之下臣多方禁之其風稍息因臣以勘災至淮益肆猖獗臣遂收取妖像木偶者付之烈炬土偶者投之深淵檄行有司凡如此類盡數查毁撒其材木備修學宫並葺城垣民始而駭繼而疑以為從前曾有官長厭其妖妄鋭意革除神即降之禍殃皆為臣危至數月之後見無他異始大悟往日之非然吳中師巫最黠而悍誠恐臣去之後必又造怪誕之說箕斂民財更議興復愚民無知必復舉國猖狂不可禁遏請賜特㫖嚴禁勒石山巔令地方官加意巡察有敢興復淫祠者作何治罪其巫覡人等盡行責令改業勿使邪說誑惑民聽天威所震重寐當醒人心既正風俗可淳更通行各直省凡有類此者皆行禁革有禆世道非渺小矣湯子遺書卷二
