body:
  text: 湯子遺書卷四工部尚書湯斌撰記乾清門奏對記康熙二十二年三月三十日上御乾清門斌侍直命録平日詩文進覽斌奏近因纂修兩朝聖訓及明史所作詩文甚少上曰即舊作亦可四月初九日斌遵㫖進所著文十篇詩十首上召至乾清宮閲首篇籍田頌肅然改容曰此世祖章皇帝時事汝為庶吉士時作乎斌對曰是次閲十三經注疏論二十一史論至春王正月辨上命敷陳大意斌對曰春王正月四字春秋本自明顯後儒議論不一有言周改月兼改時者有言改月不改時者有言時月俱不改者臣以春秋本文斷之時月俱改之說為是如冬十月雨雪二月無氷在夏時原不為異又僖公五年左傳春王正月辛亥朔日南至日南至者子月也此改月改時之證也胡安國言夏時冠周月臣以為不然行夏之時聖人平日論道之言春秋者聖人尊王之書以夏時冠周月非為下不倍之義上頷之又擬漢以禁囿假貧民舉直言極諫之士詔上問此詔何為而作斌對曰此漢元帝時事臣散館時世祖章皇帝御試以此命題臣䝉恩授檢討之職又命述學言篇大意斌對曰自周子至朱子其學最為純正精微為儒者標凖後學沉溺訓詁殊失程朱精意王守仁致良知之學正以救末學之流弊但語多失中門人又以虛見承襲致滋後人之議臣竊謂先儒補偏救弊各有深心願學者識聖學之真身體力行久之當有自得徒競口語無益也上復頷之潼關城樓刻詩記睢州儒學記嵩陽書院記贑州府志序上一一覽訖詩十首逐字看過至末首有年老才將盡憂多道轉親二句上佇思久之曰何謂憂多道轉親斌對曰臣幼遭亂離半生在憂患中嘗隨事體認於道理轉覺親切詩詞朴拙不勝惶恐天顏和霽從容顧問晷刻頻移聖主優禮儒臣為國家重事微臣才力短淺無由報稱愧且懼焉睢州移建廟學碑記睢州儒學舊在北城濯錦池上明末黃河決城遂淪於水有司權奉先師主於城南民舍地甚湫隘殿廡之制不備堂齊皆缺諸生無所肄業屢議改建以財用匱乏莫有毅然任其事者康熙十年知州事程公始至慮無以興學育才仰承朝廷德意期年政通事簡乃相廟東有地據岡面陽水環如璧羣情咸合州之薦紳諸生量力捐助先建大殿次及兩廡㦸門櫺星門各如制明倫有堂啓聖名宦鄉賢有祠樹以崇坊繚以周垣位序丹雘應圖合禮其相規制稽出納久而不懈者學正魏君也既訖工公率鄉大夫士行釋菜禮而屬余為記余不獲辭乃言曰修學有司職也諸生之游於斯者亦思所以為學而求進於古人之道乎抑徒飾文辭溺訓詁冀苟得利祿以夸耀一時已乎夫朝廷廟學竝建固期學者以聖賢為宗也夫聖賢之學其要存心而已存心者存天理而已微而不睹不聞顯而人倫日用皆天理所在也堯舜禹之相授受必致辨於人心道心之危微孔子十五志學至七十始從心所欲不踰矩然則聖人之異於人者惟在朝乾夕惕自彊不息遂至與天為一耳成湯文武之為君臯陶伊傅周召之為臣以及顔曾思孟諸大賢時至事起功業各不相同而其深憂大懼不得已之心則千古同揆也是以行無轍迹言無倣效總以此心純一粹白相證於於穆之表而非從勳業文章一一較論也濓洛關閩以來大儒相繼輩出風㑹所值指授各殊而道本於心先後若一學者不體驗於性情踐履與古人相見於精神心術之間則為已功疏屋漏難慊即著書滿家於道無當也惟知道之大原出於天而體用具於吾心存養省察交致其功信顯微之無間悟知行之合一喜怒哀樂必求中節視聽言動必求合禮子臣弟友必求盡分藴之為天德發之為王道此學問之極功而尊信聖人之實事也然有難言者正學不講俗痼日深利欲之根難斷巧僞之術益工苟非乘本體之偶露急加體認擴充之力悠悠玩愒歲月幾何轉眼遲暮蹻跖同歸大禹之所以惜寸隂而尚書有取於若藥瞑眩豈不以此歟若曰吾志在於科名惟事揣摩帖括他不暇計焉是視聖賢六經祗為富貴利達之資異日備朝廷任使安能秉道絶欺憂國奉公不幾負朝廷建學立廟之意乎余鄉人也誠願與鄉之後進互相砥礪使賢才輩出以報君恩敢述所聞以告之重修蘇州府儒學碑記康熙二十三年歲在甲子天子以治定功成行古巡狩之禮冬十月車駕至蘇州詢問民俗告誡有司還至曲阜祭先聖廟拜獻之儀視前代有加親灑宸翰題其廟額詔天下修葺學宫頒賜御書海內蒸蒸罔不從乂時斌奉命撫吳祗謁廟學見殿廡門垣日就頽圯明倫堂岌岌欲傾慮無以仰承聖天子興學重道之意受事方新未遑興作明年二月蠲俸倡始藩臬庶僚飭材鳩工黽勉襄事杗棟櫨桷楹礎之殘缺者易之丹雘髹漆之漫漶者新之祠齊庖庫之久廢者興之締搆堅貞典制具備泮水疏通逺接太湖松檜椅桐之屬種植千本閲十月而訖工於是躬率僚屬行釋菜禮定期講學於堂諸生執經問業逺近咸集又明年三月斌奉輔導東宫之命瀕行進諸生而告之曰此地自范文正公建學胡安定立教於今六百餘年矣名卿巨儒項背相望諸生肄業於斯其所以紹述先哲仰答天子作人雅意者果安在乎國家興治化在正人心而正人心在崇經術漢儒專門名家師說相承當詩書煨燼之餘儀文器數之目刪定傳授之㫖猶存什一於千百且其時舉選不以詞章通經學古之士皆得上聞朝廷定大議斷大疑博士據經以對故其時士大夫勇於自立無苟簡之心孝弟亷讓之行更衰亂而不變此重經術之效也其後虛無寂滅之說盛聲律駢儷之習工而經學荒矣宋濓洛關閩諸大儒出闡天人性道之源流故天下知性不外乎仁義禮智而虛無寂滅非性也道不外乎人倫日用而功利詞章非道也所謂得六經之精微而繼孔孟之絶學又豈漢以後諸儒所可及歟宋史道學儒林釐為二傳蓋以周程張朱繼往開來其師友淵源不可與諸儒等耳而道學經學自此分矣夫所謂道學者六經四書之㫖體驗於心躬行而有得之謂也非經書之外更有不傳之道學也故離經書而言道此異端之所謂道也外身心而言經此俗儒之所謂經也宗洙泗而禰洛閩人心之所以正也家柱史而户天竺世道之所以衰也今聖朝尊禮先聖表章正學士子宜知所趨向矣吾恐朝廷以實求而士子終以名應也苟無騖乎其名而致力於其實則亦曰躬行而已矣故學者必先明義利之界謹誠僞之關則富貴貧賤之非道不處不去必劃然也造次顛沛生死禍福之間不可移易者必確然也毋為枉尺直尋之事毋作捷徑苟得之謀寧拙毋巧寧朴毋華寧方毋圓戒懼慎獨之功無時可間子臣弟友之職不敢不勉不愧於大廷亦不愧於屋漏如此則發為議論自能息邪距詖而鄉願楊墨之教不得騁也出為政事自能尊王黜霸而管商申韓之政不得施也其斯為真經學其斯為真道學也已否則剽竊浮華苟為譁世取寵之具講論踐履析為二事即誦說先儒世道亦何賴乎當文正公時中庸猶雜戴記中公獨舉以示橫渠則公之深於經學可知矣安定之教以經義為本當時太學取以為法宋世人才之盛實基於此諸生為鄉邦後進來遊來觀其亦有所興起乎蘇郡人文實四方所則效也所以佐成聖朝之治化者余實有厚望焉諸生請書其言為記潼關衛儒學重建啓聖祠記學宮之有啓聖祠也蓋本宋熊禾明宋濓諸公之議而嘉靖間張孚敬請而行之者也父子祖孫德不紊倫祀不紊序其於典禮可謂至矣然吾於從祀諸賢猶不能無議者考之家語七十弟子中孔弗字子蔑史記作孔忠通典作孔患大抵字畫之訛自為一人本孔子兄之子於子思為從伯叔行今子思配饗堂上而子蔑列之廡下於禮未協程敏政曰學宮雖傳道之地未有外人倫而言道者則子蔑當從顔路曾晳之後移祀於啓聖祠雁行伯魚可也又聖道傳授獨稱曾子而名不列於四科蓋四科十子皆陳蔡相從之徒魯論追而記之自唐宋以來顔子配饗因進曾子以補其末後以曾子配饗復進子張以補其末則是四科諸賢後之人皆得下而上之出而入之矣然傳記所載有若立言明道動協規矩孔子既歿弟子欲事之如師公西華嫺於禮儀原思清靜守節貧而樂道宓子賤愛人親賢名齊君子子羔克執親喪遇變不惑南宫適捫舌慎躬世清不廢世濁不汚孔子俱亟稱之夫六子之賢不下於冉有宰我輩而終不得列於十子之後陸沉七十子中側居廡下吾不知其相安否也蓋四科十子既為陳蔡相從之徒原非杏壇一定之格以之進曾子可也以之進子張可也以之進有若等六子亦無不可也余記建啓聖祠而及兹議竊自附於熊宋二君之後庶幾於典禮少有禆哉嵩陽書院記嵩陽書院在登封縣城北建自五代宋初與睢陽白鹿嶽麓號四大書院其地負嵩面潁左右少室箕山諸峰秀矗雲表中天清淑之氣於是焉萃至道中賜九經子史置校官生徒至數百人稱最盛二程子嘗講學於此後人因為建祠明末兵亂傾圯殆盡國朝崇儒右文知縣事黃州葉侯封建堂三楹祀二程朱子而以地鄰崇福宮凡宋臣之帶崇福宮銜者皆祀之葉侯既遷京職邑人大名兵備副使逸菴耿先生介家居講學以程朱為道統所宗不當與諸賢列復捐資建堂三楹遷主崇祀又作講堂三楹顔曰麗澤旁署兩齊曰博約曰敬義書舍若干楹庖湢門垣具備自康熙十八年春至次年秋訖工知縣事長洲張侯塤以興起斯文為任月吉講學課藝其中多士彬彬向風逸菴作書屬余為記余適承乏史局方恨不得從事几席與聞緒論其何敢辭然逸菴之意豈欲余記營建歲月而已乎或欲有言以告多士也竊以孔子教人之書莫詳於論語當時及門稱顔子為好學嘗與終日言而不違者今所記不過問仁為邦二章而已然天德王道備矣顔子謂夫子循循善誘博文約禮今他無可考即二章思之意者虞夏商周之禮樂制度即所謂博文而克已復禮之訓即所謂約禮歟特學有體用問有先後耳中庸言明善誠身而列其目亦自博學審問始孔子言知不廢多聞多見而語子貢以一貫則又以多學而識之者為非其所以一貫之㫖終隱而不發即與門弟子言求仁之方為仁之要多矣而仁之體則罕言也豈聖人之過為隱與及讀易乾卦彖傳與中庸首章而後知道之大原莫明於斯也蓋道之大原出於天而仁者天道之元也知天人同原則知吾心與天地流通而往來無間民胞物與之念油然而生而戒慎恐懼自不容已故程子謂學者須先識仁以此也然仁之為體非可口傳耳授也在人之默識耳孔子自十五志學至能立不惑五十而後知天命則知命亦難矣今之講學者聚數十百人於堂而語之曰天命云何心性云何將大本大原皆為口耳影響之談學者於俄頃之間與聞性道之祕其不至作光景玩弄視詩書為糟粕禮儀三百威儀三千為粗迹也幾希矣斯亦講學者之過也夫道無所謂高逺也其形而下者具於飲食器服之用形於上者極於無聲無臭之微精粗本末無二致也孔子語顔子曰非禮勿視非禮勿聽非禮勿言非禮勿動而語樊遲曰居處恭執事敬與人忠聖人與上智中材所言皆不越是蓋以天命流行不外動容周旋而子臣弟友即可上達天德所謂無行不與者此也所謂知我其天者此也今功利詞章舉業技藝之習陷溺人心士子窮年矻矻志在利祿名譽而天之所與我者茫然也是其學回非聖人之學矣夫中庸之博學將以篤行也顔子之博文將以約禮也大易之窮理將以盡性而至命也大學之格物將以修齊治平也今滯事物以為窮理未免沉溺迹象既支離而無本離事物以言致知又近於墮聰黜明亦虛空而鮮實學路久迷習染日深偶爾虛見未為真得非默識本體誠敬存之綿綿密密不二不息前聖心傳何能㑹通無間故曰苟不至德至道不凝焉嗚呼豈易言哉逸菴之學以主敬為宗以體天理為要可謂得程朱正㫖矣我懼學者之易視之也故因記書院而詳言之欲其深思而自得之焉張侯明經起家治行多可紀於逸菴相與有成尤足嘉也吾又懼來者之不能繼故備書之以告後之君子慶都縣堯母陵廟碑記堯母陵在慶都縣城東門內封之盈丈陵之前有廟焉慶都於漢為望都張宴曰堯山在北慶都山在南登堯山見都山故以為名逮金元乃更今名考秦始皇七年攻龍孤慶都還兵攻汲則其名邑古矣堯母陳鋒氏或曰陳酆或曰陳隆為帝嚳第三妃見於史記見於世本見於大戴氏禮記堯以唐侯升為天子始封於唐皇甫謐謂中山唐縣是也故山曰堯山水曰唐水城曰唐城池曰唐池謐又言望都山堯母慶都之所居邑既有堯祠思堯之德畏其神追祀其母固其宜爾歐陽修以史記地志諸書無堯母葬處得漢建寧五年成陽靈臺碑文曰慶都仙沒蓋葬於兹欲人莫知名曰靈臺上立黃屋堯所奉祀遂定堯母葬處在成陽而郭緣生述征記有云成陽縣東南有堯母慶都墓上有祠廟酈道元注水經亦云成陽城西二里有堯母慶都陵審是則堯母之葬在濟隂可據矣雖然成陽之碑稱蓋葬於兹蓋也者未敢信之辭堯既封於唐矣母之終安知不於唐葬之故土而妥其魂魄焉此亦事理之可信者也廟凡三楹列以兩廡康熙二十四年秋天久雨廟圮水穿陵露穴知縣事錦州蔣侯國楨出俸錢治之以磚築陵之四旁外設重垣塗飾廟貌建坊於前題曰堯母陵余自江南奉召入都過之請余為文勒之石余按帝嚳妃十人堯母之外其著者有邰氏有娀氏詩言赫赫姜嫄有娀方將是已娵訾氏常儀生摯鄒屠氏生八英羲和生宴龍當時卜其四子皆有天下而有邰生棄則云履大神跡有娀生卨則云鳦遺卵吞之其事甚怪或以為釋經之誤至於堯母更謂其觀於三河感赤龍而生堯何其誕也以堯之神聖則其母之遺蹟固不可以不治也因侯之請述所聞於古者兼為神絃詩俾侯歲時授工歌焉辭曰帝高辛兮十其妃伊堯母兮降斗維歲閼逢兮涒灘丹陵側兮三河干震夙兮生子望舒盈兮十四析土兮陶唐望都山兮母之鄉千秋兮萬歲思帝懷兮罔替列俎兮執籩薦馨香兮母前靈之來兮繽紛覆輪囷兮黃雲靈之逝兮婀娜從彤車兮駕白馬覡舞兮巫歌㑹鼓兮傳芭陵不崩兮廟不改邦人祀事兮永久重建漢太尉楊公饗堂碑記華隂城東三十里有漢太尉楊公墓按本傳公於延光中為太尉以忠直被放歸飲鴆卒於夕陽亭順帝即位門人虞放陳翼詣闕追訟公事詔以禮改葬公於華隂潼亭祀以中牢此即其地也余以丙申備兵潼關獲展謁墓下見兵亂之後堂基頽廢周垣盡圮蔓草荒煙碑版縱橫愾然而歎者久之㑹歲歉未遑興作越明年謀於縣令起而新之為饗堂三間峻其垣墉旁廡屏門渠渠巖巖碑碣之仆者起泐者續役罔妨農財匪帑出兩閲月而告成余嘗讀漢史至公事未嘗不嗚咽流涕云蓋漢至安帝而亂甚矣王聖以保姆之勤與女伯榮出入宮掖金吾常侍轉通貨賂至劉環一配阿母女得襲侯封下詔為起津城門內第舍連楹刻棟窮山採石車駕東巡冥然不顧當是時公卿大夫奔走貴戚惟恐不及而公欲以區區一掌力挽頽波抑亦難矣夫地震星變天之所以誥誡人主者乃反借以收太尉印綬何其謬也或有咎公以不蚤去者嗚呼大臣之義不可則止豈公之賢而不明此乎蓋公以自高祖來楊氏世有功於國而公位列上相職匡社稷誠不忍見主心惑於羣小冀殺身而君或悟也當其時去光武明帝之世未逺使帝側席悔過慨然於建武永平之丕績屏絶寵幸委任忠直則東漢之隆尚或未艾觀其語門人諸子雜木布被數言千載而下誰不為之感泣者乃能致大烏之祥而卒不能回安帝之聽此漢祚所以不永而公之無可如何者也於戲傷哉雖然公殁後子孫相繼為太尉若秉若賜若彪竝著清節衛主於崎嶇危難之際使卓操輩睥睨神器而不敢舉直至剝撓數極濳移運祚士君子猶有感其遺教甘覆折而不悔者謂非公之餘烈使然歟儒者不察猥以濳身逺害之道議王臣匪躬之節吾未見其可也夫太華函谷之間由漢以來勳業著於當時名字勒於彞鼎者衆矣然皆湮滅無復睹記所遺墓宮至有牧豎箕踞嘯傲於其上鄉里後進不知有斯人之墓四方游士驅車過之亦無有肅然而起敬者公自改葬以迄於今雖屢經變革祠宇常有傾圮而子孫環廬錯處歲時祭祀不輟今余一倡而鄉士大夫響應恐後四方君子登其堂覽其跡者想見公之風聲氣烈猶低徊留之而不能去嗚呼是可以知公矣潼關樓刻詩記潼關古桃林地也太華峙其西崤函踞其東秦山回合萬峰刺天河渭屈盤千壑奔㑹崖谷岡嶺環抱叢倚道路狹峻車馬如東真天造奇險為秦閫閾漢唐以來莫不倚為巨鎮以資屏藩兵火之後城垣傾圮樓櫓半缺廢址荒煙過者為之躊蹰而悽愴順治十三年斌奉命飭兵兹土自顧庸菲不足當斯重寄恆惴惴自恐仰賴朝廷德威遐被數千里外如在輦轂之下故承乏三年兵彊吏馴士習民安乃謀寮屬重建城樓資皆蠲俸役罔妨農工既成集古人過關題詠之詞自唐明皇以下凡一帝十有八人為詩二十九首刻於東門樓壁嗚呼當明皇停鑾關上與侍從唱和其時君臣樂豫海宇清寧登高躡岱勒石銘功可謂極盛未幾而漁陽變起雄師告潰關塞失守六龍西幸豈山河之險不足恃歟抑成敗之故皆自於人也孟子曰地利不如人和吳起曰在德不在險有國家者修德以懷逺和人以守國則雍容樽俎偃戈休甲彼放牛歸馬之盛此非其故墟哉後之君子登斯樓也眺山川之雄勝覽昔人之咏歌古今興衰之感制治保邦之要亦可以慨然而思矣重修乾明寺碑記睢州城西北隅有寺曰乾明按通志元至正元年建考元人碑記云國初寺基河患方橫則在元即重修非初建矣或曰寺在唐宋為楞伽禪院蘇文忠公於紹聖元年將適嶺表遇雨信宿於此書松醪賦後人為之建亭刻像鐫賦於石文士往往構别業於旁其地有林木水竹之勝河屢遷湮沒不常其沿革未能盡考也余幼時來遊見壁間有高子業吳明卿題字皆擘窠大書遒媚可觀餘不能盡識意以坡公遺蹟故來遊者衆歟寺東南有斷塔欹側如將傾者明崇禎末以寇亂毁塔得石記言塔去則河當徙城當廢土人異之未幾壬午三月闖賊破睢州九月河決汴梁水由寺北隄口入直灌州郡舊城遂廢石記歷歷皆驗豈區區一塔果關興廢歟抑偶然歟或物之成毁有時精易數者類能為之非甚異事歟城陷後值鼎革未暇言治河遂為巨浸者七載吳越荆楚之賈高檣巨帆出入城郭闤闠間余嘗乘舟過此見蒲葦蓮芡一望無際白鷺飛鳴與漁歌相答鐵佛像斜立波濤中嗟歎者久之順治十七年河治地出僧真元募資建大殿三間棟楹堅壯像設具備僧院禪堂次第畢舉介袁進士炌生請記久未及為其請益力聞形家言此寺於州風水有禆余未習其說然州地最窪下寺當河衝巋然峻峙有獨障狂瀾之象形家言或不謬又州以屢湮故古蹟蕩然此寺建立數百年滄桑陵谷變幻無常而樓閣莊嚴壞而復新當紹聖改元正坡公遭讒放逐之時游戲翰墨不怨不戚風流猶可想見彼張商英趙挺之輩果安在哉其荒墳斷碣亦有過而流連者乎寺東錦水淪漣西則古城長隄煙柳映帶南望雉堞樓臺參差如畫可以備詩人之吟眺而鐘魚磬板經聲梵唄繚繞於曉風殘照之間於以消塵慮而發深省不可謂非真元之績也若其年逾七十精神強健事必期其成功必要其久乞言專誠十載弗懈此亦足激發吾黨何忍以廬居火書之論却之故為之記田烈婦孫氏殉節碑記烈婦孫氏歲貢生𦙍光之女性貞靜通女誡大義年十七歸處士田雲龍雲龍躬耕自給烈婦荆布操作相對如嚴賔康熙六年夏酷暑雲龍行吟潭上解衣游泳雨後水大漲遂溺死烈婦撫尸長號盡鬻簮珥之屬治二棺先以一殮雲龍遂自縊家人亟救得蘇其父勸慰曰汝父在獨不相念乎烈婦曰在家從父既嫁從夫禮也從一而終古之訓也夫亡與亡計之熟矣其父無以難第令諸娣姒防護之烈婦哀泣勺水不入口見防衛且密乃紿曰我今不死矣須葬後再為計也與諸娣姒營喪事至夜分諸娣姒大半睡去烈婦呼之醒曰若不懼我死乎因與之長談至四鼓盡諸娣姒困不能支皆熟睡烈婦遂自經夫棺側蓋六月十九日也㫿陽之人無逺近皆知田氏之有烈婦也孫氏之有賢女也縉紳儒林歌詠之郡大夫式其廬里人相與醵金立石而請余一言傳其事竊惟夫婦大倫一醮不改名之曰信是謂庸德宜若非人所難者然詩三百篇以節著者共姜一人而已春秋去古未逺二百四十年之間全節不失婦道者惟紀伯姬何寥寥也兹觀烈婦亦何忝焉今朝廷方敦崇節義佇看太史採風綸音寵賁勒之青史以為彤管光或輶軒失採而刻銘道周芳魂靈氣猶將翺翔兹地土魍木䕫亦知呵護此石永不顛踣即星霜遷易歲月滋古蔦蘿䝉翳苔蘚剝蝕好古之士摹而傳之可以補史氏之闕而烈婦姓氏終以不沒於世則世之砥行礪節者無慮湮滅不彰矣重修中州㑹館記中州㑹館在宣武門之左舊為梁司徒公别墅所謂銀灣曲也順治十四年同鄉官都下者捐資購得改建㑹館宗伯薛公為記其事歲久漸頽屢議修治以艱於費弗果越康熙十八年秋地震傾圮殆盡時都諌王君子厚方主館事捐俸以倡同籍各輸金有差鳩工庀材中翰王君三雪身董其役再閲月而訖工於是鄉之諸大夫士置酒其堂謂不可以無記而屬文於余余謂國家畫十五方域而京師其都㑹也凡鄉之仕於朝者官階之崇卑職掌之巨細繁簡不侔也分曹治事有朝㑹而外終歲未嘗過從者矣其官於外或數百里或數千里聲聞不相通有一旦以奉表述職而至者矣有貢舉於鄉以應試謁選而至者矣亦有京朝官出秉節鉞備藩臬郡守之任倐而數百里數千里聲問不相及者矣幸而聚於一時則歲時伏臘㑹集宴饗於同朝事主之時修親睦鄉曲之義豈不謂行古之道乎都諫斯舉洵為知所務也余更三復宗伯之記稱述吾鄉先哲若李文達劉文靖之相業顧軒兩都憲之清直馬端肅許襄毅之事功何文定崔文敏之文章氣節屬望後人希慕風烈交相砥礪不在飲食燕衎相徴逐用意可謂深且厚矣余謂諸公德業蓋有所本亦在其學而已中州文章莫盛於昌黎其學闢佛老崇仁義得聖道之大端論者以為精微之藴猶有未究其極者至兩程子出獨深探原本窮理盡性接千古不傳之統故程子者實儒學之大宗而鄉之後進所當奉為凖的者也若許文正姚文獻講學蘇門佐興元太平之運而明之曹正夫倡道崤澠距邪間正居一代理學之冠其後尤季美孟叔龍紹述於洛西魯正卿呂叔簡振興於宋郡呂忠節闡繹孝經賀景瞻發明春秋劉文烈力任風教大節皎然數君子皆不惑於功利權謀詞章技能之習而確然有以自信者也誠得其所以為學以之事君必忠以之事親必孝以之交友必信於前修之事功風節不規規求合吾見其無不合也夫程子之學以至誠為聖功之極以主敬為入德之要凡與斯㑹者揖讓進退必凖於禮可否然諾必揆諸道敬存於心貌恭非敬也敬而後能誠非敬無以為誠也以此交修弗怠庶不墮先哲之遺教於以勉盡職業報朝廷之知遇非徒講鄉曲之情歲時伏臘聚㑹燕好之數數也古人無在而非學故敢推廣前記與諸君子共勉之重建信陵君祠記開封舊有信陵君祠在上方寺之右雲杜李本寧宗伯宦梁時所建也崇禎壬午沒於河今國家承平三十年廢典漸次修復而信陵祠獨缺永平韓子客游梁歎曰兹非魏都耶夷門之墟猶有侯嬴朱亥若而人乎使當時無信陵則侯嬴朱亥亦以監門市屠老耳巖穴不乏人能識人不恥下交者世不數見也於是偕寺僧即其祠地土中求得雲杜故碑醵金建祠以侯朱配仍舊也韓子又曰侯生猶魏産耳若毛公薛公固生於趙為平原所簡賤而羞與為伍者也信陵何自而得之卒賴其言趣駕救魏率五國之兵敗秦師至函谷關而還信陵之終不失臣節於魏者二公力也徒以非魏産而不祀非闕典歟補主列侯朱之次旌功也所謂禮以義起者也工既訖請於官春秋致祭復選石刻史記魏公子列傳立祠中過睢陽請余為之記余酌酒與韓子曰君燕市布衣也未嘗綰綬分符有修復舊典表章古烈之任者也何汲汲為此得無悼淪落之難偶慨知已之莫遇與信陵曠世而相感乎夫信陵豈獨以好客重乎秦之併六國也此古今一大變局也趙與魏為脣齒而魏與五國為籓維信陵用兵雖太公穰苴無以加焉使當時不以讒廢則秦不得滅魏魏不滅則五國不至折而入於秦即信陵一旦以老病死其知人下士如此必能得如信陵者而托國焉暴秦之虐不能及於天下矣其以毁廢也飲酒近婦人而卒其亦不忍見天下之遽歸於秦而求速畢一朝之命乎李牧死而趙亡信陵死而魏亡始皇之肆威於海內天也漢高過大梁而以太牢祀之也其亦有見於此乎信陵墓在揚州門外河流變遷湮沒不可問矣此祠之建其不可已也遂為之記韓子名鼎業字子新博學好古慷慨有大節此祠之建其一端云星聚堂記昔東漢陳太丘過潁川荀朗陵家太史奏德星見其占曰五百里內有賢人聚至今載諸史册千古傳為盛事吾謂太丘修德清靜進退合度可謂賢矣至荀淑博學高行其子號曰八龍然爽彧並濡跡亂時有遺議焉何至上動天象哉疑當日諸公雅負重望一時傅㑹為之蓋東漢標榜之習則然未必盡有其實也徴君孫先生隱居蘇門之夏峰天下望之如泰山喬嶽夏峰去孟城里許郭子騤臣别業在焉當風日清和先生命駕往遊諸門人執經問難郭子載酒具饌以從蓋若堯夫之行窩云堂舊有題扁以避御諱先生為更之曰星聚顧謂斌曰汝其記之斌謂先生孝友篤行當逆閹竊柄正人淪陷先生周旋其間脫然黨錮之禍似有類於太丘而道德純備不樂仕進不為僻隱憂天憫人守先待後則非太丘所能倣佛萬一也郭子先世宗伯大參兩公清德直道炳耀前朝公隆公望克紹家學兩河詩禮名族首推郭氏亦似非荀氏所敢望昔漢高入關五星聚於東井宋太祖時五星聚於奎井秦分也奎為文章之府漢宋兩朝人文最盛已見於此儒者師弟相聚洙泗而後一聚於河汾再聚於伊洛至元初姚公茂許平仲趙仁甫竇子聲共聚百泉之上獨劉靜修家容城然聲氣亦相往來不可謂非聚也先生生靜修之里而隱於蘇門一時學士負笈從遊無異隋之河汾宋之伊洛也夫天人一理人之精神原與天地相通故嚴陵動客星之象處士應少微之占賢士聚於下則德星聚於上理固然也將見司天占象室壁奎婁之間當有五星聚矣彼潁川之事何足云云斌庸陋無足比數追隨杖履於斯堂之上以與郭子遊亦不敢不自勉焉三聖廟碑記睢州城東南三十里曰黑龍王廟不知所自始相傳昔時黑龍見因廟祀雩禱輒應萬歷中河水暴溢有關帝像沿流而至土人祠於其左後又立廟祀真武三廟鼎峙而黑龍王廟最久故名特著廟旁村徑窈折茅屋數十家務農桑無市販之習茂樹千章幽若林麓從叔父九式公愛之遂卜葬焉嘗攜門人子弟讀書廟中睹棟宇毁頓醵資新之時順治十四年也今二十餘載叔父墓木拱矣從弟鎬慮無以承先志礱石請余為記余承乏史局編摩無暇秋月卧病經旬懼負宿諾乃馳書告之曰叔父卜葬於此也固愛其土風朴厚勤耕鑿以供賦稅也而其人知讀書重禮義則叔父之功實多其新此廟也所以聚一方之心志而使之為善去惡也夫讀書以明禮義力田以給公上而又處乎遐陬僻壤無紛華市儈之習以誘其心則必能孝弟姻睦恭敬信讓爭競不作鄉里無怨如此而受多福宜也昔之盛時有司常令里民擇寬敞祠宇講鄉約讀律令禮法以匡迪之神明以感動之故荒村野叟皆有士君子之風今軍興旁午不暇修舉隆典賢士居其鄉者倣而為之固令甲之所不禁也鎬欲承先志故亟亟於斯是不可以無記湯子遺書卷四
